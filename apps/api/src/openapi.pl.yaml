                  - type: object
                    properties:
                      pages:
                        type: integer
                        description: Number of images/pages in the PDF
                      compression:
                        type: object
                        description: Present only when targetSize was specified
                        properties:
                          targetRequested:
                            type: integer
                            description: Target size in bytes
                          targetMet:
