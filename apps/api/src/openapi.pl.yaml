        - Pipelines
      summary: Zapisz pipeline
      description: Zachowaj nazwaną definicję pipeline'u wraz z jej krokami narzędzi do późniejszego wykonania. Użyj tego, aby zapisać wielokrotnego użytku przepływy pracy.
      security:
        - bearerAuth: []
