  /api/v1/tools/image/transparency-fixer:
    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: Napraw fałszywą przezroczystość
      description: |
        Napraw pliki PNG z "fałszywą przezroczystością", które mają obwódki, halo lub półprzezroczyste
        artefakty z poprzedniego usuwania tła. Używa BiRefNet HR-matting
        (2048x2048), aby uzyskać czysty kanał alfa z konfigurowalnym przetwarzaniem
        usuwania obwódek. W przypadku braku pamięci przechodzi na birefnet-general, a następnie u2net. Wymaga
        zainstalowanego pakietu funkcji background-removal.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
