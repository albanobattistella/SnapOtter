  /api/v1/fetch-urls:
    post:
      operationId: fetchImageUrls
      tags:
        - Files
      summary: Pobierz obrazy z URL-i
      description: |
        Pobierz jeden lub więcej obrazów z zewnętrznych URL-i. Każdy URL jest walidowany pod kątem ataków SSRF,
        ograniczany rozmiarem i weryfikowany jako prawidłowy obraz. Zwraca URL-e do pobrania dla
        każdego pomyślnie pobranego obrazu. Limit 200 żądań na godzinę.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - urls
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  minItems: 1
                  maxItems: 50
                  description: URLs of images to fetch (1-50)
      responses:
        '200':
          description: Fetch results for each URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        success:
                          type: boolean
                        url:
                          type: string
                        filename:
                          type: string
                        contentType:
                          type: string
                        size:
                          type: integer
                        width:
                          type: integer
                        height:
                          type: integer
                        downloadUrl:
                          type: string
                        previewUrl:
                          type:
                            - string
                            - 'null'
                        error:
                          type: string
                          description: Present only when success is false
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
