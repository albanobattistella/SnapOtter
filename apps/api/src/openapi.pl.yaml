  /api/v1/tools/pdf/split-pdf:
    post:
      operationId: splitPdf
      tags:
        - Tools
      summary: Podziel PDF
      description: |
        Wyodrębnij strony lub podziel na części. W trybie "range" zwraca pojedynczy PDF
        z wybranymi stronami. W trybie "every" dzieli na fragmenty po N stron
        i zwraca archiwum ZIP zawierające części.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to split
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "range") - One of: range, every
                    - `range` (string, optional) - Page range in qpdf syntax, e.g. "1-5,8,10-z" (required when mode is "range")
                    - `everyN` (integer 1-500, optional) - Split into chunks of N pages (required when mode is "every")
      responses:
        '200':
          description: Split PDF or ZIP archive of parts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/pdf/compress-pdf:
    post:
      operationId: compressPdf
      tags:
        - Tools
      summary: Kompresuj PDF
      description: |
        Zmniejsz rozmiar pliku PDF przez próbkowanie w dół osadzonych obrazów. W trybie "quality"
        suwak 1-100 kontroluje DPI obrazów. W trybie "targetSize" wyszukiwanie binarne
        znajduje najwyższe DPI mieszczące się w rozmiarze docelowym. Jeśli kompresja powiększyłaby
        plik, oryginalne bajty są zwracane bez zmian.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to compress
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "quality") - One of: quality, targetSize
                    - `quality` (integer 1-100, optional) - Compression quality (higher = less compression). Used in quality mode
                    - `targetSizeKb` (number, optional) - Target file size in kilobytes. Used in targetSize mode
      responses:
        '200':
