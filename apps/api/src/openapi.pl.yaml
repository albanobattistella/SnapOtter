openapi: 3.1.0
info:
  title: SnapOtter API
  version: 2.0.0
  description: |
    REST API dla SnapOtter, samodzielnie hostowanej infrastruktury do przetwarzania plików z 200+ narzędziami dla image, video, audio, PDF i dokumentów.

    ## Uwierzytelnianie

    Większość punktów końcowych wymaga uwierzytelnienia jedną z dwóch metod:

    1. **Ciasteczko sesji** - Wywołaj `POST /api/auth/login` z nazwą użytkownika i hasłem. Odpowiedź zawiera pole `token`. Przekaż je jako `Authorization: Bearer <token>` w kolejnych żądaniach.

    2. **Klucz API** - Wygeneruj klucz w interfejsie Ustawień lub przez `POST /api/v1/api-keys`. Klucze mają prefiks `si_`. Przekaż go jako `Authorization: Bearer si_...`.

    Punkty końcowe oznaczone ikoną kłódki wymagają uwierzytelnienia. Punkty końcowe dostępne tylko dla administratorów są opisane w ich opisie.
  license:
    name: AGPL-3.0
    url: https://github.com/snapotter-hq/snapotter/blob/main/LICENSE
servers:
  - url: /
    description: Current instance
tags:
  - name: Tools
    description: Narzędzia do przetwarzania plików obejmujące obrazy, wideo, audio, PDF i pliki. Każde przyjmuje multipart upload pliku i zwraca URL do pobrania.
  - name: Batch
    description: Przetwarzaj wiele plików przez narzędzie w jednym żądaniu.
  - name: Pipelines
    description: Łącz wiele narzędzi w wielokrotnego użytku przepływy pracy.
  - name: Files
    description: Przesyłaj, pobieraj i zarządzaj przetworzonymi plikami.
  - name: Auth
    description: Logowanie, wylogowanie, zarządzanie sesją i administracja użytkownikami.
  - name: API Keys
    description: Twórz klucze API i zarządzaj nimi dla dostępu programowego.
  - name: Settings
    description: Konfiguracja obejmująca cały system (zapis tylko dla admina).
  - name: Teams
    description: Organizuj użytkowników w zespoły.
  - name: Roles
    description: Zarządzanie niestandardowymi rolami z szczegółowymi uprawnieniami.
  - name: Audit
    description: Dziennik audytu do śledzenia działań administracyjnych.
  - name: Analytics
    description: Konfiguracja analityki i zgoda użytkownika.
  - name: Features
    description: Instalacja i zarządzanie pakietami funkcji AI.
  - name: Admin
    description: Administracyjna diagnostyka stanu.
  - name: System
    description: Kontrole stanu, konfiguracja i postęp zadań.
  - name: Enterprise
    description: Administracja enterprise objęta licencją, zgodność, SCIM i API integracji.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Session token from login or API key (prefixed with si_)
  responses:
    RateLimited:
      description: Too many requests. The client has exceeded the rate limit.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until the rate limit window resets
        X-RateLimit-Limit:
          schema:
            type: integer
          description: Maximum requests per time window
        X-RateLimit-Remaining:
          schema:
            type: integer
          description: Remaining requests in current window
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: Rate limit exceeded
  schemas:
    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          example: Invalid image format
        details:
          type: string
          description: Additional error details (e.g. Zod validation errors)
    ToolResponse:
      type: object
      properties:
        jobId:
          type: string
          description: Unique job identifier
        downloadUrl:
          type: string
          description: URL to download the processed image
          example: /api/v1/download/abc123/output.png
        originalSize:
          type: integer
          description: Original file size in bytes
        processedSize:
          type: integer
          description: Processed file size in bytes
        previewUrl:
          type: string
          description: URL to a WebP preview (present when output is not browser-previewable, e.g. TIFF, HEIF)
        savedFileId:
          type: string
          description: ID of the auto-saved file in the library (present when fileId was provided in the request)
    UnauthorizedError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 401
        error:
          type: string
          example: Unauthorized
        message:
          type: string
          example: Authentication required
    ForbiddenError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 403
        error:
          type: string
          example: Forbidden
        message:
          type: string
          example: Insufficient permissions
    ConflictError:
      type: object
      properties:
        statusCode:
          type: integer
          example: 409
        error:
          type: string
          example: Conflict
        message:
          type: string
          example: Resource already exists
    FeatureNotInstalledError:
      type: object
      properties:
        error:
          type: string
          example: Feature not installed
        code:
          type: string
          example: FEATURE_NOT_INSTALLED
        feature:
          type: string
          description: Feature bundle identifier
        featureName:
          type: string
          description: Human-readable feature name
        estimatedSize:
          type: string
          description: Estimated download size
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - healthy
            - unhealthy
        version:
          type: string
    AdminHealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
            - healthy
            - degraded
        version:
          type: string
        uptime:
          type: string
        storage:
          type: object
          properties:
            mode:
              type: string
            available:
              type: string
        database:
          type: string
          enum:
            - ok
            - error
        queue:
          type: object
          properties:
            active:
              type: integer
            pending:
              type: integer
        ai:
          type: object
          properties:
            gpu:
              type: boolean
security:
  - bearerAuth: []
paths:
  /api/v1/health:
    get:
      operationId: healthCheck
      tags:
        - System
      summary: Kontrola stanu
      description: Zwraca stan zdrowia serwera. Używane przez Docker HEALTHCHECK. Endpoint publiczny.
      security: []
      responses:
        '200':
          description: Server health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: Database unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /api/v1/tools/image/resize:
    post:
      operationId: resizeImage
      tags:
        - Tools
      summary: Zmień rozmiar
      description: Zmień rozmiar obrazu do konkretnych wymiarów lub procentowo.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `width` (number, optional) - Target width in pixels
                    - `height` (number, optional) - Target height in pixels
                    - `fit` (string, default "contain") - One of: contain, cover, fill, inside, outside
                    - `withoutEnlargement` (boolean, default false) - Prevent upscaling
                    - `percentage` (number, optional) - Scale by percentage instead of fixed dimensions
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/content-aware-resize:
    post:
      operationId: contentAwareResize
      tags:
        - Tools
      summary: Zmiana rozmiaru z uwzględnieniem treści
      description: Zmień rozmiar obrazu za pomocą seam carving, aby inteligentnie usunąć lub dodać treść, zachowując ważne elementy.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `width` (number, optional) - Target width in pixels
                    - `height` (number, optional) - Target height in pixels
                    - `protectFaces` (boolean, default false) - Detect and protect faces from distortion
                    - `blurRadius` (number 0-20, default 4) - Blur radius for energy map
                    - `sobelThreshold` (number 1-20, default 2) - Edge detection threshold
                    - `square` (boolean, default false) - Crop to square aspect ratio

                    At least one of `width`, `height`, or `square` must be provided.
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      width:
                        type: integer
                      height:
                        type: integer
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/crop:
    post:
      operationId: cropImage
      tags:
        - Tools
      summary: Przytnij
      description: Przytnij obraz do konkretnego obszaru.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `left` (number, required) - Left offset in pixels (min 0)
                    - `top` (number, required) - Top offset in pixels (min 0)
                    - `width` (number, required) - Width of crop region in pixels
                    - `height` (number, required) - Height of crop region in pixels
                    - `unit` (string, optional) - One of: px, percent
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/rotate:
    post:
      operationId: rotateImage
      tags:
        - Tools
      summary: Obróć i odbij
      description: Obróć obraz o kąt lub odbij poziomo/pionowo.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `angle` (number, default 0) - Rotation angle in degrees
                    - `horizontal` (boolean, default false) - Flip horizontally
                    - `vertical` (boolean, default false) - Flip vertically
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/convert:
    post:
      operationId: convertFormat
      tags:
        - Tools
      summary: Konwertuj format
      description: Konwertuj obraz do innego formatu.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `format` (string, required) - One of: jpg, png, webp, avif, tiff, gif, heic, heif, jxl, bmp, ico, jp2, qoi, psd
                    - `quality` (number 1-100, optional) - Output quality
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/compress:
    post:
      operationId: compressImage
      tags:
        - Tools
      summary: Kompresuj
      description: Zmniejsz rozmiar pliku obrazu według poziomu jakości lub rozmiaru docelowego.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "quality") - One of: quality, targetSize
                    - `quality` (number 1-100, optional) - Compression quality level
                    - `targetSizeKb` (number, optional) - Target file size in kilobytes
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/strip-metadata:
    post:
      operationId: stripMetadata
      tags:
        - Tools
      summary: Usuń metadane
      description: Usuń metadane EXIF, GPS, ICC lub XMP z obrazu.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `stripExif` (boolean, default false) - Remove EXIF data
                    - `stripGps` (boolean, default false) - Remove GPS data
                    - `stripIcc` (boolean, default false) - Remove ICC profile
                    - `stripXmp` (boolean, default false) - Remove XMP data
                    - `stripAll` (boolean, default true) - Remove all metadata
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/border:
    post:
      operationId: addBorder
      tags:
        - Tools
      summary: Obramowanie i ramka
      description: Dodaj obramowanie, zaokrąglone rogi, wypełnienie lub cień do obrazu.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `borderWidth` (number 0-2000, default 10) - Border thickness in pixels
                    - `borderColor` (hex string, default "#000000") - Border color
                    - `padding` (number 0-200, default 0) - Inner padding in pixels
                    - `paddingColor` (hex string, default "#FFFFFF") - Padding fill color
                    - `cornerRadius` (number 0-2000, default 0) - Corner rounding radius
                    - `shadow` (boolean, default false) - Enable drop shadow
                    - `shadowBlur` (number 1-200, default 15) - Drop shadow blur radius
                    - `shadowOffsetX` (number -50 to 50, default 0) - Shadow horizontal offset
                    - `shadowOffsetY` (number -50 to 50, default 5) - Shadow vertical offset
                    - `shadowColor` (hex string, default "#000000") - Drop shadow color
                    - `shadowOpacity` (number 0-100, default 40) - Shadow opacity percentage
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/beautify:
    post:
      operationId: beautifyScreenshot
      tags:
        - Tools
      summary: Upiększ zrzut ekranu
      description: |
        Dodaj gradientowe tła, ramki urządzeń, cienie, znaki wodne i wymiary dla
        mediów społecznościowych do zrzutów ekranu. Obsługuje tła jednolite, linear-gradient,
        radial-gradient, obrazowe i przezroczyste. Zawiera ramki urządzeń macOS, Windows,
        przeglądarki, iPhone, MacBook i iPad. Gotowe ustawienia dla Twitter, LinkedIn,
        Instagram, Facebook i Product Hunt.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Screenshot or image file to beautify
                backgroundImage:
                  type: string
                  format: binary
                  description: Optional image for image backgrounds (used when backgroundType is "image")
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `backgroundType` (string, default "linear-gradient") -- One of: solid, linear-gradient, radial-gradient, image, transparent
                    - `backgroundColor` (hex string, default "#667eea") -- Background color (for solid backgrounds)
                    - `gradientStops` (array, default [{color:"#667eea",position:0},{color:"#764ba2",position:100}]) -- Array of {color, position} objects for gradient backgrounds
                    - `gradientAngle` (number 0-360, default 135) -- Gradient angle in degrees
                    - `padding` (number 0-256, default 64) -- Space between screenshot and canvas edge in pixels
                    - `borderRadius` (number 0-64, default 12) -- Corner rounding radius for the screenshot
                    - `shadowPreset` (string, default "subtle") -- One of: none, subtle, medium, dramatic, custom
                    - `shadowBlur` (number 0-100, default 20) -- Shadow blur radius (used with custom shadow preset)
                    - `shadowOffsetX` (number -50 to 50, default 0) -- Shadow horizontal offset
                    - `shadowOffsetY` (number -50 to 50, default 10) -- Shadow vertical offset
                    - `shadowColor` (hex string, default "#000000") -- Shadow color
                    - `shadowOpacity` (number 0-100, default 30) -- Shadow opacity percentage
                    - `frame` (string, default "none") -- One of: none, macos-light, macos-dark, windows-light, windows-dark, browser-light, browser-dark, iphone, iphone-dark, macbook, macbook-dark, ipad, ipad-dark
                    - `frameTitle` (string, optional) -- Title text shown in window title bars
                    - `socialPreset` (string, default "none") -- One of: none, twitter, linkedin, instagram-square, instagram-story, facebook, producthunt
                    - `watermarkText` (string, optional) -- Watermark text to overlay
                    - `watermarkPosition` (string, default "bottom-right") -- One of: top-left, top-right, bottom-left, bottom-right, center
                    - `watermarkOpacity` (number 0-100, default 50) -- Watermark opacity percentage
                    - `outputFormat` (string, default "png") -- One of: png, jpeg, webp
      responses:
        '200':
          description: Beautified image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/adjust-colors:
    post:
      operationId: adjustColors
      tags:
        - Tools
      summary: Korekcja kolorów
      description: |
        Zintegrowane narzędzie korekcji kolorów. Reguluje jasność, kontrast, ekspozycję, nasycenie, temperaturę, tint, barwę, ostrość, kanały kolorów i efekty w jednym przebiegu.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `brightness` (number -100 to 100, default 0) - Brightness adjustment
                    - `contrast` (number -100 to 100, default 0) - Contrast adjustment
                    - `exposure` (number -100 to 100, default 0) - Exposure adjustment (gamma)
                    - `saturation` (number -100 to 100, default 0) - Color saturation
                    - `temperature` (number -100 to 100, default 0) - Color temperature (cool to warm)
                    - `tint` (number -100 to 100, default 0) - Tint shift (green to magenta)
                    - `hue` (number -180 to 180, default 0) - Hue rotation in degrees
                    - `sharpness` (number 0 to 100, default 0) - Sharpness enhancement
                    - `red` (number 0-200, default 100) - Red channel multiplier
                    - `green` (number 0-200, default 100) - Green channel multiplier
                    - `blue` (number 0-200, default 100) - Blue channel multiplier
                    - `effect` (string, default "none") - One of: none, grayscale, sepia, invert
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/sharpening:
    post:
      operationId: sharpenImage
      tags:
        - Tools
      summary: Wyostrzanie
      description: Wyostrz obraz metodą adaptacyjną, unsharp mask lub high-pass z opcjonalną redukcją szumów.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `method` (string, default "adaptive") - One of: adaptive, unsharp-mask, high-pass
                    - `sigma` (number 0.5-10, default 1.0) - Gaussian sigma (adaptive)
                    - `m1` (number 0-10, default 1.0) - Flat area sharpening (adaptive)
                    - `m2` (number 0-20, default 3.0) - Jagged area sharpening (adaptive)
                    - `x1` (number 0-10, default 2.0) - Flat/jagged threshold (adaptive)
                    - `y2` (number 0-50, default 12) - Maximum brightening (adaptive)
                    - `y3` (number 0-50, default 20) - Maximum darkening (adaptive)
                    - `amount` (number 0-1000, default 100) - Sharpen amount (unsharp-mask)
                    - `radius` (number 0.1-5, default 1.0) - Blur radius (unsharp-mask)
