      summary: Zamień tło
      description: |
        Zamiana tła oparta na AI. Usuwa tło obiektu
        i komponuje go na jednolitym kolorze lub gradiencie. Wymaga
        zainstalowanego pakietu funkcji background-removal.
      security:
        - bearerAuth: []
