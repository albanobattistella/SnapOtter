  /api/v1/files:
    get:
      operationId: listFiles
      tags:
        - Files
      summary: Lista zapisanych plików
      description: Zwraca najnowszą wersję każdego pliku (jedną na łańcuch wersji). Obsługuje paginację i wyszukiwanie.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of files to return (default 50)
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Number of files to skip for pagination (default 0)
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          description: Filter files by original filename (substring match)
          schema:
            type: string
      responses:
        '200':
          description: List of saved files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        filename:
                          type: string
                        size:
                          type: integer
                        contentType:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total number of matching files (for pagination)
                  limit:
                    type: integer
                    description: Applied limit value
                  offset:
                    type: integer
                    description: Applied offset value
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    delete:
      operationId: bulkDeleteFiles
      tags:
        - Files
      summary: Hurtowe usuwanie zapisanych plików
      description: Usuń pliki i ich całe łańcuchy wersji. Użytkownicy niebędący adminami mogą usuwać tylko własne pliki.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: File IDs to delete (deletes entire version chain for each)
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    description: Total number of records deleted across all version chains
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
