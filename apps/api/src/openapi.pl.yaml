          description: Tool section slug (image, video, audio, pdf, files)
        - name: toolId
          in: path
          required: true
          schema:
            type: string
          description: Tool identifier (e.g. resize, crop)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process (one or more)
                settings:
                  type: string
                  description: JSON string of tool settings applied to all images
      responses:
        '200':
          description: ZIP archive of processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job identifier for progress tracking
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/pipeline/execute:
    post:
      operationId: executePipeline
      tags:
        - Pipelines
      summary: Wykonaj pipeline
      description: Przepuść obraz przez łańcuch narzędzi. Definicja pipeline'u jest wysyłana jako ciąg JSON w polu multipart `pipeline`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - pipeline
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                pipeline:
                  type: string
                  description: 'JSON string: { "steps": [{ "toolId": "resize", "settings": {...} }, ...] }'
      responses:
        '200':
          description: Pipeline result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  originalSize:
                    type: integer
                  processedSize:
                    type: integer
                  stepsCompleted:
                    type: integer
                  steps:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
  /api/v1/pipeline/save:
