      operationId: vignette
      tags:
        - Tools
      summary: Winieta
      description: Dodaj efekt winiety z regulowaną siłą, kolorem, promieniem, miękkością, zaokrągleniem i pozycją środka.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
