              schema:
                type: object
                properties:
                  bundles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the feature bundle
                        status:
                          type: string
                          enum:
                            - installed
                            - not_installed
                            - installing
                            - queued
                            - error
                        installedVersion:
                          type:
                            - string
                            - 'null'
                        estimatedSize:
                          type: string
                        downloadBytes:
                          type:
                            - integer
                            - 'null'
                          description: Compressed archive size for this host's architecture, when the manifest records it. Null in native (non-Docker) mode or when unmeasured.
                        installedBytes:
                          type:
                            - integer
                            - 'null'
                          description: Extracted on-disk size for this host's architecture, when the manifest records it.
                        enablesTools:
                          type: array
                          items:
                            type: string
                        progress:
                          type:
                            - object
                            - 'null'
                          properties:
                            percent:
                              type: number
                            stage:
                              type: string
                        error:
                          type:
                            - string
                            - 'null'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags:
        - Features
      summary: 安装功能包
      description: |
        开始异步安装 AI 功能包。下载模型并配置 Python sidecar。返回一个 jobId，用于通过 SSE 端点跟踪进度。需要 features:manage 权限。

        安装在服务器端串行化：在另一个安装正在运行时发出的请求会被排队（queued=true），而不是被拒绝，并在运行中的安装完成后自动开始。对同一个正在进行的功能包的重复请求会被去重，并返回相同的 jobId。
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '202':
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: True when the install was queued behind another running install instead of starting immediately.
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/admin/features/{bundleId}/uninstall:
    post:
      operationId: uninstallFeature
      tags:
        - Features
      summary: 卸载功能包
      description: |
        卸载 AI 功能包并删除其模型文件（除非与另一个已安装的功能包共享）。需要 features:manage 权限。
      security:
        - bearerAuth: []
      parameters:
