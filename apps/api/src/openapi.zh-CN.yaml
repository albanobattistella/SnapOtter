  /api/v1/tools/image/transparency-fixer:
    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: 修复伪透明
      description: |
        修复“伪透明”PNG，即先前背景移除留下的边缘、光晕或半透明瑕疵。使用 BiRefNet HR-matting（2048x2048）生成干净的 alpha 通道，并可配置去边处理。在 OOM 时回退到 birefnet-general，再回退到 u2net。需要安装 background-removal 功能包。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
