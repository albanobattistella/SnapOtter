                  previewWidth:
                    type: integer
                  previewHeight:
                    type: integer
                  landmarks:
                    type: object
                    description: Normalized face landmark coordinates (0-1)
                    properties:
                      leftEye:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      rightEye:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      eyeCenter:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      chin:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      forehead:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      crown:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      nose:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      faceCenterX:
                        type: number
                  imageWidth:
                    type: integer
                  imageHeight:
                    type: integer
