  /api/v1/config/analytics:
    get:
      operationId: getAnalyticsConfig
      tags:
        - Analytics
      summary: 获取分析配置
      description: |
        返回生效的分析提供程序配置。仅当编译时烘焙和实例 analyticsEnabled 设置都允许时，分析才会启用。禁用时，keys、DSN 和 instanceId 均为空。公开端点。
      security: []
      responses:
        '200':
          description: Analytics configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: |
                      Effective analytics state. True only when both the
                      compile-time bake and the instance analyticsEnabled
                      setting are on. When false, the keys, DSN, and instanceId
                      are blank.
                  posthogApiKey:
                    type: string
                  posthogHost:
                    type: string
                  sentryDsn:
                    type: string
                  sentryDsnWeb:
                    type: string
                  posthogSampleRate:
                    type: number
                  instanceId:
                    type: string
  /api/v1/features:
    get:
      operationId: listFeatures
      tags:
        - Features
      summary: 列出功能包
      description: |
        返回所有可用的 AI 功能包及其安装状态。在非 Docker 环境中，所有功能包均显示为已安装。
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feature bundle list
          content:
