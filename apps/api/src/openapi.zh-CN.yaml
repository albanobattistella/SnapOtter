        - Tools
      summary: AI 画布扩展（实验性）
      description: |
        使用 AI 外绘扩展图像画布。通过生成与原图无缝融合的新内容，向任意方向扩展图像。使用基于 LaMa 的外绘。需要安装 ai-canvas-expand 功能包。
      security:
