  /api/v1/tools/image/remove-background/effects:
    post:
      operationId: applyBackgroundEffects
      tags:
        - Tools
      summary: Arka plan efektlerini uygula
      description: |
        Daha önce işlenmiş bir remove-background sonucuna arka plan değişimi veya efektleri uygulayın. Önceki bir POST /api/v1/tools/image/remove-background çağrısından bir jobId gerektirir.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - settings
              properties:
                backgroundImage:
                  type: string
                  format: binary
                  description: Custom background image (required when backgroundType is "image")
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `jobId` (string, required) - Job ID from the initial remove-background call
                    - `filename` (string, required) - Original filename
                    - `backgroundType` (string) - One of: transparent, color, gradient, blur, image
                    - `backgroundColor` (string) - Hex color for solid background
                    - `gradientColor1` (string) - First gradient color
                    - `gradientColor2` (string) - Second gradient color
                    - `gradientAngle` (number) - Gradient angle in degrees
                    - `blurEnabled` (boolean) - Enable background blur effect
                    - `blurIntensity` (number 0-100) - Blur strength
                    - `shadowEnabled` (boolean) - Enable drop shadow
                    - `shadowOpacity` (number 0-100) - Shadow opacity
      responses:
        '200':
          description: Image with applied effects
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  processedSize:
                    type: integer
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/transparency-fixer:
    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: Sahte saydamlığı düzelt
      description: |
        Önceki bir arka plan kaldırmadan kaynaklanan saçaklanma, hale veya yarı saydam
        kusurları olan "sahte saydam" PNG'leri düzeltin. Yapılandırılabilir defringe işlemesiyle
        temiz bir alfa kanalı üretmek için BiRefNet HR-matting (2048x2048) kullanır.
        OOM durumunda birefnet-general'e, ardından u2net'e geri döner. background-removal
        özellik paketinin kurulu olmasını gerektirir.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
