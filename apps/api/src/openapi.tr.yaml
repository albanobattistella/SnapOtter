                        width:
                          type: integer
                        height:
                          type: integer
                        textBoxes:
                          type: array
                          items:
                            type: object
                            properties:
                              id:
                                type: string
                              x:
                                type: number
                              'y':
                                type: number
                              width:
                                type: number
                              height:
                                type: number
                              defaultText:
                                type: string
        '401':
          description: Authentication required
