  /api/v1/tools/image/smart-crop:
    post:
      operationId: smartCrop
      tags:
        - Tools
      summary: Akıllı kırpma
      description: 'Üç modlu akıllı kırpma: özne odağı, yüz odağı veya otomatik kırpma.'
