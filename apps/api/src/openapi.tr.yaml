      operationId: splitImage
      tags:
        - Tools
      summary: Görüntüyü böl
      description: Bir görüntüyü döşeme ızgarasına bölün. Bir ZIP dosyası döndürür.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to split
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `columns` (number 1-100, default 3) - Number of columns
                    - `rows` (number 1-100, default 3) - Number of rows
                    - `tileWidth` (number, min 10, optional) - Fixed tile width in pixels
                    - `tileHeight` (number, min 10, optional) - Fixed tile height in pixels
                    - `outputFormat` (string, default "original") - One of: original, png, jpg, webp, avif, jxl
                    - `quality` (number 1-100, default 90) - Output quality
      responses:
        '200':
          description: ZIP archive with results
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/bulk-rename:
    post:
      operationId: bulkRename
      tags:
        - Tools
      summary: Toplu yeniden adlandırma
      description: Bir desen şablonu kullanarak birden fazla görüntüyü yeniden adlandırın. {{index}}, {{padded}} ve {{original}} jetonlarını destekler. Bir ZIP dosyası döndürür.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Multiple image files to rename
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `pattern` (string 1-1000, default "image-{{index}}") - Naming pattern template
                    - `startIndex` (number, default 1) - Starting index number
      responses:
        '200':
          description: ZIP archive with results
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
