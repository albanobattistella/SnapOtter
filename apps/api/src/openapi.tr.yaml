      summary: Bir hattı kaydet
      description: Daha sonra yürütmek için adlandırılmış bir hat tanımını araç adımlarıyla kalıcı kılın. Yeniden kullanılabilir iş akışlarını kaydetmek için bunu kullanın.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - steps
              properties:
                name:
                  type: string
                description:
                  type: string
                  description: Optional human-readable description of the pipeline
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      toolId:
                        type: string
                      settings:
                        type: object
      responses:
        '201':
          description: Pipeline saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the pipeline
                  steps:
                    type: array
                    items:
                      type: object
                  createdAt:
                    type: string
                    format: date-time
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/pipeline/list:
