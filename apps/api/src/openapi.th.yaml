  /api/v1/tools/image/passport-photo/generate:
    post:
      operationId: generatePassportPhoto
      tags:
        - Tools
      summary: รูปถ่ายหนังสือเดินทาง - สร้าง
      description: |
        เฟส 2 ของการสร้างรูปถ่ายหนังสือเดินทาง ใช้ jobId และจุดสังเกตจากเฟสวิเคราะห์เพื่อครอบตัด ปรับขนาด และเรียงภาพให้ตรงตามข้อกำหนดของประเทศ/เอกสารที่ระบุ ตอบกลับเร็ว (ไม่รัน AI ซ้ำ)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jobId
                - filename
                - countryCode
                - landmarks
                - imageWidth
                - imageHeight
              properties:
                jobId:
                  type: string
                  description: Job ID from the analyze phase
                filename:
                  type: string
                  description: Original filename from analyze phase
                countryCode:
                  type: string
                  description: ISO country code for passport specification
                documentType:
                  type: string
                  default: passport
                  description: Document type (passport, visa, etc.)
                bgColor:
                  type: string
                  default: '#FFFFFF'
                  description: Background color (hex)
                printLayout:
                  type: string
                  default: none
                  description: Print sheet layout (none, 4x6, A4, letter)
                maxFileSizeKb:
                  type: number
                  default: 0
                  description: Max file size in KB (0 = no limit)
                dpi:
                  type: number
                  minimum: 72
                  maximum: 1200
                  default: 300
                  description: Output DPI
                customWidthMm:
                  type: number
                  description: Custom photo width in mm (overrides country spec)
                customHeightMm:
                  type: number
                  description: Custom photo height in mm (overrides country spec)
                zoom:
                  type: number
                  minimum: 0.5
                  maximum: 3
                  default: 1
                  description: Zoom level (>1 = tighter crop)
                adjustX:
                  type: number
                  default: 0
                  description: Horizontal position adjustment
                adjustY:
                  type: number
                  default: 0
                  description: Vertical position adjustment
                landmarks:
                  type: object
                  description: Face landmarks from analyze phase
                imageWidth:
                  type: integer
                  description: Original image width from analyze phase
                imageHeight:
                  type: integer
                  description: Original image height from analyze phase
      responses:
        '200':
          description: Generated passport photo
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  dimensions:
                    type: object
                    properties:
                      widthMm:
                        type: number
