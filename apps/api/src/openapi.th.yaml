        - Tools
      summary: ตัวสร้าง QR code
      description: สร้างภาพ QR code จากข้อความ เครื่องมือนี้รับ JSON body ไม่ใช่ multipart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  maxLength: 2000
                  description: Text to encode in the QR code
                size:
                  type: integer
                  minimum: 100
                  maximum: 10000
                  default: 400
                  description: Image size in pixels
                errorCorrection:
                  type: string
                  enum:
                    - L
                    - M
                    - Q
                    - H
                  default: M
                foreground:
                  type: string
                  default: '#000000'
                  description: Foreground color (hex)
                background:
                  type: string
                  default: '#FFFFFF'
                  description: Background color (hex)
      responses:
        '200':
          description: Generated QR code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/html-to-image:
    post:
      operationId: captureWebpage
      tags:
        - Tools
      summary: จับภาพหน้าเว็บเป็นรูปภาพ
      description: จับภาพหน้าเว็บเป็นภาพหน้าจอคุณภาพสูง รับ JSON body ที่มี URL และตัวเลือกการจับภาพ
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  description: URL to capture (http/https only)
                format:
                  type: string
                  enum:
                    - jpg
                    - png
                    - webp
                  default: png
                quality:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 90
                fullPage:
                  type: boolean
                  default: false
                devicePreset:
                  type: string
                  enum:
                    - desktop
                    - tablet
                    - mobile
                    - custom
                  default: desktop
                viewportWidth:
                  type: integer
                  minimum: 320
                  maximum: 3840
                  default: 1280
                viewportHeight:
                  type: integer
                  minimum: 320
                  maximum: 2160
                  default: 720
      responses:
        '200':
          description: Screenshot captured successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid URL or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '503':
          description: Browser service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '504':
          description: Page load timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/strip-metadata/inspect:
    post:
      operationId: inspectMetadata
