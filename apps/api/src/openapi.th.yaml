      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to preview
      responses:
        '200':
          description: WebP preview image
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/files:
    get:
      operationId: listFiles
      tags:
        - Files
      summary: แสดงไฟล์ที่บันทึกไว้
      description: คืนเวอร์ชันล่าสุดของแต่ละไฟล์ (หนึ่งรายการต่อสายเวอร์ชัน) รองรับการแบ่งหน้าและการค้นหา
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of files to return (default 50)
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Number of files to skip for pagination (default 0)
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          description: Filter files by original filename (substring match)
          schema:
            type: string
      responses:
        '200':
          description: List of saved files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        filename:
                          type: string
                        size:
                          type: integer
                        contentType:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total number of matching files (for pagination)
                  limit:
                    type: integer
                    description: Applied limit value
                  offset:
                    type: integer
                    description: Applied offset value
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    delete:
      operationId: bulkDeleteFiles
      tags:
        - Files
      summary: ลบไฟล์ที่บันทึกไว้เป็นชุด
      description: ลบไฟล์และสายเวอร์ชันทั้งหมด ผู้ใช้ที่ไม่ใช่แอดมินลบได้เฉพาะไฟล์ของตนเอง
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: File IDs to delete (deletes entire version chain for each)
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    description: Total number of records deleted across all version chains
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/files/upload:
    post:
      operationId: saveFileToLibrary
      tags:
        - Files
      summary: บันทึกไฟล์ลงคลัง
      description: อัปโหลดไฟล์ภาพหนึ่งไฟล์ขึ้นไปเข้าคลังไฟล์โดยตรงเพื่อจัดเก็บถาวรและติดตามเวอร์ชัน
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Files uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      description: Full file object with all metadata
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/files/save-result:
    post:
      operationId: saveProcessingResult
      tags:
        - Files
      summary: บันทึกผลการประมวลผลลงคลัง
      description: บันทึกผลการประมวลผลของเครื่องมือเป็นเวอร์ชันใหม่ของไฟล์ที่มีอยู่ สร้างสายเวอร์ชัน
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - parentId
              properties:
                file:
                  type: string
                  format: binary
                  description: The processed image file
                parentId:
                  type: string
                  description: ID of the parent file in the version chain
                toolId:
                  type: string
                  description: Tool that produced this result
      responses:
        '201':
          description: File saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    description: Full file object with all metadata
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Parent file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/files/{id}:
    get:
      operationId: getFile
      tags:
        - Files
      summary: รับเมทาดาทาและประวัติเวอร์ชันของไฟล์
      description: ดึงเมทาดาทาและประวัติเวอร์ชันทั้งหมดของไฟล์ที่บันทึกไว้ ใช้เพื่อตรวจดูรายละเอียดไฟล์ก่อนดาวน์โหลด
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Saved file UUID
          schema:
            type: string
      responses:
        '200':
          description: File metadata with version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    properties:
                      id:
                        type: string
                      originalName:
                        type: string
                      mimeType:
                        type: string
                      size:
                        type: integer
                      width:
                        type: integer
                      height:
                        type: integer
                      version:
                        type: integer
                      parentId:
                        type:
                          - string
                          - 'null'
                      toolChain:
                        type: array
                        items:
                          type: string
                      createdAt:
                        type: string
                        format: date-time
                  versions:
                    type: array
                    items:
                      type: object
                    description: Full version chain of this file
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/files/{id}/download:
    get:
      operationId: downloadSavedFile
      tags:
        - Files
      summary: ดาวน์โหลดไฟล์ที่บันทึกไว้
      description: ดาวน์โหลดเนื้อหาไบนารีของไฟล์ที่บันทึกไว้จากคลังตาม ID
      security:
