  /api/v1/tools/image/transparency-fixer:
    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: แก้ความโปร่งใสปลอม
      description: |
        แก้ไฟล์ PNG แบบ "โปร่งใสปลอม" ที่มีขอบสี รัศมี หรือจุดกึ่งโปร่งใสจากการลบพื้นหลังก่อนหน้า ใช้ BiRefNet HR-matting (2048x2048) เพื่อสร้างช่องอัลฟาที่สะอาดพร้อมการประมวลผล defringe ที่ปรับได้ สำรองด้วย birefnet-general แล้วเป็น u2net เมื่อหน่วยความจำไม่พอ ต้องติดตั้งชุดฟีเจอร์ background-removal
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
