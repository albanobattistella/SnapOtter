  /api/v1/files/{id}/thumbnail:
    get:
      operationId: getFileThumbnail
      tags:
        - Files
      summary: รับภาพย่อของไฟล์
      description: ดึงภาพย่อ JPEG ขนาด 300px ของไฟล์ที่บันทึกไว้ มีประโยชน์สำหรับมุมมองแกลเลอรีและตัวเรียกดูไฟล์
