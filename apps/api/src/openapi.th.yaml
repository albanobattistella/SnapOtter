      operationId: getAnalyticsConfig
      tags:
        - Analytics
      summary: รับการกำหนดค่า Analytics
      description: |
        คืนการกำหนดค่า analytics provider ที่มีผลจริง Analytics จะเปิดใช้เมื่อทั้งการ bake ตอนคอมไพล์และการตั้งค่า analyticsEnabled ของอินสแตนซ์อนุญาตเท่านั้น เมื่อปิดใช้งาน keys, DSN และ instanceId จะว่างเปล่า เป็นเอนด์พอยต์สาธารณะ
      security: []
      responses:
        '200':
          description: Analytics configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: |
                      Effective analytics state. True only when both the
                      compile-time bake and the instance analyticsEnabled
                      setting are on. When false, the keys, DSN, and instanceId
                      are blank.
                  posthogApiKey:
                    type: string
                  posthogHost:
                    type: string
                  sentryDsn:
                    type: string
                  sentryDsnWeb:
                    type: string
                  posthogSampleRate:
                    type: number
                  instanceId:
                    type: string
  /api/v1/features:
    get:
      operationId: listFeatures
      tags:
        - Features
      summary: แสดงชุดฟีเจอร์
      description: |
        คืนชุดฟีเจอร์ AI ที่มีอยู่ทั้งหมดและสถานะการติดตั้ง ในสภาพแวดล้อมที่ไม่ใช่ Docker ชุดฟีเจอร์ทั้งหมดจะแสดงว่าติดตั้งแล้ว
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feature bundle list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bundles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the feature bundle
                        status:
                          type: string
                          enum:
                            - installed
                            - not_installed
                            - installing
                            - queued
                            - error
                        installedVersion:
                          type:
                            - string
                            - 'null'
                        estimatedSize:
                          type: string
                        downloadBytes:
                          type:
                            - integer
                            - 'null'
                          description: Compressed archive size for this host's architecture, when the manifest records it. Null in native (non-Docker) mode or when unmeasured.
                        installedBytes:
                          type:
                            - integer
                            - 'null'
                          description: Extracted on-disk size for this host's architecture, when the manifest records it.
                        enablesTools:
                          type: array
                          items:
                            type: string
                        progress:
                          type:
                            - object
                            - 'null'
                          properties:
                            percent:
                              type: number
                            stage:
                              type: string
                        error:
                          type:
                            - string
                            - 'null'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags:
        - Features
      summary: ติดตั้งชุดฟีเจอร์
      description: |
        เริ่มการติดตั้งชุดฟีเจอร์ AI แบบ async ดาวน์โหลดโมเดลและกำหนดค่า Python sidecar คืน jobId สำหรับติดตามความคืบหน้าผ่านเอนด์พอยต์ SSE ต้องมีสิทธิ์ features:manage

        การติดตั้งถูกจัดลำดับที่ฝั่งเซิร์ฟเวอร์: คำขอที่ทำระหว่างที่การติดตั้งอื่นกำลังทำงานจะถูกเข้าคิว (queued=true) แทนที่จะถูกปฏิเสธ และเริ่มอัตโนมัติเมื่อการติดตั้งที่ทำงานอยู่เสร็จสิ้น คำขอซ้ำสำหรับชุดฟีเจอร์เดียวกันที่กำลังดำเนินการอยู่จะถูกรวมและคืน jobId เดิม
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '202':
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: True when the install was queued behind another running install instead of starting immediately.
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/admin/features/{bundleId}/uninstall:
