        - Tools
      summary: ถอดเสียงเป็นข้อความ
      description: |
        ถอดเสียงเป็นข้อความด้วย AI โดยใช้ faster-whisper ให้ผลลัพธ์เป็นข้อความธรรมดา หรือรูปแบบคำบรรยาย SRT หรือ VTT ต้องติดตั้งชุดฟีเจอร์ transcription
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio file to transcribe
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `language` (string, default "auto") - One of: auto, en, de, fr, es, zh, ja, ko, id, th, vi
                    - `outputFormat` (string, default "txt") - One of: txt, srt, vtt
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
