  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags:
        - Features
      summary: Ein Feature-Bundle installieren
      description: |
        Asynchrone Installation eines KI-Feature-Bundles starten. Lädt Modelle herunter und
        konfiguriert den Python-Sidecar. Gibt eine jobId zur Fortschrittsverfolgung
        über den SSE-Endpunkt zurück. Erfordert die Berechtigung features:manage.

        Installationen werden serverseitig serialisiert: Eine Anfrage, die während einer laufenden
        Installation gestellt wird, wird in die Warteschlange gestellt (queued=true) statt abgelehnt zu werden, und
        startet automatisch, wenn die laufende Installation abgeschlossen ist. Eine wiederholte
        Anfrage für dasselbe gerade laufende Bundle wird dedupliziert und gibt dieselbe
        jobId zurück.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '202':
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: True when the install was queued behind another running install instead of starting immediately.
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/admin/features/{bundleId}/uninstall:
    post:
      operationId: uninstallFeature
      tags:
