  /api/v1/pipeline/batch:
    post:
      operationId: batchPipeline
      tags:
        - Pipelines
      summary: Pipeline auf mehrere Dateien anwenden
      description: Eine Pipeline über mehrere Bilder ausführen. Gibt eine ZIP-Datei mit allen verarbeiteten Ergebnissen zurück.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - pipeline
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process
                pipeline:
                  type: string
                  description: |
                    JSON string with pipeline definition:
                    - `steps` (array, required, 1-20 items) - Pipeline steps
                    - `steps[].toolId` (string, required) - Tool ID for this step
                    - `steps[].settings` (object, optional) - Tool-specific settings
                clientJobId:
                  type: string
                  description: Optional client-provided job ID for progress tracking via SSE
      responses:
        '200':
          description: ZIP file with processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job ID for progress tracking
            X-File-Results:
              schema:
                type: string
              description: Percent-encoded JSON mapping of input index to output filename (decode with decodeURIComponent before JSON.parse)
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
