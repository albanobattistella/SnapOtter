      summary: Ein Feature-Bundle deinstallieren
      description: |
        Ein KI-Feature-Bundle deinstallieren und seine Modelldateien löschen (sofern nicht mit
        einem anderen installierten Bundle geteilt). Erfordert die Berechtigung features:manage.
      security:
