  /api/v1/readyz:
    get:
      operationId: readinessCheck
      tags:
        - System
      summary: Readiness-Check
      description: Prüft PostgreSQL, Redis, lokalen Festplattenplatz und, sofern konfiguriert, die Erreichbarkeit von S3. Öffentlicher Endpunkt für Load-Balancer und Orchestratoren.
      security: []
      responses:
        '200':
          description: Instance is ready to receive traffic
        '503':
          description: Instance is not ready to receive traffic
  /api/v1/jobs/{jobId}/cancel:
    post:
      operationId: cancelJob
      tags:
        - System
      summary: Job abbrechen
      description: Abbruch für einen wartenden oder laufenden Job anfordern.
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancellation request result
        '401':
          description: Authentication required
  /api/v1/preferences:
    get:
      operationId: getPreferences
      tags:
        - Settings
      summary: Benutzereinstellungen abrufen
      description: Die pro Benutzer geltende Einstellungskarte des aktuellen Benutzers zurückgeben.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Preference map
        '401':
          description: Authentication required
    put:
      operationId: updatePreferences
      tags:
        - Settings
      summary: Benutzereinstellungen aktualisieren
      description: Eine oder mehrere Einstellungen für den aktuellen Benutzer upserten.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Preferences updated
        '400':
          description: Invalid preferences body
        '401':
          description: Authentication required
  /api/auth/mfa/enroll:
    post:
      operationId: enrollMfa
      tags:
        - Auth
      summary: MFA-Einrichtung starten
      description: TOTP-MFA-Einrichtung für den aktuellen Benutzer starten. Erfordert das Enterprise-MFA-Feature.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Enrollment URI and recovery codes
        '401':
          description: Authentication required
        '403':
          description: MFA feature not licensed
        '409':
          description: MFA enrollment already enabled or pending
  /api/auth/mfa/verify:
    post:
      operationId: verifyMfaEnrollment
      tags:
        - Auth
      summary: MFA-Einrichtung verifizieren
      description: Ausstehende MFA-Einrichtung mit einem TOTP-Code bestätigen.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: MFA enabled
        '400':
          description: No pending enrollment or invalid body
        '401':
          description: Invalid TOTP code
  /api/auth/mfa/complete:
    post:
      operationId: completeMfaLogin
      tags:
        - Auth
      summary: MFA-Login abschließen
      description: Eine ausstehende Login-Challenge mit einem TOTP- oder Wiederherstellungscode abschließen.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mfaToken
                - code
              properties:
                mfaToken:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: Session token and user profile
        '400':
          description: Invalid request body
        '401':
          description: Invalid or expired MFA challenge
