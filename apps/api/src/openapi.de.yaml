      summary: Feature-Bundles auflisten
      description: |
        Gibt alle verfügbaren KI-Feature-Bundles und ihren Installationsstatus zurück.
        In Nicht-Docker-Umgebungen werden alle Bundles als installiert angezeigt.
      security:
