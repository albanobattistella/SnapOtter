      summary: Audio aufteilen
      description: |
        Audio nach Zeit, gleichen Teilen oder Stille-Erkennung aufteilen. Gibt eine
        ToolResponse mit einer downloadUrl zurück, die auf ein ZIP-Archiv der Segmente verweist.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
