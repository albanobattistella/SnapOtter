                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the role
                        permissions:
                          type: array
                          items:
                            type: string
                        isBuiltin:
                          type: boolean
                        userCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
    post:
      operationId: createRole
      tags:
        - Roles
      summary: Eine benutzerdefinierte Rolle erstellen
      description: |
        Eine neue benutzerdefinierte Rolle mit angegebenen Berechtigungen erstellen. Rollennamen müssen
        2-30 Zeichen lang sein, alphanumerisch klein geschrieben mit Bindestrichen und Unterstrichen.
        Erfordert die Berechtigung security:manage.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - permissions
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                  pattern: ^[a-z0-9_-]+$
                  description: Lowercase role name
                description:
                  type: string
                  description: Human-readable description
                permissions:
                  type: array
                  items:
                    type: string
                  description: |
                    Permission strings. Valid values: tools:use, files:own, files:all,
                    apikeys:own, apikeys:all, pipelines:own, pipelines:all,
                    settings:read, settings:write, users:manage, teams:manage,
                    features:manage, system:health, audit:read, security:manage
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the role
                  permissions:
                    type: array
                    items:
                      type: string
                  isBuiltin:
                    type: boolean
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '409':
          description: Role name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
