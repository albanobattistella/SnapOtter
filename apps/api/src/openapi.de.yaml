  /api/v1/tools/image/transparency-fixer:
    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: Falsche Transparenz beheben
      description: |
        "Falsch transparente" PNGs beheben, die Farbsäume, Halos oder halbtransparente
        Artefakte aus einer vorherigen Hintergrundentfernung aufweisen. Nutzt BiRefNet-HR-Matting
        (2048x2048), um einen sauberen Alphakanal mit konfigurierbarer Defringe-
        Verarbeitung zu erzeugen. Fällt bei OOM auf birefnet-general und dann u2net zurück. Erfordert
        das installierte background-removal-Feature-Bundle.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
