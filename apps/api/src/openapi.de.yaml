  /api/v1/config/analytics:
    get:
      operationId: getAnalyticsConfig
      tags:
        - Analytics
      summary: Analytics-Konfiguration abrufen
      description: |
        Gibt die effektive Analytics-Provider-Konfiguration zurück. Analytics ist
        nur aktiviert, wenn sowohl das Compile-Time-Bake als auch die Instanz-
        Einstellung analyticsEnabled es erlauben. Bei Deaktivierung sind keys, DSN und
        instanceId leer. Öffentlicher Endpunkt.
      security: []
      responses:
        '200':
          description: Analytics configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: |
                      Effective analytics state. True only when both the
                      compile-time bake and the instance analyticsEnabled
                      setting are on. When false, the keys, DSN, and instanceId
                      are blank.
                  posthogApiKey:
                    type: string
                  posthogHost:
                    type: string
                  sentryDsn:
                    type: string
                  sentryDsnWeb:
                    type: string
                  posthogSampleRate:
                    type: number
                  instanceId:
                    type: string
