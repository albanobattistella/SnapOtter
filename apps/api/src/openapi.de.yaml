    post:
      operationId: lqipPlaceholder
      tags:
        - Tools
      summary: LQIP-Platzhalter
      description: |
        Einen winzigen Low-Quality-Bildplatzhalter erzeugen. Gibt eine kleine Bilddatei
        sowie eine base64-Data-URI, ein einsatzbereites HTML-img-Tag und ein CSS-
        Hintergrund-Snippet im Antwort-JSON zurück.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `width` (integer 4-64, default 16) - Target width in pixels
                    - `blur` (number 0-20, default 2) - Blur radius (for blur strategy)
                    - `strategy` (string, default "blur") - One of: blur, pixelate, solid
                    - `format` (string, default "webp") - One of: webp, png, jpeg
                    - `quality` (integer 1-100, default 50) - Output quality
      responses:
        '200':
          description: LQIP placeholder image and data URI
