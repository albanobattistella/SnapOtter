    post:
      operationId: vectorizeImage
      tags:
        - Tools
      summary: Immagine in SVG
      description: Converti un'immagine raster nel formato vettoriale SVG usando potrace (B&N) o VTracer (colore).
      security:
        - bearerAuth: []
      requestBody:
        required: true
