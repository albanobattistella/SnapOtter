      description: |
        Converti una o più immagini in stringhe codificate in Base64 con data URI.
        Supporta conversione di formato e ridimensionamento opzionali. Restituisce sia la stringa
        Base64 grezza sia un data URI pronto all'uso per ogni file.
      security:
