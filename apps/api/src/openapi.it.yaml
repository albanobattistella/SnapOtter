  /api/v1/audit-log:
    get:
      operationId: queryAuditLog
      tags:
        - Audit
      summary: Interroga il registro di audit
      description: |
        Registro di audit paginato delle azioni amministrative. Supporta il filtro per
        tipo di azione e intervallo di date. Richiede il permesso audit:read.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Results per page (1-100, default 50)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: action
          in: query
          description: Filter by action type
          schema:
            type: string
        - name: from
          in: query
          description: Filter entries after this ISO 8601 date
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Filter entries before this ISO 8601 date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        actorId:
                          type:
                            - string
                            - 'null'
                        actorUsername:
                          type: string
                        action:
                          type: string
                        targetType:
                          type:
                            - string
                            - 'null'
                        targetId:
                          type:
                            - string
                            - 'null'
                        details:
                          type:
                            - object
                            - 'null'
                        ipAddress:
                          type:
                            - string
                            - 'null'
                        requestId:
                          type:
                            - string
                            - 'null'
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total matching entries
                  page:
                    type: integer
                  limit:
                    type: integer
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
  /api/v1/roles:
    get:
      operationId: listRoles
      tags:
        - Roles
      summary: Elenca ruoli
      description: |
        Elenca tutti i ruoli (integrati e personalizzati) con i loro permessi e il numero
        di utenti. Richiede il permesso audit:read.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the role
                        permissions:
                          type: array
                          items:
                            type: string
                        isBuiltin:
                          type: boolean
                        userCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
    post:
      operationId: createRole
      tags:
        - Roles
      summary: Crea un ruolo personalizzato
      description: |
        Crea un nuovo ruolo personalizzato con i permessi specificati. I nomi dei ruoli devono avere
        da 2 a 30 caratteri, alfanumerici minuscoli con trattini e trattini bassi.
        Richiede il permesso security:manage.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - permissions
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                  pattern: ^[a-z0-9_-]+$
                  description: Lowercase role name
                description:
                  type: string
                  description: Human-readable description
                permissions:
                  type: array
                  items:
                    type: string
                  description: |
                    Permission strings. Valid values: tools:use, files:own, files:all,
                    apikeys:own, apikeys:all, pipelines:own, pipelines:all,
                    settings:read, settings:write, users:manage, teams:manage,
                    features:manage, system:health, audit:read, security:manage
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the role
                  permissions:
                    type: array
                    items:
                      type: string
                  isBuiltin:
                    type: boolean
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '409':
          description: Role name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/roles/{id}:
    put:
      operationId: updateRole
      tags:
        - Roles
      summary: Aggiorna un ruolo personalizzato
      description: |
        Aggiorna nome, descrizione o permessi di un ruolo personalizzato. I ruoli
        integrati non possono essere modificati. Richiede il permesso security:manage.
      security:
        - bearerAuth: []
      parameters:
