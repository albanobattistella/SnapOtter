                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/histogram:
    post:
      operationId: histogram
      tags:
        - Tools
      summary: Istogramma
      description: |
        Genera un grafico a istogramma RGB da un'immagine. Restituisce un'immagine PNG dell'istogramma
        più le statistiche per canale e i dati grezzi dell'istogramma a 256 bin nel
        JSON della risposta.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to analyze
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `scale` (string, default "linear") - One of: linear, log
      responses:
        '200':
          description: Histogram image and channel statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      bins:
                        type: object
                        description: Raw 256-bin histogram arrays per channel
                        properties:
                          r:
                            type: array
                            items:
                              type: integer
                          g:
                            type: array
                            items:
                              type: integer
                          b:
                            type: array
                            items:
                              type: integer
                          lum:
                            type: array
                            items:
                              type: integer
                      stats:
                        type: object
                        description: Per-channel statistics
                        properties:
                          r:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          g:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          b:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          lum:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                      mean:
                        type: object
                        description: Backward-compatible mean values
                        properties:
                          r:
                            type: integer
                          g:
                            type: integer
                          b:
                            type: integer
                      max:
                        type: object
                        description: Backward-compatible max bin values
                        properties:
                          r:
                            type: integer
                          g:
                            type: integer
                          b:
                            type: integer
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/lqip-placeholder:
    post:
      operationId: lqipPlaceholder
      tags:
        - Tools
      summary: Segnaposto LQIP
      description: |
        Genera un piccolo segnaposto immagine a bassa qualità. Restituisce un piccolo file
        immagine più un data URI base64, un tag img HTML pronto all'uso e uno snippet CSS
        background nel JSON della risposta.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `width` (integer 4-64, default 16) - Target width in pixels
                    - `blur` (number 0-20, default 2) - Blur radius (for blur strategy)
                    - `strategy` (string, default "blur") - One of: blur, pixelate, solid
                    - `format` (string, default "webp") - One of: webp, png, jpeg
                    - `quality` (integer 1-100, default 50) - Output quality
      responses:
        '200':
          description: LQIP placeholder image and data URI
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      dataUri:
                        type: string
                        description: Complete data URI (data:mime;base64,...)
                      width:
                        type: integer
                        description: Placeholder width in pixels
                      height:
                        type: integer
                        description: Placeholder height in pixels
                      bytes:
                        type: integer
                        description: Placeholder file size in bytes
                      strategy:
                        type: string
                        description: Strategy used (blur, pixelate, or solid)
                      html:
                        type: string
                        description: Ready-to-use HTML img tag
                      css:
                        type: string
                        description: Ready-to-use CSS background-image snippet
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/sprite-sheet:
    post:
      operationId: spriteSheet
      tags:
        - Tools
      summary: Sprite sheet
      description: |
        Combina più immagini in un'unica griglia sprite sheet. Accetta
        da 2 a 64 immagini. Ogni immagine viene ridimensionata per corrispondere alle
        dimensioni della prima. Restituisce l'immagine sprite sheet più i metadati
        delle coordinate dei fotogrammi.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Two or more image files to combine (max 64)
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `columns` (integer 1-16, default 4) - Number of columns in the grid
                    - `padding` (integer 0-64, default 0) - Padding between cells in pixels
                    - `background` (string, default "#ffffff") - Background hex color
                    - `format` (string, default "png") - One of: png, webp, jpeg
                    - `quality` (integer 1-100, default 90) - Output quality
      responses:
        '200':
          description: Sprite sheet image with frame metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      frames:
                        type: array
                        description: Per-frame coordinates in the sprite sheet
                        items:
                          type: object
                          properties:
                            index:
                              type: integer
                            left:
                              type: integer
                            top:
                              type: integer
                            width:
                              type: integer
                            height:
                              type: integer
                      cols:
                        type: integer
                        description: Number of columns
                      rows:
                        type: integer
                        description: Number of rows
                      cellWidth:
                        type: integer
                        description: Cell width in pixels
                      cellHeight:
                        type: integer
                        description: Cell height in pixels
                      canvasWidth:
                        type: integer
                        description: Total canvas width in pixels
                      canvasHeight:
                        type: integer
                        description: Total canvas height in pixels
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/passport-photo:
    post:
      operationId: passportPhotoTool
      tags:
        - Tools
      summary: Foto tessera
      description: |
        Endpoint di guida per il flusso in due fasi della foto tessera. Usa
        `/api/v1/tools/image/passport-photo/analyze` per analizzare un'immagine,
        poi `/api/v1/tools/image/passport-photo/generate` per creare la foto tessera
        finale. Questa rotta di base restituisce un errore di guida 400 quando i
        bundle di funzionalità richiesti sono installati, o 501 quando mancano.
      security:
        - bearerAuth: []
      responses:
        '400':
          description: Use the analyze or generate endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
  /api/v1/tools/pdf/sign-pdf:
    post:
      operationId: signPdfTool
      tags:
        - Tools
      summary: Firma PDF
      description: Applica una o più immagini PNG di firma su un PDF usando posizionamenti di pagina normalizzati.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - placements
                - sig0
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to sign
                sig0:
                  type: string
                  format: binary
                  description: First signature image. Additional signatures use sig1, sig2, and so on.
                placements:
                  type: string
                  description: JSON array of placement objects with sig, page, x, y, w, and h. Coordinates are page fractions with top-left origin.
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
                fileId:
                  type: string
                  description: Optional file library ID to save the signed result as a new version
      responses:
        '200':
          description: Signed PDF
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input or settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
