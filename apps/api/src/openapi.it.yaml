  /api/v1/jobs/{jobId}/progress:
    get:
      operationId: getJobProgress
      tags:
        - System
      summary: Avanzamento job (SSE)
      description: |
        Stream Server-Sent Events per tracciare i job di lunga durata. Si chiude automaticamente 5 secondi dopo il completamento.
      security: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: Job UUID from a tool processing or installation response
          schema:
            type: string
      responses:
        '200':
          description: |
            SSE stream of job progress events. Two event types: `single` (single-file tools) and `batch` (batch processing). Single events have `status` and `progress`. Batch events have `completedFiles`, `totalFiles`, `failedFiles` (integers), and an `errors` array.
          content:
            text/event-stream:
              schema:
                type: object
                description: |
                  Event shape varies by type. Single: { status, progress }. Batch: { completedFiles, totalFiles, failedFiles, errors }.
                properties:
                  status:
                    type: string
                    enum:
                      - processing
                      - completed
                      - failed
                  progress:
                    type: integer
                    minimum: 0
                    maximum: 100
                  completedFiles:
                    type: integer
                    description: Number of completed files (batch mode)
                  totalFiles:
                    type: integer
                    description: Total files to process (batch mode)
                  failedFiles:
                    type: integer
                    description: Number of failed files (batch mode)
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        error:
                          type: string
                    description: Error details for failed files (batch mode)
  /api/v1/admin/health:
    get:
      operationId: adminHealthCheck
      tags:
        - Admin
      summary: Controllo di stato admin
      description: |
        Diagnostica completa del sistema, incluso stato del database, modalità di archiviazione, stato
        della coda e disponibilità della GPU. Richiede il permesso system:health.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Detailed system health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminHealthResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
  /api/v1/config/analytics:
    get:
      operationId: getAnalyticsConfig
      tags:
        - Analytics
      summary: Ottieni configurazione analytics
      description: |
        Restituisce la configurazione effettiva del provider di analytics. Le analytics sono
        abilitate solo quando sia il bake a tempo di compilazione sia l'impostazione
        analyticsEnabled dell'istanza lo consentono. Quando disabilitate, le chiavi, il DSN e
        l'instanceId sono vuoti. Endpoint pubblico.
      security: []
      responses:
        '200':
          description: Analytics configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: |
                      Effective analytics state. True only when both the
                      compile-time bake and the instance analyticsEnabled
                      setting are on. When false, the keys, DSN, and instanceId
                      are blank.
                  posthogApiKey:
                    type: string
                  posthogHost:
                    type: string
                  sentryDsn:
                    type: string
                  sentryDsnWeb:
                    type: string
                  posthogSampleRate:
                    type: number
                  instanceId:
                    type: string
  /api/v1/features:
    get:
      operationId: listFeatures
      tags:
        - Features
      summary: Elenca bundle di funzionalità
      description: |
        Restituisce tutti i bundle di funzionalità AI disponibili e il loro stato di installazione.
        Negli ambienti non Docker, tutti i bundle risultano installati.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feature bundle list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bundles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the feature bundle
                        status:
                          type: string
                          enum:
                            - installed
                            - not_installed
                            - installing
                            - queued
                            - error
                        installedVersion:
                          type:
                            - string
                            - 'null'
                        estimatedSize:
                          type: string
                        downloadBytes:
                          type:
                            - integer
                            - 'null'
                          description: Compressed archive size for this host's architecture, when the manifest records it. Null in native (non-Docker) mode or when unmeasured.
                        installedBytes:
                          type:
                            - integer
                            - 'null'
                          description: Extracted on-disk size for this host's architecture, when the manifest records it.
                        enablesTools:
                          type: array
                          items:
                            type: string
                        progress:
                          type:
                            - object
                            - 'null'
                          properties:
                            percent:
                              type: number
                            stage:
                              type: string
                        error:
                          type:
                            - string
                            - 'null'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags:
        - Features
      summary: Installa un bundle di funzionalità
      description: |
        Avvia l'installazione asincrona di un bundle di funzionalità AI. Scarica i modelli e
        configura il sidecar Python. Restituisce un jobId per il tracciamento dell'avanzamento
        tramite l'endpoint SSE. Richiede il permesso features:manage.

        Le installazioni sono serializzate lato server: una richiesta effettuata mentre un'altra
        installazione è in corso viene messa in coda (queued=true) anziché rifiutata, e
        parte automaticamente al termine dell'installazione in esecuzione. Una richiesta
        ripetuta per lo stesso bundle in corso viene deduplicata e restituisce lo stesso
        jobId.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '202':
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: True when the install was queued behind another running install instead of starting immediately.
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/admin/features/{bundleId}/uninstall:
    post:
      operationId: uninstallFeature
      tags:
        - Features
      summary: Disinstalla un bundle di funzionalità
      description: |
        Disinstalla un bundle di funzionalità AI ed elimina i suoi file di modello (a meno che non siano condivisi
        con un altro bundle installato). Richiede il permesso features:manage.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '200':
          description: Bundle uninstalled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle is not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
