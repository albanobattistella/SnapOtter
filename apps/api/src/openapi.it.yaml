      operationId: generateBarcode
      tags:
        - Tools
      summary: Generatore di codici a barre
      description: Genera un'immagine di codice a barre da un testo. Questo strumento accetta un corpo JSON, non multipart.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 256
                  description: Text to encode in the barcode
                type:
                  type: string
                  enum:
                    - code128
                    - ean13
                    - upca
                    - code39
                    - itf14
                    - datamatrix
                  default: code128
                  description: Barcode format
                scale:
                  type: integer
                  minimum: 1
                  maximum: 8
                  default: 3
                  description: Image scale factor
                includeText:
                  type: boolean
                  default: true
                  description: Whether to render the text below the barcode
      responses:
        '200':
          description: Generated barcode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/circle-crop:
    post:
      operationId: circleCrop
      tags:
        - Tools
      summary: Ritaglio circolare
      description: Ritaglia un'immagine in un cerchio centrato con angoli trasparenti, bordo opzionale e zoom/offset regolabili.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `zoom` (number 1-5, default 1) - Zoom factor (>=1 crops tighter)
                    - `offsetX` (number 0-1, default 0.5) - Horizontal center position
                    - `offsetY` (number 0-1, default 0.5) - Vertical center position
                    - `borderWidth` (integer 0-200, default 0) - Border width in pixels
                    - `borderColor` (string, default "#ffffff") - Border hex color
                    - `background` (string, default "transparent") - "transparent" or a hex color for corners
                    - `outputSize` (integer 16-4096, optional) - Final square dimension in pixels
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/duotone:
    post:
      operationId: duotone
      tags:
        - Tools
      summary: Duotone
      description: Applica un effetto duotone a due colori con colori personalizzati per ombre e luci.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `shadow` (string, default "#1e3a8a") - Shadow hex color
                    - `highlight` (string, default "#fbbf24") - Highlight hex color
                    - `intensity` (integer 0-100, default 100) - Effect intensity (0 = original, 100 = full duotone)
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/image-pad:
    post:
      operationId: imagePad
      tags:
        - Tools
      summary: Padding immagine
      description: Applica il padding a un'immagine fino a un rapporto d'aspetto target con uno sfondo a tinta unita, trasparente o sfocato.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `target` (string, default "1:1") - One of: 16:9, 9:16, 1:1, 4:3, 3:4, custom
                    - `ratioW` (integer 1-100, default 1) - Custom ratio width (when target is custom)
                    - `ratioH` (integer 1-100, default 1) - Custom ratio height (when target is custom)
                    - `background` (string, default "color") - One of: color, transparent, blur
                    - `color` (string, default "#ffffff") - Background hex color (when background is color)
                    - `padding` (integer 0-50, default 0) - Extra padding as percentage of canvas
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/pixelate:
    post:
      operationId: pixelate
      tags:
        - Tools
      summary: Pixella
      description: Applica un effetto di pixelizzazione all'intera immagine o a una regione rettangolare specifica.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `blockSize` (integer 2-128, default 12) - Pixel block size
                    - `region` (object, optional) - Restrict pixelation to a rectangle:
                      - `left` (integer >= 0) - Left offset in pixels
                      - `top` (integer >= 0) - Top offset in pixels
                      - `width` (integer >= 1) - Region width in pixels
                      - `height` (integer >= 1) - Region height in pixels
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/vignette:
    post:
      operationId: vignette
      tags:
        - Tools
      summary: Vignettatura
      description: Aggiungi un effetto di vignettatura con intensità, colore, raggio, morbidezza, rotondità e posizione del centro regolabili.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `strength` (number 0.1-1, default 0.5) - Vignette opacity
                    - `color` (string, default "#000000") - Vignette hex color
                    - `radius` (integer 0-100, default 70) - Outer radius as percentage of half-diagonal
                    - `softness` (integer 0-100, default 50) - Feather softness (higher = more gradual)
                    - `roundness` (integer 0-100, default 100) - 100 = circle, 0 = ellipse matching image aspect ratio
                    - `centerX` (integer 0-100, default 50) - Horizontal center position as percentage
                    - `centerY` (integer 0-100, default 50) - Vertical center position as percentage
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/gif-webp:
    post:
      operationId: gifWebp
      tags:
        - Tools
      summary: Convertitore GIF/WebP
      description: Converti GIF animate in WebP e viceversa, preservando tutti i fotogrammi. Accetta solo input .gif e .webp.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: GIF or WebP file to convert
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `quality` (integer 1-100, default 80) - Output quality for WebP encoding
                    - `lossless` (boolean, default false) - Use lossless WebP compression
                    - `resizePercent` (integer 10-100, default 100) - Scale the output by percentage
      responses:
        '200':
          description: Converted animation
          content:
            application/json:
