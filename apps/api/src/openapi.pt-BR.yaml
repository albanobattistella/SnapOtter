      operationId: generateQrCode
      tags:
        - Tools
      summary: Gerador de QR code
      description: Gera uma imagem de QR code a partir de texto. Esta ferramenta aceita um corpo JSON, não multipart.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  maxLength: 2000
                  description: Text to encode in the QR code
                size:
                  type: integer
                  minimum: 100
                  maximum: 10000
                  default: 400
                  description: Image size in pixels
                errorCorrection:
                  type: string
                  enum:
                    - L
                    - M
                    - Q
                    - H
                  default: M
                foreground:
                  type: string
                  default: '#000000'
                  description: Foreground color (hex)
                background:
                  type: string
                  default: '#FFFFFF'
                  description: Background color (hex)
      responses:
        '200':
          description: Generated QR code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
