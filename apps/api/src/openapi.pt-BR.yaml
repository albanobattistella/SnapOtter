    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: Corrigir falsa transparência
      description: |
        Corrige PNGs de "falsa transparência" que têm franjas, halos ou artefatos
        semitransparentes de uma remoção de fundo anterior. Usa BiRefNet HR-matting
        (2048x2048) para produzir um canal alpha limpo com processamento de defringe
        configurável. Faz fallback para birefnet-general e, em caso de OOM, para u2net. Requer
        o bundle de recurso background-removal instalado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
