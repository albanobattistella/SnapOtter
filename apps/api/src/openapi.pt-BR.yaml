      description: Recorta uma imagem em um círculo centralizado com cantos transparentes, borda opcional e zoom/deslocamento ajustáveis.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
