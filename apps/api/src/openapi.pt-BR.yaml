    post:
      operationId: findDuplicates
      tags:
        - Tools
      summary: Encontrar duplicatas
      description: Encontra imagens duplicadas em um conjunto usando hash perceptual.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Multiple image files to check for duplicates
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `threshold` (number 0-20, default 8) - Hamming distance threshold for duplicate detection
      responses:
        '200':
          description: Duplicate groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalImages:
                    type: integer
                  duplicateGroups:
                    type: array
                    items:
                      type: object
                      properties:
                        groupId:
                          type: integer
                        files:
                          type: array
                          items:
                            type: object
                            properties:
                              filename:
                                type: string
                              similarity:
                                type: number
                              width:
                                type: integer
                              height:
                                type: integer
                              fileSize:
                                type: integer
                              format:
                                type: string
                              isBest:
                                type: boolean
                              thumbnail:
                                type:
                                  - string
                                  - 'null'
                  uniqueImages:
                    type: integer
                  spaceSaveable:
                    type: integer
                  skippedFiles:
                    type: array
                    description: Files that could not be processed (present only when non-empty)
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        reason:
                          type: string
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
