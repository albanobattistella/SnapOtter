                    type: integer
                  height:
                    type: integer
                  pages:
                    type: integer
                    description: Number of frames
                  delay:
                    type: array
                    items:
                      type: integer
                    description: Per-frame delay in milliseconds
                  loop:
                    type: integer
                    description: Loop count (0 = infinite)
                  fileSize:
                    type: integer
                  duration:
                    type: integer
