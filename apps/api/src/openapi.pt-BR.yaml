                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/smart-crop:
    post:
      operationId: smartCrop
      tags:
        - Tools
      summary: Recorte inteligente
      description: 'Recorte inteligente com três modos: foco no objeto, foco no rosto ou corte automático.'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
