    post:
      operationId: captureWebpage
      tags:
        - Tools
      summary: Capturar página web como imagem
      description: Captura uma página web como uma imagem de captura de tela de alta qualidade. Aceita um corpo JSON com uma URL e opções de captura.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  description: URL to capture (http/https only)
                format:
                  type: string
                  enum:
                    - jpg
                    - png
                    - webp
                  default: png
                quality:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 90
                fullPage:
                  type: boolean
                  default: false
                devicePreset:
                  type: string
                  enum:
                    - desktop
                    - tablet
                    - mobile
                    - custom
                  default: desktop
                viewportWidth:
                  type: integer
                  minimum: 320
                  maximum: 3840
                  default: 1280
                viewportHeight:
                  type: integer
                  minimum: 320
                  maximum: 2160
                  default: 720
      responses:
        '200':
          description: Screenshot captured successfully
