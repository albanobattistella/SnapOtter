      description: |
        Endpoint de orientação para o fluxo de foto de passaporte em duas fases. Use
        `/api/v1/tools/image/passport-photo/analyze` para analisar uma imagem,
        depois `/api/v1/tools/image/passport-photo/generate` para criar a foto de
