              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 256
                  description: Text to encode in the barcode
                type:
                  type: string
                  enum:
                    - code128
                    - ean13
                    - upca
                    - code39
                    - itf14
                    - datamatrix
                  default: code128
                  description: Barcode format
                scale:
                  type: integer
                  minimum: 1
                  maximum: 8
                  default: 3
                  description: Image scale factor
                includeText:
                  type: boolean
                  default: true
                  description: Whether to render the text below the barcode
