  /api/v1/tools/{section}/{toolId}/batch:
    post:
      operationId: batchProcess
      tags:
        - Batch
      summary: Processar imagens em lote
      description: |
        Envia várias imagens por uma única ferramenta. Retorna um arquivo ZIP. A resposta inclui um cabeçalho X-Job-Id para acompanhar o progresso.
      security:
        - bearerAuth: []
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
          description: Tool section slug (image, video, audio, pdf, files)
        - name: toolId
          in: path
          required: true
          schema:
            type: string
          description: Tool identifier (e.g. resize, crop)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process (one or more)
                settings:
                  type: string
                  description: JSON string of tool settings applied to all images
      responses:
        '200':
          description: ZIP archive of processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job identifier for progress tracking
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
