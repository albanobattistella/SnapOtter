  /api/v1/tools/image/vectorize:
    post:
      operationId: vectorizeImage
      tags:
        - Tools
      summary: Imagem para SVG
      description: Converte uma imagem raster para o formato vetorial SVG usando potrace (P&B) ou VTracer (colorido).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
