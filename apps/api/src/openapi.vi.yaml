    get:
      operationId: getAuthConfig
      tags:
        - System
      summary: Cấu hình xác thực
      description: Kiểm tra xem xác thực có được bật trên phiên bản này không. Endpoint công khai được frontend dùng để xác định luồng đăng nhập.
      security: []
      responses:
        '200':
          description: Auth config
          content:
            application/json:
              schema:
                type: object
                properties:
                  authEnabled:
                    type: boolean
  /api/v1/jobs/{jobId}/progress:
    get:
      operationId: getJobProgress
      tags:
        - System
      summary: Tiến trình công việc (SSE)
      description: |
        Luồng Server-Sent Events để theo dõi các công việc chạy lâu. Tự động đóng 5 giây sau khi hoàn thành.
      security: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: Job UUID from a tool processing or installation response
          schema:
            type: string
      responses:
        '200':
          description: |
            SSE stream of job progress events. Two event types: `single` (single-file tools) and `batch` (batch processing). Single events have `status` and `progress`. Batch events have `completedFiles`, `totalFiles`, `failedFiles` (integers), and an `errors` array.
          content:
            text/event-stream:
              schema:
                type: object
                description: |
                  Event shape varies by type. Single: { status, progress }. Batch: { completedFiles, totalFiles, failedFiles, errors }.
                properties:
                  status:
                    type: string
                    enum:
                      - processing
                      - completed
                      - failed
                  progress:
                    type: integer
                    minimum: 0
                    maximum: 100
                  completedFiles:
                    type: integer
                    description: Number of completed files (batch mode)
                  totalFiles:
                    type: integer
                    description: Total files to process (batch mode)
                  failedFiles:
                    type: integer
                    description: Number of failed files (batch mode)
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        error:
                          type: string
                    description: Error details for failed files (batch mode)
  /api/v1/admin/health:
    get:
      operationId: adminHealthCheck
      tags:
        - Admin
      summary: Kiểm tra tình trạng admin
      description: |
        Chẩn đoán hệ thống đầy đủ bao gồm trạng thái cơ sở dữ liệu, chế độ lưu trữ, trạng thái
        hàng đợi và khả dụng của GPU. Yêu cầu quyền system:health.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Detailed system health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminHealthResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
  /api/v1/config/analytics:
    get:
      operationId: getAnalyticsConfig
      tags:
        - Analytics
      summary: Lấy cấu hình phân tích
      description: |
        Trả về cấu hình nhà cung cấp phân tích hiệu lực. Phân tích được
        bật chỉ khi cả bản dựng thời biên dịch và cài đặt
        analyticsEnabled của phiên bản cho phép. Khi bị tắt, các key, DSN và
        instanceId đều trống. Endpoint công khai.
      security: []
      responses:
        '200':
          description: Analytics configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: |
                      Effective analytics state. True only when both the
                      compile-time bake and the instance analyticsEnabled
                      setting are on. When false, the keys, DSN, and instanceId
                      are blank.
                  posthogApiKey:
                    type: string
                  posthogHost:
                    type: string
                  sentryDsn:
                    type: string
                  sentryDsnWeb:
                    type: string
                  posthogSampleRate:
                    type: number
                  instanceId:
                    type: string
  /api/v1/features:
    get:
      operationId: listFeatures
      tags:
        - Features
      summary: Liệt kê các gói tính năng
      description: |
        Trả về tất cả các gói tính năng AI khả dụng và trạng thái cài đặt của chúng.
        Trong môi trường không phải Docker, tất cả các gói hiển thị là đã cài đặt.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feature bundle list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bundles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the feature bundle
                        status:
                          type: string
                          enum:
                            - installed
                            - not_installed
                            - installing
                            - queued
                            - error
                        installedVersion:
                          type:
                            - string
                            - 'null'
                        estimatedSize:
                          type: string
                        downloadBytes:
                          type:
                            - integer
                            - 'null'
                          description: Compressed archive size for this host's architecture, when the manifest records it. Null in native (non-Docker) mode or when unmeasured.
                        installedBytes:
                          type:
                            - integer
                            - 'null'
                          description: Extracted on-disk size for this host's architecture, when the manifest records it.
                        enablesTools:
                          type: array
                          items:
                            type: string
                        progress:
                          type:
                            - object
                            - 'null'
                          properties:
                            percent:
                              type: number
                            stage:
                              type: string
                        error:
                          type:
                            - string
                            - 'null'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags:
        - Features
      summary: Cài đặt một gói tính năng
      description: |
        Bắt đầu cài đặt bất đồng bộ một gói tính năng AI. Tải xuống các mô hình và
        cấu hình sidecar Python. Trả về một jobId để theo dõi tiến trình
        qua endpoint SSE. Yêu cầu quyền features:manage.

        Các lần cài đặt được tuần tự hóa phía máy chủ: một yêu cầu được đưa ra khi một
        lần cài đặt khác đang chạy sẽ được xếp hàng (queued=true) thay vì bị từ chối, và
        tự động bắt đầu khi lần cài đặt đang chạy kết thúc. Một yêu cầu
        lặp lại cho cùng một gói đang xử lý sẽ được khử trùng lặp và trả về cùng một
        jobId.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '202':
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: True when the install was queued behind another running install instead of starting immediately.
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/admin/features/{bundleId}/uninstall:
    post:
      operationId: uninstallFeature
      tags:
        - Features
      summary: Gỡ cài đặt một gói tính năng
      description: |
        Gỡ cài đặt một gói tính năng AI và xóa các tệp mô hình của nó (trừ khi được chia sẻ
        với một gói đã cài đặt khác). Yêu cầu quyền features:manage.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '200':
          description: Bundle uninstalled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle is not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/admin/features/disk-usage:
    get:
      operationId: getFeatureDiskUsage
      tags:
        - Features
      summary: Dung lượng đĩa mô hình AI
      description: |
