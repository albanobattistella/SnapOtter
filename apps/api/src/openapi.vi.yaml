  /api/v1/pipeline/batch:
    post:
      operationId: batchPipeline
      tags:
        - Pipelines
      summary: Chạy pipeline trên nhiều tệp
      description: Thực thi một pipeline trên nhiều ảnh. Trả về một tệp ZIP chứa tất cả các kết quả đã xử lý.
      security:
