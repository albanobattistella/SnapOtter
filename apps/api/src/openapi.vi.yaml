                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/video/trim-video:
    post:
      operationId: trimVideo
      tags:
        - Tools
      summary: Cắt video
      description: Cắt một đoạn ra khỏi video.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Video file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `startS` (number >= 0, default 0) - Start time in seconds
                    - `endS` (number, required) - End time in seconds (must be after startS)
                    - `precise` (boolean, default false) - Re-encode for frame-accurate cuts instead of keyframe seek
      responses:
        '200':
          description: Processed video
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
