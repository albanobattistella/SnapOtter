        Yêu cầu quyền features:manage.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Disk usage
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalBytes:
                    type: integer
                    description: Total bytes used by AI model files
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
  /api/v1/audit-log:
    get:
      operationId: queryAuditLog
      tags:
        - Audit
      summary: Truy vấn nhật ký kiểm toán
      description: |
        Nhật ký kiểm toán phân trang của các hành động quản trị. Hỗ trợ lọc theo
        loại hành động và khoảng ngày. Yêu cầu quyền audit:read.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Results per page (1-100, default 50)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: action
          in: query
          description: Filter by action type
          schema:
            type: string
        - name: from
          in: query
          description: Filter entries after this ISO 8601 date
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Filter entries before this ISO 8601 date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        actorId:
                          type:
                            - string
                            - 'null'
                        actorUsername:
                          type: string
                        action:
                          type: string
                        targetType:
                          type:
                            - string
                            - 'null'
                        targetId:
                          type:
                            - string
                            - 'null'
                        details:
                          type:
                            - object
                            - 'null'
                        ipAddress:
                          type:
                            - string
                            - 'null'
                        requestId:
                          type:
                            - string
                            - 'null'
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total matching entries
                  page:
                    type: integer
                  limit:
                    type: integer
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
  /api/v1/roles:
    get:
      operationId: listRoles
      tags:
        - Roles
      summary: Liệt kê vai trò
      description: |
        Liệt kê tất cả vai trò (tích hợp sẵn và tùy chỉnh) với quyền và số lượng
        người dùng của chúng. Yêu cầu quyền audit:read.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the role
                        permissions:
                          type: array
                          items:
                            type: string
                        isBuiltin:
                          type: boolean
                        userCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
    post:
      operationId: createRole
      tags:
        - Roles
      summary: Tạo một vai trò tùy chỉnh
      description: |
        Tạo một vai trò tùy chỉnh mới với các quyền được chỉ định. Tên vai trò phải
        từ 2-30 ký tự, chữ thường chữ và số với dấu gạch nối và dấu gạch dưới.
        Yêu cầu quyền security:manage.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - permissions
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                  pattern: ^[a-z0-9_-]+$
                  description: Lowercase role name
                description:
                  type: string
                  description: Human-readable description
                permissions:
                  type: array
                  items:
                    type: string
                  description: |
                    Permission strings. Valid values: tools:use, files:own, files:all,
                    apikeys:own, apikeys:all, pipelines:own, pipelines:all,
                    settings:read, settings:write, users:manage, teams:manage,
                    features:manage, system:health, audit:read, security:manage
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the role
                  permissions:
                    type: array
                    items:
                      type: string
                  isBuiltin:
                    type: boolean
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '409':
          description: Role name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/roles/{id}:
    put:
      operationId: updateRole
      tags:
        - Roles
      summary: Cập nhật một vai trò tùy chỉnh
      description: |
        Cập nhật tên, mô tả hoặc quyền của một vai trò tùy chỉnh. Các vai trò tích hợp
        sẵn không thể sửa đổi. Yêu cầu quyền security:manage.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Role UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                description:
                  type: string
                  description: Updated description for the role
                permissions:
                  type: array
                  items:
                    type: string
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          description: Validation error or cannot modify built-in role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Role name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
    delete:
      operationId: deleteRole
      tags:
        - Roles
      summary: Xóa một vai trò tùy chỉnh
      description: |
        Xóa một vai trò tùy chỉnh. Người dùng được gán vai trò này sẽ được gán lại
        vai trò "user" mặc định. Các vai trò tích hợp sẵn không thể xóa. Yêu cầu
        quyền security:manage.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Role UUID
          schema:
            type: string
      responses:
        '200':
          description: Role deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          description: Cannot delete built-in role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/video/convert-video:
    post:
      operationId: convertVideo
      tags:
        - Tools
      summary: Chuyển đổi video
      description: Chuyển đổi video giữa MP4, MOV, WebM, AVI và MKV.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Video file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `format` (string, default "mp4") - One of: mp4, mov, webm, avi, mkv
                    - `quality` (string, default "balanced") - One of: high, balanced, small
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
