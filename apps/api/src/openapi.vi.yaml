      operationId: gifWebp
      tags:
        - Tools
      summary: Trình chuyển đổi GIF/WebP
      description: Chuyển đổi GIF động sang WebP và ngược lại, giữ tất cả các khung hình. Chỉ nhận đầu vào .gif và .webp.
