              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Failed to read image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/edit-metadata:
    post:
      operationId: editMetadata
      tags:
        - Tools
      summary: Chỉnh sửa metadata
      description: Chỉnh sửa các trường metadata EXIF, IPTC, GPS và các trường khác trong ảnh bằng ExifTool.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `title` (string) - Image title
                    - `author` (string) - Author name
                    - `artist` (string) - Artist or author name
                    - `copyright` (string) - Copyright notice
                    - `imageDescription` (string) - Image description
                    - `software` (string) - Software used
                    - `dateTime` (string) - Date/time string
                    - `dateTimeOriginal` (string) - Original capture date/time
                    - `clearGps` (boolean, default false) - Remove all GPS data
                    - `fieldsToRemove` (string[]) - Specific metadata fields to remove
                    - `gpsLatitude` (number -90 to 90) - GPS latitude
                    - `gpsLongitude` (number -180 to 180) - GPS longitude
                    - `gpsAltitude` (number) - GPS altitude in meters
                    - `keywords` (string[]) - Keywords or tags
                    - `keywordsMode` (string, default "add") - One of: add, set
                    - `dateShift` (string) - Shift dates by offset, e.g. "+2:00" or "-1:30"
                    - `setAllDates` (string) - Set all date fields to this value
                    - `iptcTitle` (string) - IPTC title
                    - `iptcHeadline` (string) - IPTC headline
                    - `iptcCity` (string) - IPTC city
                    - `iptcState` (string) - IPTC state or province
                    - `iptcCountry` (string) - IPTC country
      responses:
        '200':
          description: Image with updated metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/edit-metadata/inspect:
    post:
      operationId: inspectMetadataExifTool
      tags:
        - Tools
      summary: Kiểm tra metadata (ExifTool)
      description: Đọc toàn bộ metadata từ ảnh bằng ExifTool. Trả về tất cả các trường EXIF, IPTC, XMP và GPS được nhúng.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to inspect
      responses:
        '200':
          description: Full metadata object (keys vary by image)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Failed to read image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/{section}/{toolId}/batch:
    post:
      operationId: batchProcess
      tags:
        - Batch
      summary: Xử lý ảnh hàng loạt
      description: |
        Gửi nhiều ảnh qua một công cụ duy nhất. Trả về một tệp ZIP. Phản hồi bao gồm một header X-Job-Id để theo dõi tiến trình.
      security:
        - bearerAuth: []
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
          description: Tool section slug (image, video, audio, pdf, files)
        - name: toolId
          in: path
          required: true
          schema:
            type: string
          description: Tool identifier (e.g. resize, crop)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process (one or more)
                settings:
                  type: string
                  description: JSON string of tool settings applied to all images
      responses:
        '200':
          description: ZIP archive of processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job identifier for progress tracking
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/pipeline/execute:
    post:
      operationId: executePipeline
