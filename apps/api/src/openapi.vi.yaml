  /api/v1/tools/image/image-to-base64:
    post:
      operationId: imageToBase64
      tags:
        - Tools
      summary: Ảnh sang Base64
      description: |
        Chuyển đổi một hoặc nhiều ảnh sang chuỗi mã hóa Base64 với data URI.
        Hỗ trợ tùy chọn chuyển đổi định dạng và thay đổi kích thước. Trả về cả chuỗi
        Base64 thô và data URI sẵn dùng cho mỗi tệp.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: One or more image files to convert
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `outputFormat` (string, default "original") - One of: original, jpeg, png, webp, avif, jxl
                    - `quality` (integer 1-100, default 80) - Output quality for lossy formats
                    - `maxWidth` (integer, default 0) - Max width in pixels (0 = no limit)
                    - `maxHeight` (integer, default 0) - Max height in pixels (0 = no limit)
      responses:
        '200':
          description: Base64-encoded results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        mimeType:
                          type: string
                        width:
                          type: integer
                        height:
                          type: integer
                        originalSize:
                          type: integer
                          description: Original file size in bytes
                        encodedSize:
                          type: integer
                          description: Base64 string size in bytes
                        overheadPercent:
                          type: number
                          description: Size overhead of Base64 encoding
                        base64:
                          type: string
                          description: Raw Base64-encoded image data
                        dataUri:
                          type: string
                          description: Complete data URI (data:mime;base64,...)
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        error:
                          type: string
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
