  /api/v1/tools/audio/transcribe-audio:
    post:
      operationId: transcribeAudio
      tags:
        - Tools
      summary: Chép lời âm thanh
      description: |
        Chép lời chuyển giọng nói thành văn bản bằng AI dùng faster-whisper. Xuất
        văn bản thuần, định dạng phụ đề SRT hoặc VTT. Yêu cầu cài đặt gói tính năng
        transcription.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio file to transcribe
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `language` (string, default "auto") - One of: auto, en, de, fr, es, zh, ja, ko, id, th, vi
                    - `outputFormat` (string, default "txt") - One of: txt, srt, vtt
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
