  /api/v1/tools/image/transparency-fixer:
    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: Sửa độ trong suốt giả
      description: |
        Sửa các PNG "trong suốt giả" có viền lem, quầng sáng hoặc lỗi bán
        trong suốt từ lần xóa nền trước đó. Dùng BiRefNet HR-matting
        (2048x2048) để tạo kênh alpha sạch với xử lý khử viền có thể cấu hình.
        Dự phòng về birefnet-general, sau đó u2net khi hết bộ nhớ. Yêu cầu
        cài đặt gói tính năng background-removal.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
