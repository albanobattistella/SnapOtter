        - Pipelines
      summary: Thực thi một pipeline
      description: Chạy một ảnh qua một chuỗi công cụ. Định nghĩa pipeline được gửi dưới dạng chuỗi JSON trong trường multipart `pipeline`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - pipeline
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                pipeline:
                  type: string
                  description: 'JSON string: { "steps": [{ "toolId": "resize", "settings": {...} }, ...] }'
      responses:
        '200':
          description: Pipeline result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  originalSize:
                    type: integer
                  processedSize:
                    type: integer
                  stepsCompleted:
                    type: integer
                  steps:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
