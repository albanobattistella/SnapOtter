            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/smart-crop:
    post:
      operationId: smartCrop
      tags:
        - Tools
      summary: Розумне обрізання
      description: 'Розумне обрізання з трьома режимами: фокус на об''єкті, фокус на обличчі або автообрізання.'
      security:
        - bearerAuth: []
