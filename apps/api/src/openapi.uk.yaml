    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: Виправити фальшиву прозорість
      description: |
        Виправити "фальшиво прозорі" PNG, що мають облямівку, ореоли або напівпрозорі
        артефакти від попереднього видалення фону. Використовує BiRefNet HR-matting
        (2048x2048) для створення чистого альфа-каналу з налаштовуваною обробкою
        defringe. Резервно переходить на birefnet-general, потім u2net при OOM. Потребує
        встановленого пакета функцій background-removal.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
