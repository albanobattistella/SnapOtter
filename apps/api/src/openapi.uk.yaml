  /api/v1/readyz:
    get:
      operationId: readinessCheck
      tags:
        - System
      summary: Перевірка готовності
      description: Перевіряє PostgreSQL, Redis, локальний дисковий простір і доступність S3, коли налаштовано. Публічний ендпоінт для балансувальників навантаження та оркестраторів.
      security: []
      responses:
        '200':
          description: Instance is ready to receive traffic
        '503':
          description: Instance is not ready to receive traffic
  /api/v1/jobs/{jobId}/cancel:
    post:
      operationId: cancelJob
      tags:
        - System
      summary: Скасувати завдання
      description: Запросити скасування завдання в черзі або того, що виконується.
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancellation request result
        '401':
          description: Authentication required
  /api/v1/preferences:
    get:
      operationId: getPreferences
      tags:
        - Settings
      summary: Отримати налаштування користувача
      description: Повернути карту персональних налаштувань поточного користувача.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Preference map
        '401':
          description: Authentication required
    put:
      operationId: updatePreferences
      tags:
        - Settings
      summary: Оновити налаштування користувача
      description: Вставити або оновити одне чи кілька налаштувань для поточного користувача.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Preferences updated
        '400':
          description: Invalid preferences body
        '401':
          description: Authentication required
  /api/auth/mfa/enroll:
    post:
      operationId: enrollMfa
      tags:
        - Auth
      summary: Почати реєстрацію MFA
      description: Почати реєстрацію TOTP MFA для поточного користувача. Потребує enterprise-функції MFA.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Enrollment URI and recovery codes
        '401':
          description: Authentication required
        '403':
          description: MFA feature not licensed
        '409':
          description: MFA enrollment already enabled or pending
  /api/auth/mfa/verify:
    post:
      operationId: verifyMfaEnrollment
      tags:
        - Auth
      summary: Підтвердити реєстрацію MFA
      description: Підтвердити очікувану реєстрацію MFA кодом TOTP.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: MFA enabled
        '400':
          description: No pending enrollment or invalid body
        '401':
          description: Invalid TOTP code
  /api/auth/mfa/complete:
    post:
      operationId: completeMfaLogin
      tags:
        - Auth
      summary: Завершити вхід із MFA
      description: Завершити очікуваний виклик входу кодом TOTP або кодом відновлення.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mfaToken
                - code
              properties:
                mfaToken:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: Session token and user profile
        '400':
          description: Invalid request body
        '401':
          description: Invalid or expired MFA challenge
  /api/auth/mfa/disable:
    post:
      operationId: disableMfa
      tags:
        - Auth
      summary: Вимкнути MFA
      description: Вимкнути MFA для поточного користувача після перевірки коду TOTP.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: MFA disabled
        '400':
          description: MFA is not enabled or body is invalid
        '401':
          description: Authentication required or invalid code
  /api/auth/users/{id}/mfa/reset:
    post:
      operationId: resetUserMfa
      tags:
        - Auth
      summary: Скинути MFA користувача
      description: Адміністративне скидання реєстрації MFA користувача. Потребує дозволу users:manage.
