                  description: Image file to inspect
      responses:
        '200':
          description: Image metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  filename:
                    type: string
                  fileSize:
                    type: integer
                  exif:
                    type: object
                    description: EXIF metadata
                  exifError:
                    type: string
                    description: Present when EXIF parsing fails
                  gps:
                    type: object
                    description: GPS metadata
                  icc:
                    type: object
                    description: ICC profile metadata
                  xmp:
                    type: object
                    description: XMP metadata
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Failed to read image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/edit-metadata:
    post:
      operationId: editMetadata
      tags:
        - Tools
      summary: Редагувати метадані
      description: Редагувати поля метаданих EXIF, IPTC, GPS та інші в зображенні за допомогою ExifTool.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `title` (string) - Image title
                    - `author` (string) - Author name
                    - `artist` (string) - Artist or author name
                    - `copyright` (string) - Copyright notice
                    - `imageDescription` (string) - Image description
                    - `software` (string) - Software used
                    - `dateTime` (string) - Date/time string
                    - `dateTimeOriginal` (string) - Original capture date/time
                    - `clearGps` (boolean, default false) - Remove all GPS data
                    - `fieldsToRemove` (string[]) - Specific metadata fields to remove
                    - `gpsLatitude` (number -90 to 90) - GPS latitude
                    - `gpsLongitude` (number -180 to 180) - GPS longitude
                    - `gpsAltitude` (number) - GPS altitude in meters
                    - `keywords` (string[]) - Keywords or tags
                    - `keywordsMode` (string, default "add") - One of: add, set
                    - `dateShift` (string) - Shift dates by offset, e.g. "+2:00" or "-1:30"
                    - `setAllDates` (string) - Set all date fields to this value
                    - `iptcTitle` (string) - IPTC title
                    - `iptcHeadline` (string) - IPTC headline
                    - `iptcCity` (string) - IPTC city
                    - `iptcState` (string) - IPTC state or province
                    - `iptcCountry` (string) - IPTC country
      responses:
        '200':
          description: Image with updated metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/edit-metadata/inspect:
    post:
      operationId: inspectMetadataExifTool
      tags:
        - Tools
      summary: Переглянути метадані (ExifTool)
      description: Прочитати всі метадані із зображення за допомогою ExifTool. Повертає всі вбудовані поля EXIF, IPTC, XMP та GPS.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to inspect
      responses:
        '200':
          description: Full metadata object (keys vary by image)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Failed to read image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/{section}/{toolId}/batch:
    post:
      operationId: batchProcess
      tags:
        - Batch
      summary: Пакетна обробка зображень
      description: |
        Надіслати кілька зображень через один інструмент. Повертає файл ZIP. Відповідь містить заголовок X-Job-Id для відстеження прогресу.
      security:
        - bearerAuth: []
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
          description: Tool section slug (image, video, audio, pdf, files)
        - name: toolId
          in: path
          required: true
          schema:
            type: string
          description: Tool identifier (e.g. resize, crop)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process (one or more)
                settings:
                  type: string
                  description: JSON string of tool settings applied to all images
      responses:
        '200':
          description: ZIP archive of processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job identifier for progress tracking
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/pipeline/execute:
    post:
      operationId: executePipeline
      tags:
        - Pipelines
      summary: Виконати конвеєр
      description: Пропустити зображення через ланцюжок інструментів. Визначення конвеєра надсилається як рядок JSON у multipart-полі `pipeline`.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - pipeline
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                pipeline:
                  type: string
                  description: 'JSON string: { "steps": [{ "toolId": "resize", "settings": {...} }, ...] }'
      responses:
        '200':
          description: Pipeline result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  originalSize:
                    type: integer
                  processedSize:
                    type: integer
                  stepsCompleted:
                    type: integer
                  steps:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
  /api/v1/pipeline/save:
    post:
      operationId: savePipeline
      tags:
        - Pipelines
      summary: Зберегти конвеєр
      description: Зберегти іменоване визначення конвеєра з його кроками інструментів для подальшого виконання. Використовуйте для збереження багаторазових робочих процесів.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - steps
              properties:
                name:
                  type: string
                description:
                  type: string
                  description: Optional human-readable description of the pipeline
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      toolId:
                        type: string
                      settings:
                        type: object
      responses:
        '201':
          description: Pipeline saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the pipeline
                  steps:
                    type: array
                    items:
                      type: object
                  createdAt:
                    type: string
                    format: date-time
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/pipeline/list:
    get:
      operationId: listPipelines
      tags:
        - Pipelines
      summary: Список збережених конвеєрів
      description: Отримати всі збережені визначення конвеєрів для поточного користувача. Повертає назву, кроки та дату створення для кожного.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of pipelines
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelines:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the pipeline
                        steps:
                          type: array
                          items:
                            type: object
                        createdAt:
                          type: string
                          format: date-time
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/pipeline/{id}:
    delete:
      operationId: deletePipeline
      tags:
        - Pipelines
      summary: Видалити конвеєр
      description: Остаточно видалити збережений конвеєр за його ID. Видалити може лише власник конвеєра або адміністратор.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Pipeline UUID
          schema:
            type: string
      responses:
        '200':
          description: Pipeline deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Not authorized to delete this pipeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Pipeline not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/pipeline/tools:
    get:
      operationId: listPipelineTools
      tags:
        - Pipelines
      summary: Список інструментів, сумісних із конвеєром
      description: Повертає всі ID інструментів, які можна використовувати як кроки конвеєра.
      security: []
      responses:
        '200':
          description: Tool IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  toolIds:
                    type: array
                    items:
                      type: string
  /api/v1/pipeline/batch:
    post:
      operationId: batchPipeline
      tags:
        - Pipelines
      summary: Запустити конвеєр на кількох файлах
      description: Виконати конвеєр для кількох зображень. Повертає файл ZIP з усіма обробленими результатами.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - pipeline
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process
                pipeline:
                  type: string
                  description: |
                    JSON string with pipeline definition:
                    - `steps` (array, required, 1-20 items) - Pipeline steps
                    - `steps[].toolId` (string, required) - Tool ID for this step
                    - `steps[].settings` (object, optional) - Tool-specific settings
                clientJobId:
                  type: string
                  description: Optional client-provided job ID for progress tracking via SSE
      responses:
        '200':
          description: ZIP file with processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job ID for progress tracking
            X-File-Results:
              schema:
                type: string
              description: Percent-encoded JSON mapping of input index to output filename (decode with decodeURIComponent before JSON.parse)
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/upload:
    post:
      operationId: uploadImage
      tags:
        - Files
      summary: Завантажити зображення
      description: Завантажити необроблений файл зображення для подальшої обробки ендпоінтами інструментів. Повертає jobId та метадані файлу.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        size:
                          type: integer
                        format:
                          type: string
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/download/{jobId}/{filename}:
    get:
      operationId: downloadProcessedImage
      tags:
        - Files
      summary: Завантажити оброблене зображення
      description: Завантажити оброблене зображення за його job ID та іменем файлу. Це URL, що повертається у downloadUrl у відповідях інструментів.
      security: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: Job identifier from a tool processing response
          schema:
            type: string
        - name: filename
          in: path
          required: true
          description: Output filename from the processing response
          schema:
            type: string
      responses:
        '200':
          description: Image binary
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/preview:
    post:
      operationId: generatePreview
      tags:
        - Files
      summary: Згенерувати попередній перегляд зображення
      description: Конвертувати будь-яке зображення (зокрема HEIC/HEIF) у попередній перегляд WebP, зменшений до розмірів у межах 1200x1200 пікселів.
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to preview
      responses:
        '200':
          description: WebP preview image
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/files:
    get:
      operationId: listFiles
      tags:
        - Files
      summary: Список збережених файлів
      description: Повертає останню версію кожного файлу (по одній на ланцюжок версій). Підтримує пагінацію та пошук.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of files to return (default 50)
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Number of files to skip for pagination (default 0)
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          description: Filter files by original filename (substring match)
          schema:
            type: string
      responses:
        '200':
          description: List of saved files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        filename:
                          type: string
                        size:
                          type: integer
                        contentType:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total number of matching files (for pagination)
                  limit:
                    type: integer
                    description: Applied limit value
                  offset:
                    type: integer
                    description: Applied offset value
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    delete:
      operationId: bulkDeleteFiles
      tags:
        - Files
      summary: Масове видалення збережених файлів
      description: Видалити файли та їхні повні ланцюжки версій. Неадміністратори можуть видаляти лише власні файли.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: File IDs to delete (deletes entire version chain for each)
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    description: Total number of records deleted across all version chains
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/files/upload:
    post:
      operationId: saveFileToLibrary
      tags:
        - Files
      summary: Зберегти файл у бібліотеку
      description: Завантажити один або кілька файлів зображень безпосередньо до бібліотеки файлів для постійного зберігання та відстеження версій.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '201':
          description: Files uploaded
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      description: Full file object with all metadata
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/files/save-result:
    post:
      operationId: saveProcessingResult
      tags:
        - Files
      summary: Зберегти результат обробки в бібліотеку
      description: Зберегти результат обробки інструментом як нову версію наявного файлу. Створює ланцюжок версій.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - parentId
              properties:
                file:
                  type: string
                  format: binary
                  description: The processed image file
                parentId:
                  type: string
                  description: ID of the parent file in the version chain
                toolId:
                  type: string
                  description: Tool that produced this result
      responses:
        '201':
          description: File saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    description: Full file object with all metadata
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Parent file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/files/{id}:
    get:
      operationId: getFile
      tags:
        - Files
      summary: Отримати метадані файлу та історію версій
      description: Отримати метадані та повну історію версій збереженого файлу. Використовуйте для перегляду деталей файлу перед завантаженням.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Saved file UUID
          schema:
            type: string
      responses:
        '200':
          description: File metadata with version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    properties:
                      id:
                        type: string
                      originalName:
                        type: string
                      mimeType:
                        type: string
                      size:
                        type: integer
                      width:
                        type: integer
                      height:
                        type: integer
                      version:
                        type: integer
                      parentId:
                        type:
                          - string
                          - 'null'
                      toolChain:
                        type: array
                        items:
                          type: string
                      createdAt:
                        type: string
                        format: date-time
                  versions:
                    type: array
                    items:
                      type: object
                    description: Full version chain of this file
        '401':
          description: Authentication required
          content:
