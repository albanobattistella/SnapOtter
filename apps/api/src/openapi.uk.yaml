                    - `target` (string, default "1:1") - One of: 16:9, 9:16, 1:1, 4:3, 3:4, custom
                    - `ratioW` (integer 1-100, default 1) - Custom ratio width (when target is custom)
                    - `ratioH` (integer 1-100, default 1) - Custom ratio height (when target is custom)
                    - `background` (string, default "color") - One of: color, transparent, blur
                    - `color` (string, default "#ffffff") - Background hex color (when background is color)
                    - `padding` (integer 0-50, default 0) - Extra padding as percentage of canvas
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/pixelate:
    post:
      operationId: pixelate
      tags:
        - Tools
      summary: Пікселізація
      description: Застосувати ефект пікселізації до всього зображення або конкретної прямокутної області.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `blockSize` (integer 2-128, default 12) - Pixel block size
                    - `region` (object, optional) - Restrict pixelation to a rectangle:
                      - `left` (integer >= 0) - Left offset in pixels
                      - `top` (integer >= 0) - Top offset in pixels
                      - `width` (integer >= 1) - Region width in pixels
                      - `height` (integer >= 1) - Region height in pixels
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/vignette:
    post:
      operationId: vignette
      tags:
        - Tools
      summary: Віньєтка
      description: Додати ефект віньєтки з регульованими інтенсивністю, кольором, радіусом, м'якістю, округлістю та положенням центру.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `strength` (number 0.1-1, default 0.5) - Vignette opacity
                    - `color` (string, default "#000000") - Vignette hex color
                    - `radius` (integer 0-100, default 70) - Outer radius as percentage of half-diagonal
                    - `softness` (integer 0-100, default 50) - Feather softness (higher = more gradual)
                    - `roundness` (integer 0-100, default 100) - 100 = circle, 0 = ellipse matching image aspect ratio
                    - `centerX` (integer 0-100, default 50) - Horizontal center position as percentage
                    - `centerY` (integer 0-100, default 50) - Vertical center position as percentage
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/gif-webp:
    post:
      operationId: gifWebp
      tags:
        - Tools
      summary: Конвертер GIF/WebP
      description: Конвертувати анімований GIF у WebP і навпаки зі збереженням усіх кадрів. Приймає лише вхідні дані .gif та .webp.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: GIF or WebP file to convert
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `quality` (integer 1-100, default 80) - Output quality for WebP encoding
                    - `lossless` (boolean, default false) - Use lossless WebP compression
                    - `resizePercent` (integer 10-100, default 100) - Scale the output by percentage
      responses:
        '200':
          description: Converted animation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/histogram:
    post:
      operationId: histogram
      tags:
        - Tools
      summary: Гістограма
      description: |
        Згенерувати діаграму RGB-гістограми із зображення. Повертає зображення гістограми
        PNG плюс поканальну статистику та необроблені дані гістограми з 256 інтервалів у
        відповіді JSON.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to analyze
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `scale` (string, default "linear") - One of: linear, log
      responses:
        '200':
          description: Histogram image and channel statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      bins:
                        type: object
                        description: Raw 256-bin histogram arrays per channel
                        properties:
                          r:
                            type: array
                            items:
                              type: integer
                          g:
                            type: array
                            items:
                              type: integer
                          b:
                            type: array
                            items:
                              type: integer
                          lum:
                            type: array
                            items:
                              type: integer
                      stats:
                        type: object
                        description: Per-channel statistics
                        properties:
                          r:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          g:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          b:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          lum:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                      mean:
                        type: object
                        description: Backward-compatible mean values
                        properties:
                          r:
                            type: integer
                          g:
                            type: integer
                          b:
                            type: integer
                      max:
                        type: object
                        description: Backward-compatible max bin values
                        properties:
                          r:
                            type: integer
                          g:
                            type: integer
                          b:
                            type: integer
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/lqip-placeholder:
    post:
      operationId: lqipPlaceholder
      tags:
        - Tools
      summary: Заповнювач LQIP
      description: |
        Згенерувати крихітний низькоякісний заповнювач зображення. Повертає невеликий файл
        зображення плюс data URI у base64, готовий до використання тег HTML img та CSS-фрагмент
        фону у відповіді JSON.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `width` (integer 4-64, default 16) - Target width in pixels
                    - `blur` (number 0-20, default 2) - Blur radius (for blur strategy)
                    - `strategy` (string, default "blur") - One of: blur, pixelate, solid
                    - `format` (string, default "webp") - One of: webp, png, jpeg
                    - `quality` (integer 1-100, default 50) - Output quality
      responses:
        '200':
          description: LQIP placeholder image and data URI
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      dataUri:
                        type: string
                        description: Complete data URI (data:mime;base64,...)
                      width:
                        type: integer
                        description: Placeholder width in pixels
                      height:
                        type: integer
                        description: Placeholder height in pixels
                      bytes:
                        type: integer
                        description: Placeholder file size in bytes
                      strategy:
                        type: string
                        description: Strategy used (blur, pixelate, or solid)
                      html:
                        type: string
                        description: Ready-to-use HTML img tag
                      css:
                        type: string
                        description: Ready-to-use CSS background-image snippet
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/sprite-sheet:
    post:
      operationId: spriteSheet
      tags:
        - Tools
      summary: Спрайт-лист
      description: |
        Об'єднати кілька зображень в одну сітку спрайт-листа. Приймає
        від 2 до 64 зображень. Кожне зображення змінюється до розмірів першого
        зображення. Повертає зображення спрайт-листа плюс метадані координат
        кадрів.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Two or more image files to combine (max 64)
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `columns` (integer 1-16, default 4) - Number of columns in the grid
                    - `padding` (integer 0-64, default 0) - Padding between cells in pixels
                    - `background` (string, default "#ffffff") - Background hex color
                    - `format` (string, default "png") - One of: png, webp, jpeg
                    - `quality` (integer 1-100, default 90) - Output quality
      responses:
        '200':
          description: Sprite sheet image with frame metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      frames:
                        type: array
                        description: Per-frame coordinates in the sprite sheet
                        items:
                          type: object
                          properties:
                            index:
                              type: integer
                            left:
                              type: integer
                            top:
                              type: integer
                            width:
                              type: integer
                            height:
                              type: integer
                      cols:
                        type: integer
                        description: Number of columns
                      rows:
                        type: integer
                        description: Number of rows
                      cellWidth:
                        type: integer
                        description: Cell width in pixels
                      cellHeight:
                        type: integer
                        description: Cell height in pixels
                      canvasWidth:
                        type: integer
                        description: Total canvas width in pixels
                      canvasHeight:
                        type: integer
                        description: Total canvas height in pixels
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/passport-photo:
    post:
      operationId: passportPhotoTool
      tags:
        - Tools
      summary: Фото на паспорт
      description: |
        Довідковий ендпоінт для двофазного процесу створення фото на паспорт. Використовуйте
        `/api/v1/tools/image/passport-photo/analyze` для аналізу зображення,
        а потім `/api/v1/tools/image/passport-photo/generate` для створення фінального
        фото на паспорт. Цей базовий маршрут повертає довідкову помилку 400, коли
        потрібні пакети функцій встановлено, або 501, коли вони відсутні.
      security:
        - bearerAuth: []
      responses:
        '400':
          description: Use the analyze or generate endpoint
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
  /api/v1/tools/pdf/sign-pdf:
    post:
      operationId: signPdfTool
      tags:
        - Tools
      summary: Підписати PDF
      description: Проштампувати одне або кілька зображень підпису PNG на PDF за нормалізованими розміщеннями на сторінці.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - placements
                - sig0
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to sign
                sig0:
                  type: string
                  format: binary
                  description: First signature image. Additional signatures use sig1, sig2, and so on.
                placements:
                  type: string
                  description: JSON array of placement objects with sig, page, x, y, w, and h. Coordinates are page fractions with top-left origin.
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
                fileId:
                  type: string
                  description: Optional file library ID to save the signed result as a new version
      responses:
        '200':
          description: Signed PDF
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input or settings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
