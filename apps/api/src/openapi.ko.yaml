      description: |
        포함된 이미지를 다운샘플링하여 PDF 파일 크기를 줄입니다. "quality"
        모드에서는 1~100 슬라이더가 이미지 DPI를 제어합니다. "targetSize"
        모드에서는 이진 탐색으로 목표에 맞는 가장 높은 DPI를 찾습니다. 압축이
        파일을 오히려 키우는 경우 원본 바이트가 그대로 반환됩니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to compress
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "quality") - One of: quality, targetSize
                    - `quality` (integer 1-100, optional) - Compression quality (higher = less compression). Used in quality mode
                    - `targetSizeKb` (number, optional) - Target file size in kilobytes. Used in targetSize mode
      responses:
        '200':
          description: Compressed PDF
          content:
            application/json:
              schema:
