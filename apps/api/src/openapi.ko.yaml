  /api/v1/tools/image/passport-photo/analyze:
    post:
      operationId: analyzePassportPhoto
      tags:
        - Tools
      summary: 여권 사진 - 분석
      description: |
        여권 사진 생성의 1단계입니다. 얼굴 랜드마크를 감지하고 배경을
        제거합니다. 생성 단계에서 클라이언트가 사용할 랜드마크 데이터와
        base64로 인코딩된 미리보기를 반환합니다. passport-photo 기능
        번들이 설치되어 있어야 합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Photo with a clear, front-facing face
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '200':
          description: Face analysis and background removal result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID to pass to the generate endpoint
                  filename:
                    type: string
                  preview:
                    type: string
                    description: Base64-encoded PNG preview of the background-removed image
                  previewWidth:
                    type: integer
                  previewHeight:
                    type: integer
                  landmarks:
                    type: object
                    description: Normalized face landmark coordinates (0-1)
                    properties:
                      leftEye:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      rightEye:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      eyeCenter:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      chin:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      forehead:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      crown:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      nose:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      faceCenterX:
                        type: number
                  imageWidth:
                    type: integer
                  imageHeight:
                    type: integer
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: No face detected or analysis failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
  /api/v1/tools/image/passport-photo/generate:
    post:
      operationId: generatePassportPhoto
      tags:
        - Tools
      summary: 여권 사진 - 생성
      description: |
        여권 사진 생성의 2단계입니다. 분석 단계의 jobId와 랜드마크를 사용해
        지정된 국가/문서 사양에 맞게 사진을 자르고 크기를 조정하며 타일로
        배치합니다. 빠른 응답입니다(AI 재실행 없음).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jobId
                - filename
                - countryCode
                - landmarks
                - imageWidth
                - imageHeight
              properties:
                jobId:
                  type: string
                  description: Job ID from the analyze phase
                filename:
                  type: string
                  description: Original filename from analyze phase
                countryCode:
                  type: string
                  description: ISO country code for passport specification
                documentType:
                  type: string
                  default: passport
                  description: Document type (passport, visa, etc.)
                bgColor:
                  type: string
                  default: '#FFFFFF'
                  description: Background color (hex)
                printLayout:
                  type: string
                  default: none
                  description: Print sheet layout (none, 4x6, A4, letter)
                maxFileSizeKb:
                  type: number
                  default: 0
                  description: Max file size in KB (0 = no limit)
                dpi:
                  type: number
                  minimum: 72
                  maximum: 1200
                  default: 300
                  description: Output DPI
                customWidthMm:
                  type: number
                  description: Custom photo width in mm (overrides country spec)
                customHeightMm:
                  type: number
                  description: Custom photo height in mm (overrides country spec)
                zoom:
                  type: number
                  minimum: 0.5
                  maximum: 3
                  default: 1
                  description: Zoom level (>1 = tighter crop)
                adjustX:
                  type: number
                  default: 0
                  description: Horizontal position adjustment
                adjustY:
                  type: number
                  default: 0
                  description: Vertical position adjustment
                landmarks:
                  type: object
                  description: Face landmarks from analyze phase
                imageWidth:
                  type: integer
                  description: Original image width from analyze phase
                imageHeight:
                  type: integer
                  description: Original image height from analyze phase
      responses:
        '200':
          description: Generated passport photo
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  dimensions:
                    type: object
                    properties:
                      widthMm:
                        type: number
                      heightMm:
                        type: number
                      widthPx:
                        type: integer
                      heightPx:
                        type: integer
                      dpi:
                        type: integer
                  spec:
                    type: object
                    properties:
                      country:
                        type: string
                      countryCode:
                        type: string
                      documentType:
                        type: string
                      documentLabel:
                        type: string
                  printDownloadUrl:
                    type: string
                    description: URL for print sheet download (if printLayout was specified)
        '400':
          description: Invalid settings or unknown country code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/colorize:
    post:
      operationId: colorizeImage
      tags:
        - Tools
      summary: 색 입히기
      description: |
        AI 기반 사진 색 입히기입니다. OpenCV DNN 폴백과 함께 DDColor를 사용해
        흑백 또는 그레이스케일 사진을 풀 컬러로 변환합니다. colorize 기능
        번들이 설치되어 있어야 합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Grayscale or B&W image file
