  /api/v1/tools/image/transparency-fixer:
    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: 가짜 투명도 수정
      description: |
        이전 배경 제거로 인한 프린징, 헤일로, 반투명 아티팩트가 있는 "가짜
        투명" PNG를 수정합니다. BiRefNet HR-matting(2048x2048)을 사용해
        구성 가능한 defringe 처리로 깨끗한 알파 채널을 생성합니다. OOM 시
        birefnet-general, 그다음 u2net으로 폴백합니다. background-removal
        기능 번들이 설치되어 있어야 합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
