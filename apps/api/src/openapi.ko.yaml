      tags:
        - Tools
      summary: 객체 지우개
      description: 마스크를 사용해 이미지에서 객체를 지웁니다. 마스크의 흰색 영역이 지울 영역을 나타냅니다. LaMa inpainting을 사용합니다.
      security:
