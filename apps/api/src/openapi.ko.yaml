          content:
            application/json:
              schema:
                type: object
                properties:
                  width:
                    type: integer
                  height:
                    type: integer
                  pages:
                    type: integer
                    description: Number of frames
                  delay:
                    type: array
                    items:
                      type: integer
                    description: Per-frame delay in milliseconds
                  loop:
                    type: integer
                    description: Loop count (0 = infinite)
                  fileSize:
                    type: integer
                  duration:
                    type: integer
                    description: Total duration in milliseconds
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/smart-crop:
    post:
      operationId: smartCrop
      tags:
        - Tools
      summary: 스마트 자르기
      description: 피사체 초점, 얼굴 초점, 자동 트리밍의 세 가지 모드로 스마트 자르기를 수행합니다.
      security:
