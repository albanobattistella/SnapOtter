          multipart/form-data:
            schema:
              type: object
              required:
                - image
                - mask
              properties:
                image:
                  type: string
                  format: binary
                  description: Source image file
                mask:
                  type: string
                  format: binary
                  description: Mask image (white areas will be erased)
                format:
                  type: string
                  enum:
                    - auto
                    - png
                    - jpg
                    - jpeg
                    - webp
                    - tiff
                    - gif
                    - avif
                    - heic
                    - heif
                    - jxl
                  default: auto
                  description: Output format
                quality:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 95
                  description: Output quality
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
