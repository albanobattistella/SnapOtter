        분석하려면 `/api/v1/tools/image/passport-photo/analyze`을(를) 사용하고, 그다음 최종
        여권 사진을 만들려면 `/api/v1/tools/image/passport-photo/generate`을(를) 사용합니다. 이 기본 라우트는
        필요한 기능 번들이 설치되어 있으면 400 안내 오류를, 없으면 501을
        반환합니다.
