      summary: 오디오 분할
      description: |
        시간, 균등 분할 또는 무음 감지로 오디오를 분할합니다. 세그먼트의 ZIP
        아카이브를 가리키는 downloadUrl이 포함된 ToolResponse를 반환합니다.
      security:
        - bearerAuth: []
