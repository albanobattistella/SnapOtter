  /api/v1/fetch-urls:
    post:
      operationId: fetchImageUrls
      tags:
        - Files
      summary: URL에서 이미지 가져오기
      description: |
        외부 URL에서 하나 이상의 이미지를 가져옵니다. 각 URL은 SSRF 공격에
        대해 검증되고 크기가 제한되며 유효한 이미지인지 확인됩니다. 성공적으로
        가져온 각 이미지의 다운로드 URL을 반환합니다. 시간당 200개 요청으로 제한됩니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - urls
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  minItems: 1
                  maxItems: 50
                  description: URLs of images to fetch (1-50)
      responses:
        '200':
          description: Fetch results for each URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        success:
                          type: boolean
                        url:
                          type: string
                        filename:
                          type: string
                        contentType:
                          type: string
                        size:
                          type: integer
                        width:
                          type: integer
                        height:
                          type: integer
                        downloadUrl:
                          type: string
                        previewUrl:
                          type:
                            - string
                            - 'null'
                        error:
                          type: string
                          description: Present only when success is false
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
