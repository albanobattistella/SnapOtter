        - Tools
      summary: 향상을 위한 이미지 분석
      description: |
        이미지를 분석하여 적용하지 않고 제안된 보정을 반환합니다.
        어떤 향상이 이루어질지 미리 보는 데 유용합니다.
      security:
        - bearerAuth: []
      requestBody:
