          required: true
          description: Output filename from the processing response
          schema:
            type: string
      responses:
        '200':
          description: Image binary
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/preview:
    post:
      operationId: generatePreview
      tags:
        - Files
      summary: 이미지 미리보기 생성
      description: 모든 이미지(HEIC/HEIF 포함)를 1200x1200픽셀 이내에 맞게 크기가 조정된 WebP 미리보기로 변환합니다.
      security: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to preview
      responses:
        '200':
          description: WebP preview image
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/files:
    get:
      operationId: listFiles
      tags:
        - Files
      summary: 저장된 파일 목록
      description: 각 파일의 최신 버전(버전 체인당 하나)을 반환합니다. 페이지네이션과 검색을 지원합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of files to return (default 50)
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Number of files to skip for pagination (default 0)
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          description: Filter files by original filename (substring match)
          schema:
            type: string
      responses:
        '200':
          description: List of saved files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        filename:
                          type: string
                        size:
                          type: integer
                        contentType:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total number of matching files (for pagination)
                  limit:
                    type: integer
                    description: Applied limit value
                  offset:
                    type: integer
                    description: Applied offset value
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    delete:
      operationId: bulkDeleteFiles
      tags:
        - Files
      summary: 저장된 파일 일괄 삭제
      description: 파일과 전체 버전 체인을 삭제합니다. 비관리자 사용자는 자신의 파일만 삭제할 수 있습니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: File IDs to delete (deletes entire version chain for each)
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
