  /api/v1/config/analytics:
    get:
      operationId: getAnalyticsConfig
      tags:
        - Analytics
      summary: 분석 구성 가져오기
      description: |
        유효한 분석 제공자 구성을 반환합니다. 분석은 컴파일 타임 bake와 인스턴스
        analyticsEnabled 설정이 모두 허용할 때만 활성화됩니다. 비활성화된 경우
        키, DSN, instanceId는 비어 있습니다. 공개 엔드포인트입니다.
      security: []
      responses:
        '200':
          description: Analytics configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: |
                      Effective analytics state. True only when both the
                      compile-time bake and the instance analyticsEnabled
                      setting are on. When false, the keys, DSN, and instanceId
                      are blank.
                  posthogApiKey:
                    type: string
                  posthogHost:
                    type: string
                  sentryDsn:
                    type: string
                  sentryDsnWeb:
                    type: string
                  posthogSampleRate:
                    type: number
                  instanceId:
                    type: string
  /api/v1/features:
    get:
      operationId: listFeatures
      tags:
        - Features
      summary: 기능 번들 목록
      description: |
        사용 가능한 모든 AI 기능 번들과 설치 상태를 반환합니다.
        Docker가 아닌 환경에서는 모든 번들이 설치됨으로 표시됩니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feature bundle list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bundles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the feature bundle
                        status:
                          type: string
                          enum:
                            - installed
                            - not_installed
                            - installing
                            - queued
                            - error
                        installedVersion:
                          type:
                            - string
                            - 'null'
                        estimatedSize:
                          type: string
                        downloadBytes:
                          type:
                            - integer
                            - 'null'
                          description: Compressed archive size for this host's architecture, when the manifest records it. Null in native (non-Docker) mode or when unmeasured.
                        installedBytes:
                          type:
                            - integer
                            - 'null'
                          description: Extracted on-disk size for this host's architecture, when the manifest records it.
                        enablesTools:
                          type: array
                          items:
                            type: string
                        progress:
                          type:
                            - object
                            - 'null'
                          properties:
                            percent:
                              type: number
                            stage:
                              type: string
                        error:
                          type:
                            - string
                            - 'null'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags:
        - Features
      summary: 기능 번들 설치
      description: |
        AI 기능 번들의 비동기 설치를 시작합니다. 모델을 다운로드하고 Python
        사이드카를 구성합니다. SSE 엔드포인트를 통한 진행 상황 추적을 위해
        jobId를 반환합니다. features:manage 권한이 필요합니다.

        설치는 서버 측에서 직렬화됩니다. 다른 설치가 실행 중일 때 들어온 요청은
        거부되지 않고 큐에 대기되며(queued=true), 실행 중인 설치가 끝나면
        자동으로 시작됩니다. 진행 중인 동일 번들에 대한 반복 요청은 중복 제거되어
        동일한 jobId를 반환합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '202':
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: True when the install was queued behind another running install instead of starting immediately.
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/admin/features/{bundleId}/uninstall:
    post:
      operationId: uninstallFeature
      tags:
        - Features
      summary: 기능 번들 제거
      description: |
        AI 기능 번들을 제거하고 모델 파일을 삭제합니다(다른 설치된 번들과
        공유되지 않는 경우). features:manage 권한이 필요합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '200':
          description: Bundle uninstalled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle is not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/admin/features/disk-usage:
    get:
      operationId: getFeatureDiskUsage
      tags:
        - Features
      summary: AI 모델 디스크 사용량
