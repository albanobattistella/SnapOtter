  /api/v1/tools/image/histogram:
    post:
      operationId: histogram
      tags:
        - Tools
      summary: 히스토그램
      description: |
        이미지에서 RGB 히스토그램 차트를 생성합니다. PNG 히스토그램 이미지와
        함께 채널별 통계 및 원시 256-bin 히스토그램 데이터를 응답 JSON에
        반환합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to analyze
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `scale` (string, default "linear") - One of: linear, log
      responses:
        '200':
          description: Histogram image and channel statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      bins:
                        type: object
                        description: Raw 256-bin histogram arrays per channel
                        properties:
                          r:
                            type: array
                            items:
                              type: integer
                          g:
                            type: array
                            items:
                              type: integer
                          b:
                            type: array
                            items:
                              type: integer
                          lum:
                            type: array
                            items:
                              type: integer
                      stats:
                        type: object
                        description: Per-channel statistics
                        properties:
                          r:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          g:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          b:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          lum:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                      mean:
                        type: object
                        description: Backward-compatible mean values
                        properties:
                          r:
                            type: integer
                          g:
                            type: integer
                          b:
                            type: integer
                      max:
                        type: object
                        description: Backward-compatible max bin values
                        properties:
                          r:
                            type: integer
                          g:
                            type: integer
                          b:
                            type: integer
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/lqip-placeholder:
    post:
      operationId: lqipPlaceholder
      tags:
        - Tools
      summary: LQIP 플레이스홀더
      description: |
        작은 저품질 이미지 플레이스홀더를 생성합니다. 작은 이미지 파일과
        함께 base64 데이터 URI, 바로 사용할 수 있는 HTML img 태그, CSS
        background 스니펫을 응답 JSON에 반환합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `width` (integer 4-64, default 16) - Target width in pixels
                    - `blur` (number 0-20, default 2) - Blur radius (for blur strategy)
                    - `strategy` (string, default "blur") - One of: blur, pixelate, solid
                    - `format` (string, default "webp") - One of: webp, png, jpeg
                    - `quality` (integer 1-100, default 50) - Output quality
      responses:
        '200':
          description: LQIP placeholder image and data URI
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      dataUri:
                        type: string
                        description: Complete data URI (data:mime;base64,...)
                      width:
                        type: integer
                        description: Placeholder width in pixels
                      height:
                        type: integer
                        description: Placeholder height in pixels
                      bytes:
                        type: integer
                        description: Placeholder file size in bytes
                      strategy:
                        type: string
                        description: Strategy used (blur, pixelate, or solid)
                      html:
                        type: string
                        description: Ready-to-use HTML img tag
                      css:
                        type: string
                        description: Ready-to-use CSS background-image snippet
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/sprite-sheet:
    post:
      operationId: spriteSheet
      tags:
        - Tools
      summary: 스프라이트 시트
      description: |
        여러 이미지를 단일 스프라이트 시트 격자로 결합합니다. 2개에서
        64개 이미지를 받습니다. 각 이미지는 첫 번째 이미지의 크기에 맞게
        조정됩니다. 스프라이트 시트 이미지와 프레임 좌표 메타데이터를
        반환합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Two or more image files to combine (max 64)
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `columns` (integer 1-16, default 4) - Number of columns in the grid
                    - `padding` (integer 0-64, default 0) - Padding between cells in pixels
                    - `background` (string, default "#ffffff") - Background hex color
                    - `format` (string, default "png") - One of: png, webp, jpeg
                    - `quality` (integer 1-100, default 90) - Output quality
      responses:
        '200':
          description: Sprite sheet image with frame metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      frames:
                        type: array
                        description: Per-frame coordinates in the sprite sheet
                        items:
                          type: object
                          properties:
                            index:
                              type: integer
                            left:
                              type: integer
                            top:
                              type: integer
                            width:
                              type: integer
                            height:
                              type: integer
                      cols:
                        type: integer
                        description: Number of columns
                      rows:
                        type: integer
                        description: Number of rows
                      cellWidth:
                        type: integer
                        description: Cell width in pixels
                      cellHeight:
                        type: integer
                        description: Cell height in pixels
                      canvasWidth:
                        type: integer
                        description: Total canvas width in pixels
                      canvasHeight:
                        type: integer
                        description: Total canvas height in pixels
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
