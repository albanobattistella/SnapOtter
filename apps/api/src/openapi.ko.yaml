        - Tools
      summary: 바코드 생성기
      description: 텍스트에서 바코드 이미지를 생성합니다. 이 도구는 multipart가 아닌 JSON 본문을 받습니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
              properties:
                text:
                  type: string
                  minLength: 1
                  maxLength: 256
                  description: Text to encode in the barcode
                type:
                  type: string
                  enum:
                    - code128
                    - ean13
                    - upca
                    - code39
                    - itf14
                    - datamatrix
                  default: code128
                  description: Barcode format
                scale:
                  type: integer
                  minimum: 1
                  maximum: 8
                  default: 3
                  description: Image scale factor
                includeText:
                  type: boolean
                  default: true
                  description: Whether to render the text below the barcode
      responses:
        '200':
          description: Generated barcode
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/circle-crop:
