  /api/v1/audit-log:
    get:
      operationId: queryAuditLog
      tags:
        - Audit
      summary: 감사 로그 조회
      description: |
        관리 작업의 페이지네이션된 감사 로그입니다. 작업 유형 및 날짜
        범위로 필터링을 지원합니다. audit:read 권한이 필요합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          description: Page number (default 1)
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          description: Results per page (1-100, default 50)
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: action
          in: query
          description: Filter by action type
          schema:
            type: string
        - name: from
          in: query
          description: Filter entries after this ISO 8601 date
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          description: Filter entries before this ISO 8601 date
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated audit log entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        actorId:
                          type:
                            - string
                            - 'null'
                        actorUsername:
                          type: string
                        action:
                          type: string
                        targetType:
                          type:
                            - string
                            - 'null'
                        targetId:
                          type:
                            - string
                            - 'null'
                        details:
                          type:
                            - object
                            - 'null'
                        ipAddress:
                          type:
                            - string
                            - 'null'
                        requestId:
                          type:
                            - string
                            - 'null'
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total matching entries
                  page:
                    type: integer
                  limit:
                    type: integer
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
  /api/v1/roles:
    get:
      operationId: listRoles
      tags:
        - Roles
      summary: 역할 목록
      description: |
        모든 역할(기본 제공 및 사용자 정의)을 권한 및 사용자 수와 함께
        나열합니다. audit:read 권한이 필요합니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Role list
          content:
            application/json:
              schema:
                type: object
                properties:
                  roles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the role
                        permissions:
                          type: array
                          items:
                            type: string
                        isBuiltin:
                          type: boolean
                        userCount:
                          type: integer
                        createdAt:
                          type: string
                          format: date-time
                        updatedAt:
                          type: string
                          format: date-time
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
    post:
      operationId: createRole
      tags:
        - Roles
      summary: 사용자 정의 역할 생성
      description: |
        지정된 권한으로 새 사용자 정의 역할을 생성합니다. 역할 이름은 2~30자,
        소문자 영숫자에 하이픈과 밑줄을 사용할 수 있습니다. security:manage
        권한이 필요합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - permissions
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                  pattern: ^[a-z0-9_-]+$
                  description: Lowercase role name
                description:
                  type: string
                  description: Human-readable description
                permissions:
                  type: array
                  items:
                    type: string
                  description: |
                    Permission strings. Valid values: tools:use, files:own, files:all,
                    apikeys:own, apikeys:all, pipelines:own, pipelines:all,
                    settings:read, settings:write, users:manage, teams:manage,
                    features:manage, system:health, audit:read, security:manage
      responses:
        '201':
          description: Role created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the role
                  permissions:
                    type: array
                    items:
                      type: string
                  isBuiltin:
                    type: boolean
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '409':
          description: Role name already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/roles/{id}:
    put:
      operationId: updateRole
      tags:
        - Roles
      summary: 사용자 정의 역할 업데이트
      description: |
        사용자 정의 역할의 이름, 설명 또는 권한을 업데이트합니다. 기본 제공
        역할은 수정할 수 없습니다. security:manage 권한이 필요합니다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Role UUID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 2
                  maxLength: 30
                description:
