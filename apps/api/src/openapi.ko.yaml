      description: 최신 형식으로 변환하고 품질을 조정하며 선택적으로 크기를 조정하여 이미지를 웹 전송에 최적화합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `format` (string, default "webp") - One of: webp, jpeg, avif, png, jxl
                    - `quality` (number 1-100, default 80) - Output quality
                    - `maxWidth` (number, optional) - Maximum width in pixels
                    - `maxHeight` (number, optional) - Maximum height in pixels
                    - `progressive` (boolean, default true) - Enable progressive encoding
                    - `stripMetadata` (boolean, default true) - Remove metadata
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/optimize-for-web/preview:
    post:
      operationId: optimizeForWebPreview
      tags:
        - Tools
      summary: 웹 최적화(미리보기)
      description: |
        실시간 파라미터 튜닝을 위한 경량 미리보기 엔드포인트입니다. 최적화된
        이미지 바이너리를 직접 반환합니다(JSON 아님). 크기 정보는 응답 헤더에
        있습니다. 워크스페이스를 생성하거나 결과를 저장하지 않습니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to preview
                settings:
                  type: string
                  description: Same settings as the main optimize-for-web endpoint
      responses:
        '200':
          description: Optimized image binary
          headers:
            X-Original-Size:
              schema:
                type: string
              description: Original file size in bytes
            X-Processed-Size:
              schema:
                type: string
              description: Processed file size in bytes
            X-Output-Filename:
              schema:
                type: string
              description: Suggested output filename
          content:
            image/*:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/image-enhancement:
    post:
      operationId: enhanceImage
      tags:
        - Tools
      summary: 이미지 향상
      description: |
        AI 기반 자동 이미지 향상입니다. 이미지를 분석하여 선택한 장면 모드에
        따라 노출, 대비, 화이트 밸런스, 채도, 선명도, 노이즈 보정을 적용합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "auto") - One of: auto, portrait, landscape, low-light, food, document
                    - `intensity` (number 0-100, default 50) - Overall enhancement intensity
                    - `corrections` (object, optional) - Toggle individual corrections:
                      - `exposure` (boolean, default true)
                      - `contrast` (boolean, default true)
                      - `whiteBalance` (boolean, default true)
                      - `saturation` (boolean, default true)
                      - `sharpness` (boolean, default true)
                      - `denoise` (boolean, default true)
                    - `deepEnhance` (boolean, default false) - Use AI noise removal for deeper enhancement (requires noise-removal feature)
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/image-enhancement/analyze:
