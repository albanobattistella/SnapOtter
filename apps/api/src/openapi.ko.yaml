              properties:
                text:
                  type: string
                  maxLength: 2000
                  description: Text to encode in the QR code
                size:
                  type: integer
                  minimum: 100
                  maximum: 10000
                  default: 400
                  description: Image size in pixels
                errorCorrection:
                  type: string
                  enum:
                    - L
                    - M
                    - Q
                    - H
                  default: M
                foreground:
                  type: string
                  default: '#000000'
                  description: Foreground color (hex)
                background:
                  type: string
                  default: '#FFFFFF'
                  description: Background color (hex)
      responses:
        '200':
          description: Generated QR code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/html-to-image:
    post:
      operationId: captureWebpage
      tags:
        - Tools
      summary: 웹페이지를 이미지로 캡처
      description: 웹페이지를 고품질 스크린샷 이미지로 캡처합니다. URL과 캡처 옵션이 포함된 JSON 본문을 받습니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  format: uri
                  description: URL to capture (http/https only)
                format:
                  type: string
                  enum:
                    - jpg
                    - png
                    - webp
                  default: png
                quality:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 90
                fullPage:
                  type: boolean
                  default: false
                devicePreset:
                  type: string
                  enum:
                    - desktop
                    - tablet
                    - mobile
                    - custom
                  default: desktop
                viewportWidth:
                  type: integer
                  minimum: 320
                  maximum: 3840
                  default: 1280
                viewportHeight:
                  type: integer
                  minimum: 320
                  maximum: 2160
                  default: 720
      responses:
        '200':
          description: Screenshot captured successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid URL or parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '503':
          description: Browser service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '504':
          description: Page load timeout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/strip-metadata/inspect:
    post:
      operationId: inspectMetadata
      tags:
        - Tools
      summary: 메타데이터 검사
      description: 제거하지 않고 이미지의 모든 메타데이터(EXIF, GPS, ICC, XMP)를 봅니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to inspect
      responses:
        '200':
          description: Image metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  filename:
                    type: string
                  fileSize:
                    type: integer
                  exif:
                    type: object
                    description: EXIF metadata
                  exifError:
                    type: string
                    description: Present when EXIF parsing fails
                  gps:
                    type: object
                    description: GPS metadata
                  icc:
                    type: object
                    description: ICC profile metadata
                  xmp:
                    type: object
                    description: XMP metadata
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Failed to read image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/edit-metadata:
    post:
      operationId: editMetadata
      tags:
        - Tools
      summary: 메타데이터 편집
      description: ExifTool을 사용해 이미지의 EXIF, IPTC, GPS 및 기타 메타데이터 필드를 편집합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `title` (string) - Image title
                    - `author` (string) - Author name
                    - `artist` (string) - Artist or author name
                    - `copyright` (string) - Copyright notice
                    - `imageDescription` (string) - Image description
                    - `software` (string) - Software used
                    - `dateTime` (string) - Date/time string
                    - `dateTimeOriginal` (string) - Original capture date/time
                    - `clearGps` (boolean, default false) - Remove all GPS data
                    - `fieldsToRemove` (string[]) - Specific metadata fields to remove
                    - `gpsLatitude` (number -90 to 90) - GPS latitude
                    - `gpsLongitude` (number -180 to 180) - GPS longitude
                    - `gpsAltitude` (number) - GPS altitude in meters
                    - `keywords` (string[]) - Keywords or tags
                    - `keywordsMode` (string, default "add") - One of: add, set
                    - `dateShift` (string) - Shift dates by offset, e.g. "+2:00" or "-1:30"
                    - `setAllDates` (string) - Set all date fields to this value
                    - `iptcTitle` (string) - IPTC title
                    - `iptcHeadline` (string) - IPTC headline
                    - `iptcCity` (string) - IPTC city
                    - `iptcState` (string) - IPTC state or province
                    - `iptcCountry` (string) - IPTC country
      responses:
        '200':
          description: Image with updated metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/edit-metadata/inspect:
    post:
      operationId: inspectMetadataExifTool
      tags:
        - Tools
      summary: 메타데이터 검사(ExifTool)
      description: ExifTool을 사용해 이미지의 모든 메타데이터를 읽습니다. 포함된 모든 EXIF, IPTC, XMP, GPS 필드를 반환합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to inspect
      responses:
        '200':
          description: Full metadata object (keys vary by image)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Failed to read image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/{section}/{toolId}/batch:
    post:
      operationId: batchProcess
      tags:
        - Batch
      summary: 이미지 배치 처리
      description: |
        여러 이미지를 단일 도구를 통해 처리합니다. ZIP 파일을 반환합니다. 응답에는 진행 상황 추적을 위한 X-Job-Id 헤더가 포함됩니다.
      security:
        - bearerAuth: []
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
          description: Tool section slug (image, video, audio, pdf, files)
        - name: toolId
          in: path
          required: true
          schema:
            type: string
          description: Tool identifier (e.g. resize, crop)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process (one or more)
                settings:
                  type: string
                  description: JSON string of tool settings applied to all images
      responses:
        '200':
          description: ZIP archive of processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job identifier for progress tracking
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/pipeline/execute:
    post:
      operationId: executePipeline
      tags:
        - Pipelines
      summary: 파이프라인 실행
      description: 이미지를 도구 체인을 통해 실행합니다. 파이프라인 정의는 `pipeline` multipart 필드에 JSON 문자열로 전송됩니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - pipeline
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                pipeline:
                  type: string
                  description: 'JSON string: { "steps": [{ "toolId": "resize", "settings": {...} }, ...] }'
      responses:
        '200':
          description: Pipeline result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  originalSize:
                    type: integer
                  processedSize:
                    type: integer
                  stepsCompleted:
                    type: integer
                  steps:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
  /api/v1/pipeline/save:
    post:
      operationId: savePipeline
      tags:
        - Pipelines
      summary: 파이프라인 저장
      description: 이후 실행을 위해 도구 단계와 함께 이름이 지정된 파이프라인 정의를 저장합니다. 재사용 가능한 워크플로를 저장할 때 사용합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - steps
              properties:
                name:
                  type: string
                description:
                  type: string
                  description: Optional human-readable description of the pipeline
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      toolId:
                        type: string
                      settings:
                        type: object
      responses:
        '201':
          description: Pipeline saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the pipeline
                  steps:
                    type: array
                    items:
                      type: object
                  createdAt:
                    type: string
                    format: date-time
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/pipeline/list:
    get:
      operationId: listPipelines
      tags:
        - Pipelines
      summary: 저장된 파이프라인 목록
      description: 현재 사용자의 저장된 모든 파이프라인 정의를 조회합니다. 각 항목의 이름, 단계, 생성 날짜를 반환합니다.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of pipelines
          content:
            application/json:
              schema:
                type: object
                properties:
                  pipelines:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the pipeline
                        steps:
                          type: array
                          items:
                            type: object
                        createdAt:
                          type: string
                          format: date-time
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/pipeline/{id}:
    delete:
      operationId: deletePipeline
      tags:
        - Pipelines
      summary: 파이프라인 삭제
      description: ID로 저장된 파이프라인을 영구 삭제합니다. 파이프라인 소유자 또는 관리자만 삭제할 수 있습니다.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Pipeline UUID
          schema:
            type: string
      responses:
        '200':
          description: Pipeline deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Not authorized to delete this pipeline
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Pipeline not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/pipeline/tools:
    get:
      operationId: listPipelineTools
      tags:
        - Pipelines
      summary: 파이프라인 호환 도구 목록
      description: 파이프라인 단계로 사용할 수 있는 모든 도구 ID를 반환합니다.
      security: []
      responses:
        '200':
          description: Tool IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  toolIds:
                    type: array
                    items:
                      type: string
  /api/v1/pipeline/batch:
    post:
      operationId: batchPipeline
      tags:
        - Pipelines
      summary: 여러 파일에 파이프라인 실행
      description: 여러 이미지에 걸쳐 파이프라인을 실행합니다. 모든 처리 결과가 담긴 ZIP 파일을 반환합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - pipeline
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process
                pipeline:
                  type: string
                  description: |
                    JSON string with pipeline definition:
                    - `steps` (array, required, 1-20 items) - Pipeline steps
                    - `steps[].toolId` (string, required) - Tool ID for this step
                    - `steps[].settings` (object, optional) - Tool-specific settings
                clientJobId:
                  type: string
                  description: Optional client-provided job ID for progress tracking via SSE
      responses:
        '200':
          description: ZIP file with processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job ID for progress tracking
            X-File-Results:
              schema:
                type: string
              description: Percent-encoded JSON mapping of input index to output filename (decode with decodeURIComponent before JSON.parse)
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/upload:
    post:
      operationId: uploadImage
      tags:
        - Files
      summary: 이미지 업로드
      description: 도구 엔드포인트로 이후에 처리할 원시 이미지 파일을 업로드합니다. jobId와 파일 메타데이터를 반환합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        size:
                          type: integer
                        format:
                          type: string
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/download/{jobId}/{filename}:
    get:
      operationId: downloadProcessedImage
      tags:
        - Files
      summary: 처리된 이미지 다운로드
      description: 작업 ID와 파일 이름으로 처리된 이미지를 다운로드합니다. 도구 응답의 downloadUrl에 반환되는 URL입니다.
