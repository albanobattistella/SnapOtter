      tags:
        - Tools
      summary: 오디오 전사
      description: |
        faster-whisper를 사용하는 AI 기반 음성-텍스트 전사입니다. 일반 텍스트,
        SRT 또는 VTT 자막 형식으로 출력합니다. transcription 기능 번들이
        설치되어 있어야 합니다.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio file to transcribe
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `language` (string, default "auto") - One of: auto, en, de, fr, es, zh, ja, ko, id, th, vi
                    - `outputFormat` (string, default "txt") - One of: txt, srt, vtt
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input
          content:
            application/json:
