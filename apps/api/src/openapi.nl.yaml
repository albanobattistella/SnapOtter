      tags:
        - Tools
      summary: PDF splitsen
      description: |
        Extraheer pagina's of splits in delen. In de modus "range" wordt één PDF met de geselecteerde pagina's teruggegeven. In de modus "every" wordt gesplitst in blokken van N pagina's en wordt een ZIP-archief met de delen teruggegeven.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to split
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "range") - One of: range, every
                    - `range` (string, optional) - Page range in qpdf syntax, e.g. "1-5,8,10-z" (required when mode is "range")
                    - `everyN` (integer 1-500, optional) - Split into chunks of N pages (required when mode is "every")
      responses:
        '200':
          description: Split PDF or ZIP archive of parts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
