  /api/v1/tools/image/transparency-fixer:
    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: Nep-transparantie herstellen
      description: |
        Herstel "nep-transparante" PNG's met randjes, halo's of semi-transparante artefacten van een eerdere achtergrondverwijdering. Gebruikt BiRefNet HR-matting (2048x2048) om een schoon alfakanaal te produceren met configureerbare defringe-verwerking. Valt terug op birefnet-general en daarna u2net bij OOM. Vereist dat de background-removal-featurebundel is geïnstalleerd.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
