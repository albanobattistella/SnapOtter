      operationId: vectorizeImage
      tags:
        - Tools
      summary: Afbeelding naar SVG
      description: Converteer een rasterafbeelding naar SVG-vectorformaat met potrace (zwart-wit) of VTracer (kleur).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
