      summary: Een featurebundel verwijderen
      description: |
        Verwijder een AI-featurebundel en wis de bijbehorende modelbestanden (tenzij gedeeld met een andere geïnstalleerde bundel). Vereist de permissie features:manage.
      security:
        - bearerAuth: []
      parameters:
