  /api/v1/tools/pdf/compress-pdf:
    post:
      operationId: compressPdf
      tags:
        - Tools
      summary: PDF comprimeren
      description: |
        Verklein de PDF-bestandsgrootte door ingebedde afbeeldingen te downsamplen. In de modus "quality" bepaalt een schuifregelaar van 1-100 de afbeeldings-DPI. In de modus "targetSize" vindt een binaire zoekactie de hoogste DPI die binnen de doelgrootte past. Als compressie het bestand zou vergroten, worden de originele bytes ongewijzigd teruggegeven.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to compress
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "quality") - One of: quality, targetSize
                    - `quality` (integer 1-100, optional) - Compression quality (higher = less compression). Used in quality mode
                    - `targetSizeKb` (number, optional) - Target file size in kilobytes. Used in targetSize mode
      responses:
        '200':
          description: Compressed PDF
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
