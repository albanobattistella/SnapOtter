                    type: integer
                  height:
                    type: integer
                  pages:
                    type: integer
                    description: Number of frames
                  delay:
                    type: array
                    items:
                      type: integer
                    description: Per-frame delay in milliseconds
                  loop:
                    type: integer
                    description: Loop count (0 = infinite)
                  fileSize:
                    type: integer
                  duration:
                    type: integer
                    description: Total duration in milliseconds
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/smart-crop:
    post:
      operationId: smartCrop
      tags:
        - Tools
      summary: Slim bijsnijden
      description: 'Slim bijsnijden met drie modi: onderwerpfocus, gezichtsfocus of automatisch bijsnijden.'
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
