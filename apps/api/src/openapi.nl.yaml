  /api/v1/files:
    get:
      operationId: listFiles
      tags:
        - Files
      summary: Opgeslagen bestanden weergeven
      description: Geeft de nieuwste versie van elk bestand terug (één per versieketen). Ondersteunt paginering en zoeken.
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          description: Maximum number of files to return (default 50)
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          description: Number of files to skip for pagination (default 0)
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          description: Filter files by original filename (substring match)
          schema:
            type: string
      responses:
        '200':
          description: List of saved files
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        filename:
                          type: string
                        size:
                          type: integer
                        contentType:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                  total:
                    type: integer
                    description: Total number of matching files (for pagination)
                  limit:
                    type: integer
                    description: Applied limit value
                  offset:
                    type: integer
                    description: Applied offset value
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
    delete:
      operationId: bulkDeleteFiles
      tags:
        - Files
      summary: Opgeslagen bestanden bulksgewijs verwijderen
