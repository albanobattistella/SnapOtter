  /api/v1/jobs/{jobId}/progress:
    get:
      operationId: getJobProgress
      tags:
        - System
      summary: Jobvoortgang (SSE)
      description: |
        Server-Sent Events-stream voor het volgen van langlopende jobs. Sluit automatisch 5 seconden na voltooiing.
      security: []
      parameters:
        - name: jobId
          in: path
          required: true
          description: Job UUID from a tool processing or installation response
          schema:
            type: string
      responses:
        '200':
          description: |
            SSE stream of job progress events. Two event types: `single` (single-file tools) and `batch` (batch processing). Single events have `status` and `progress`. Batch events have `completedFiles`, `totalFiles`, `failedFiles` (integers), and an `errors` array.
          content:
            text/event-stream:
              schema:
                type: object
                description: |
                  Event shape varies by type. Single: { status, progress }. Batch: { completedFiles, totalFiles, failedFiles, errors }.
                properties:
                  status:
                    type: string
                    enum:
                      - processing
                      - completed
                      - failed
                  progress:
                    type: integer
                    minimum: 0
                    maximum: 100
                  completedFiles:
                    type: integer
                    description: Number of completed files (batch mode)
                  totalFiles:
                    type: integer
                    description: Total files to process (batch mode)
                  failedFiles:
                    type: integer
                    description: Number of failed files (batch mode)
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        filename:
                          type: string
                        error:
                          type: string
                    description: Error details for failed files (batch mode)
  /api/v1/admin/health:
    get:
      operationId: adminHealthCheck
      tags:
        - Admin
      summary: Admin-gezondheidscontrole
      description: |
        Volledige systeemdiagnostiek, inclusief databasestatus, opslagmodus, queuestatus en GPU-beschikbaarheid. Vereist de permissie system:health.
      security:
