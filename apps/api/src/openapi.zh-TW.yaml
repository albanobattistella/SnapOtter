                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/smart-crop:
    post:
      operationId: smartCrop
      tags:
        - Tools
      summary: 智慧裁剪
      description: 提供三種模式的智慧裁剪：主體聚焦、臉部聚焦或自動裁邊。
      security:
