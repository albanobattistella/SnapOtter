  /api/v1/tools/image/passport-photo:
    post:
      operationId: passportPhotoTool
      tags:
        - Tools
      summary: 證件照
      description: |
        兩階段證件照流程的導引端點。使用 `/api/v1/tools/image/passport-photo/analyze` 分析圖片，接著使用 `/api/v1/tools/image/passport-photo/generate` 建立最終的證件照。此基底路由在所需功能套件已安裝時回傳 400 導引錯誤，缺少時則回傳 501。
      security:
