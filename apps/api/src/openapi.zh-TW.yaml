      tags:
        - Tools
      summary: 音訊轉錄
      description: |
        使用 faster-whisper 進行 AI 驅動的語音轉文字轉錄。輸出純文字、SRT 或 VTT 字幕格式。需先安裝 transcription 功能套件。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio file to transcribe
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `language` (string, default "auto") - One of: auto, en, de, fr, es, zh, ja, ko, id, th, vi
                    - `outputFormat` (string, default "txt") - One of: txt, srt, vtt
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
