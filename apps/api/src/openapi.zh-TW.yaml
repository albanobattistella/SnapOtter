              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags:
        - Features
      summary: 安裝功能套件
      description: |
        開始非同步安裝 AI 功能套件。下載模型並設定 Python sidecar。回傳一個 jobId，可透過 SSE 端點追蹤進度。需要 features:manage 權限。

        安裝於伺服器端會序列化：當另一項安裝正在執行時提出的請求會被排入佇列（queued=true）而非被拒絕，並在執行中的安裝完成後自動開始。針對同一個進行中套件的重複請求會被去重並回傳相同的 jobId。
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '202':
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: True when the install was queued behind another running install instead of starting immediately.
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
