  /api/v1/tools/pdf/compress-pdf:
    post:
      operationId: compressPdf
      tags:
        - Tools
      summary: 壓縮 PDF
      description: |
        透過對嵌入圖片降取樣以縮減 PDF 檔案大小。在「quality」模式下以 1 至 100 的滑桿控制圖片 DPI。在「targetSize」模式下以二分搜尋找出符合目標的最高 DPI。若壓縮反而使檔案變大，則原封不動地回傳原始位元組。
      security:
        - bearerAuth: []
      requestBody:
