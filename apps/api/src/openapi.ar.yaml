      description: |
        عرض أو تحرير أو إزالة علامات الصوت (ID3). تتضمن الاستجابة كائن
        `metadata` يحتوي على container وdurationS وbitrateKbps وtags
        إلى جانب حقول ToolResponse القياسية.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Audio file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `strip` (boolean, default false) - Remove all existing metadata
                    - `title` (string, optional, max 500) - Set the title tag
                    - `artist` (string, optional, max 500) - Set the artist tag
                    - `album` (string, optional, max 500) - Set the album tag
      responses:
        '200':
          description: Processed audio with metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
