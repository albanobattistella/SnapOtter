  /api/v1/tools/image/transparency-fixer:
    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: إصلاح الشفافية الزائفة
      description: |
        إصلاح صور PNG ذات "الشفافية الزائفة" التي تعاني من هالات أو حواف أو تشوهات
        شبه شفافة ناتجة عن إزالة خلفية سابقة. يستخدم BiRefNet HR-matting
        (2048x2048) لإنتاج قناة ألفا نظيفة مع معالجة تنظيف حواف قابلة للتهيئة.
        يتراجع إلى birefnet-general ثم u2net عند نفاد الذاكرة. يتطلب
        تثبيت حزمة ميزة background-removal.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
