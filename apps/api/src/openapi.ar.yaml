        '401':
          description: Authentication required
  /api/auth/mfa/enroll:
    post:
      operationId: enrollMfa
      tags:
        - Auth
      summary: بدء تسجيل MFA
      description: بدء تسجيل MFA بنمط TOTP للمستخدم الحالي. يتطلب ميزة MFA المؤسسية.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Enrollment URI and recovery codes
        '401':
          description: Authentication required
        '403':
          description: MFA feature not licensed
        '409':
          description: MFA enrollment already enabled or pending
  /api/auth/mfa/verify:
    post:
      operationId: verifyMfaEnrollment
      tags:
        - Auth
      summary: التحقق من تسجيل MFA
      description: تأكيد تسجيل MFA المعلّق برمز TOTP.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: MFA enabled
        '400':
          description: No pending enrollment or invalid body
        '401':
          description: Invalid TOTP code
  /api/auth/mfa/complete:
    post:
      operationId: completeMfaLogin
      tags:
        - Auth
      summary: إكمال تسجيل الدخول بـ MFA
      description: إكمال تحدي تسجيل دخول معلّق برمز TOTP أو رمز استرداد.
