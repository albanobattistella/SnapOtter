              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/smart-crop:
    post:
      operationId: smartCrop
      tags:
        - Tools
      summary: قص ذكي
      description: 'قص ذكي بثلاثة أوضاع: التركيز على الموضوع أو التركيز على الوجه أو الاقتصاص التلقائي.'
      security:
