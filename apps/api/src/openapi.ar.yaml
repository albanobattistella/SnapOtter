  /api/v1/tools/image/vignette:
    post:
      operationId: vignette
      tags:
        - Tools
      summary: تظليل حواف
      description: إضافة تأثير تظليل الحواف بقوة ولون ونصف قطر ونعومة واستدارة وموضع مركز قابلين للضبط.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `strength` (number 0.1-1, default 0.5) - Vignette opacity
                    - `color` (string, default "#000000") - Vignette hex color
                    - `radius` (integer 0-100, default 70) - Outer radius as percentage of half-diagonal
                    - `softness` (integer 0-100, default 50) - Feather softness (higher = more gradual)
                    - `roundness` (integer 0-100, default 100) - 100 = circle, 0 = ellipse matching image aspect ratio
                    - `centerX` (integer 0-100, default 50) - Horizontal center position as percentage
                    - `centerY` (integer 0-100, default 50) - Vertical center position as percentage
      responses:
        '200':
          description: Processed image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/gif-webp:
    post:
      operationId: gifWebp
      tags:
        - Tools
      summary: محوّل GIF/WebP
      description: تحويل GIF متحرك إلى WebP والعكس، مع الحفاظ على جميع الإطارات. يقبل مدخلات .gif و.webp فقط.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: GIF or WebP file to convert
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `quality` (integer 1-100, default 80) - Output quality for WebP encoding
                    - `lossless` (boolean, default false) - Use lossless WebP compression
                    - `resizePercent` (integer 10-100, default 100) - Scale the output by percentage
      responses:
        '200':
          description: Converted animation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/histogram:
    post:
      operationId: histogram
      tags:
        - Tools
      summary: المدرّج التكراري
      description: |
        إنشاء مخطط مدرّج تكراري RGB من صورة. يُرجع صورة
        مدرّج تكراري PNG بالإضافة إلى إحصائيات لكل قناة وبيانات مدرّج تكراري خام من 256 خانة في
        استجابة JSON.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to analyze
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `scale` (string, default "linear") - One of: linear, log
      responses:
        '200':
          description: Histogram image and channel statistics
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      bins:
                        type: object
                        description: Raw 256-bin histogram arrays per channel
                        properties:
                          r:
                            type: array
                            items:
                              type: integer
                          g:
                            type: array
                            items:
                              type: integer
                          b:
                            type: array
                            items:
                              type: integer
                          lum:
                            type: array
                            items:
                              type: integer
                      stats:
                        type: object
                        description: Per-channel statistics
                        properties:
                          r:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          g:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          b:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                          lum:
                            type: object
                            properties:
                              mean:
                                type: integer
                              median:
                                type: integer
                              stdev:
                                type: number
                      mean:
                        type: object
                        description: Backward-compatible mean values
                        properties:
                          r:
                            type: integer
                          g:
                            type: integer
                          b:
                            type: integer
                      max:
                        type: object
                        description: Backward-compatible max bin values
                        properties:
                          r:
                            type: integer
                          g:
                            type: integer
                          b:
                            type: integer
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/lqip-placeholder:
    post:
      operationId: lqipPlaceholder
      tags:
        - Tools
      summary: عنصر نائب LQIP
      description: |
        إنشاء عنصر نائب صورة صغير منخفض الجودة. يُرجع ملف صورة
        صغيرًا بالإضافة إلى data URI بـ base64، ووسم img HTML جاهز للاستخدام، ومقتطف
        خلفية CSS في استجابة JSON.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `width` (integer 4-64, default 16) - Target width in pixels
                    - `blur` (number 0-20, default 2) - Blur radius (for blur strategy)
                    - `strategy` (string, default "blur") - One of: blur, pixelate, solid
                    - `format` (string, default "webp") - One of: webp, png, jpeg
                    - `quality` (integer 1-100, default 50) - Output quality
      responses:
        '200':
          description: LQIP placeholder image and data URI
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      dataUri:
                        type: string
                        description: Complete data URI (data:mime;base64,...)
                      width:
                        type: integer
                        description: Placeholder width in pixels
                      height:
                        type: integer
                        description: Placeholder height in pixels
                      bytes:
                        type: integer
                        description: Placeholder file size in bytes
                      strategy:
                        type: string
                        description: Strategy used (blur, pixelate, or solid)
                      html:
                        type: string
                        description: Ready-to-use HTML img tag
                      css:
                        type: string
                        description: Ready-to-use CSS background-image snippet
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/sprite-sheet:
    post:
      operationId: spriteSheet
      tags:
        - Tools
      summary: ورقة sprite
      description: |
        دمج صور متعددة في شبكة ورقة sprite واحدة. يقبل
        من 2 إلى 64 صورة. يُغيَّر حجم كل صورة لتطابق أبعاد الصورة
        الأولى. يُرجع صورة ورقة sprite بالإضافة إلى بيانات إحداثيات
        الإطارات الوصفية.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Two or more image files to combine (max 64)
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `columns` (integer 1-16, default 4) - Number of columns in the grid
                    - `padding` (integer 0-64, default 0) - Padding between cells in pixels
                    - `background` (string, default "#ffffff") - Background hex color
                    - `format` (string, default "png") - One of: png, webp, jpeg
                    - `quality` (integer 1-100, default 90) - Output quality
      responses:
        '200':
          description: Sprite sheet image with frame metadata
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ToolResponse'
                  - type: object
                    properties:
                      frames:
                        type: array
                        description: Per-frame coordinates in the sprite sheet
                        items:
                          type: object
                          properties:
                            index:
                              type: integer
                            left:
                              type: integer
                            top:
                              type: integer
                            width:
                              type: integer
                            height:
                              type: integer
                      cols:
                        type: integer
                        description: Number of columns
                      rows:
                        type: integer
                        description: Number of rows
                      cellWidth:
                        type: integer
                        description: Cell width in pixels
                      cellHeight:
                        type: integer
                        description: Cell height in pixels
                      canvasWidth:
                        type: integer
                        description: Total canvas width in pixels
                      canvasHeight:
                        type: integer
                        description: Total canvas height in pixels
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/image/passport-photo:
    post:
      operationId: passportPhotoTool
      tags:
        - Tools
      summary: صورة جواز السفر
      description: |
        نقطة نهاية إرشادية لسير صورة جواز السفر ذي المرحلتين. استخدم
        `/api/v1/tools/image/passport-photo/analyze` لتحليل صورة،
        ثم `/api/v1/tools/image/passport-photo/generate` لإنشاء صورة جواز السفر
        النهائية. يُرجع هذا المسار الأساسي خطأ إرشاديًا 400 عند تثبيت
        حزم الميزات المطلوبة، أو 501 عند غيابها.
      security:
