      responses:
        '200':
          description: Cancellation request result
        '401':
          description: Authentication required
  /api/v1/preferences:
    get:
      operationId: getPreferences
      tags:
        - Settings
      summary: الحصول على تفضيلات المستخدم
      description: إرجاع خريطة تفضيلات المستخدم الحالي لكل مستخدم.
