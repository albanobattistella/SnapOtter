      operationId: readinessCheck
      tags:
        - System
      summary: فحص الجاهزية
      description: يفحص PostgreSQL وRedis ومساحة القرص المحلية وإمكانية الوصول إلى S3 عند التهيئة. نقطة نهاية عامة لموازنات التحميل والمنسّقات.
      security: []
      responses:
        '200':
          description: Instance is ready to receive traffic
        '503':
          description: Instance is not ready to receive traffic
