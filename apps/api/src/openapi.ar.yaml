  /api/v1/tools/pdf/split-pdf:
    post:
      operationId: splitPdf
      tags:
        - Tools
      summary: تقسيم PDF
      description: |
        استخراج الصفحات أو التقسيم إلى أجزاء. في وضع "range" يُرجع ملف PDF
        واحدًا بالصفحات المحددة. في وضع "every" يُقسّم إلى أجزاء من N صفحات
        ويُرجع أرشيف ZIP يضم الأجزاء.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to split
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "range") - One of: range, every
                    - `range` (string, optional) - Page range in qpdf syntax, e.g. "1-5,8,10-z" (required when mode is "range")
                    - `everyN` (integer 1-500, optional) - Split into chunks of N pages (required when mode is "every")
      responses:
        '200':
          description: Split PDF or ZIP archive of parts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/pdf/compress-pdf:
    post:
      operationId: compressPdf
      tags:
        - Tools
      summary: ضغط PDF
      description: |
        تقليل حجم ملف PDF بخفض دقة الصور المضمّنة. في وضع "quality"
        يتحكم شريط تمرير 1-100 في DPI الصورة. في وضع "targetSize" يجد بحث
        ثنائي أعلى DPI يناسب الهدف. إذا كان الضغط سيكبّر الملف،
        تُرجَع البايتات الأصلية دون تغيير.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to compress
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "quality") - One of: quality, targetSize
                    - `quality` (integer 1-100, optional) - Compression quality (higher = less compression). Used in quality mode
                    - `targetSizeKb` (number, optional) - Target file size in kilobytes. Used in targetSize mode
      responses:
        '200':
          description: Compressed PDF
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
