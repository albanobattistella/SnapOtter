  /api/v1/tools/image/erase-object:
    post:
      operationId: eraseObject
      tags:
        - Tools
      summary: ممحاة الأجسام
      description: محو الأجسام من صورة باستخدام قناع. تشير المناطق البيضاء في القناع إلى المناطق المراد محوها. يستخدم LaMa inpainting.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - image
                - mask
              properties:
                image:
                  type: string
                  format: binary
                  description: Source image file
                mask:
                  type: string
                  format: binary
                  description: Mask image (white areas will be erased)
                format:
                  type: string
                  enum:
                    - auto
                    - png
                    - jpg
                    - jpeg
                    - webp
                    - tiff
                    - gif
                    - avif
                    - heic
                    - heif
                    - jxl
                  default: auto
                  description: Output format
                quality:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 95
                  description: Output quality
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
  /api/v1/tools/image/ai-canvas-expand:
    post:
      operationId: aiCanvasExpand
      tags:
        - Tools
      summary: توسيع اللوحة بالذكاء الاصطناعي (تجريبي)
      description: |
        توسيع لوحة صورة باستخدام outpainting بالذكاء الاصطناعي. يمتد بالصورة في أي
        اتجاه بإنشاء محتوى جديد يندمج بسلاسة مع الأصل.
        يستخدم outpainting القائم على LaMa. يتطلب تثبيت حزمة ميزة
        ai-canvas-expand.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to expand
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `extendTop` (integer >= 0, default 0) - Pixels to extend upward
                    - `extendRight` (integer >= 0, default 0) - Pixels to extend rightward
                    - `extendBottom` (integer >= 0, default 0) - Pixels to extend downward
                    - `extendLeft` (integer >= 0, default 0) - Pixels to extend leftward
                    - `tier` (string, default "balanced") - One of: fast, balanced, high
                    - `format` (string, default "auto") - One of: auto, png, jpg, jpeg, webp, tiff, gif, avif, heic, heif, jxl
                    - `quality` (integer 1-100, default 95) - Output quality

                    At least one extend direction must be greater than 0.
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input (or no extend direction > 0)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
