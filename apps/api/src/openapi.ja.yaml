  /api/v1/config/analytics:
    get:
      operationId: getAnalyticsConfig
      tags:
        - Analytics
      summary: アナリティクス設定の取得
      description: |
        有効なアナリティクスプロバイダーの設定を返します。アナリティクスは、コンパイル時のバンドルとインスタンスの analyticsEnabled 設定の両方が許可した場合にのみ有効になります。無効な場合、キー、DSN、instanceId は空になります。パブリックエンドポイントです。
      security: []
      responses:
        '200':
          description: Analytics configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: |
                      Effective analytics state. True only when both the
                      compile-time bake and the instance analyticsEnabled
                      setting are on. When false, the keys, DSN, and instanceId
                      are blank.
                  posthogApiKey:
                    type: string
                  posthogHost:
                    type: string
                  sentryDsn:
                    type: string
                  sentryDsnWeb:
                    type: string
                  posthogSampleRate:
                    type: number
                  instanceId:
                    type: string
