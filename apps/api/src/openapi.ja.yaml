      description: |
        カスタムロールを削除します。このロールが割り当てられているユーザーはデフォルトの「user」ロールに再割り当てされます。組み込みロールは削除できません。security:manage 権限が必要です。
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Role UUID
          schema:
            type: string
      responses:
        '200':
          description: Role deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '400':
          description: Cannot delete built-in role
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Role not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
