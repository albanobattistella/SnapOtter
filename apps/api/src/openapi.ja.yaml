                          description: Human-readable description of the feature bundle
                        status:
                          type: string
                          enum:
                            - installed
                            - not_installed
                            - installing
                            - queued
                            - error
                        installedVersion:
                          type:
                            - string
                            - 'null'
                        estimatedSize:
                          type: string
                        downloadBytes:
                          type:
                            - integer
                            - 'null'
                          description: Compressed archive size for this host's architecture, when the manifest records it. Null in native (non-Docker) mode or when unmeasured.
                        installedBytes:
                          type:
                            - integer
                            - 'null'
                          description: Extracted on-disk size for this host's architecture, when the manifest records it.
                        enablesTools:
                          type: array
                          items:
                            type: string
                        progress:
                          type:
                            - object
                            - 'null'
                          properties:
                            percent:
                              type: number
                            stage:
                              type: string
                        error:
                          type:
                            - string
                            - 'null'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags:
        - Features
      summary: 機能バンドルのインストール
      description: |
        AI 機能バンドルの非同期インストールを開始します。モデルをダウンロードし、Python サイドカーを構成します。SSE エンドポイント経由で進捗を追跡するための jobId を返します。features:manage 権限が必要です。

        インストールはサーバー側で直列化されます。別のインストール実行中に行われたリクエストは拒否されずにキューに入り（queued=true）、実行中のインストールが完了すると自動的に開始します。実行中の同じバンドルに対する繰り返しリクエストは重複排除され、同じ jobId を返します。
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '202':
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: True when the install was queued behind another running install instead of starting immediately.
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/admin/features/{bundleId}/uninstall:
    post:
      operationId: uninstallFeature
      tags:
        - Features
      summary: 機能バンドルのアンインストール
      description: |
        AI 機能バンドルをアンインストールし、そのモデルファイルを削除します（他のインストール済みバンドルと共有されている場合を除く）。features:manage 権限が必要です。
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '200':
          description: Bundle uninstalled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle is not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
