              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/image/smart-crop:
    post:
      operationId: smartCrop
      tags:
        - Tools
      summary: スマート切り抜き
      description: 被写体フォーカス、顔フォーカス、自動トリミングの 3 モードを備えたスマート切り抜き。
      security:
