      operationId: bulkDeleteFiles
      tags:
        - Files
      summary: 保存済みファイルの一括削除
      description: ファイルとそのバージョンチェーン全体を削除します。管理者以外のユーザーは自分のファイルのみ削除できます。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ids
              properties:
                ids:
                  type: array
                  items:
                    type: string
                  description: File IDs to delete (deletes entire version chain for each)
      responses:
        '200':
          description: Deletion result
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: integer
                    description: Total number of records deleted across all version chains
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
