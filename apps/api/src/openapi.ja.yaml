      summary: ヒストグラム
      description: |
        画像から RGB ヒストグラムチャートを生成します。PNG ヒストグラム画像に加えて、チャンネルごとの統計と生の 256 ビンヒストグラムデータをレスポンス JSON で返します。
      security:
        - bearerAuth: []
