                $ref: '#/components/schemas/Error'
  /api/v1/tools/{section}/{toolId}/batch:
    post:
      operationId: batchProcess
      tags:
        - Batch
      summary: 画像のバッチ処理
      description: |
        複数の画像を単一のツールで処理します。ZIP ファイルを返します。レスポンスには進捗追跡用の X-Job-Id ヘッダーが含まれます。
      security:
        - bearerAuth: []
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
          description: Tool section slug (image, video, audio, pdf, files)
        - name: toolId
          in: path
          required: true
          schema:
            type: string
          description: Tool identifier (e.g. resize, crop)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process (one or more)
                settings:
                  type: string
                  description: JSON string of tool settings applied to all images
      responses:
        '200':
          description: ZIP archive of processed images
          headers:
            X-Job-Id:
              schema:
                type: string
              description: Job identifier for progress tracking
          content:
            application/zip:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/pipeline/execute:
    post:
      operationId: executePipeline
      tags:
        - Pipelines
      summary: パイプラインの実行
      description: 画像をツールのチェーンに通します。パイプライン定義は multipart の `pipeline` フィールドに JSON 文字列として送信します。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - pipeline
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to process
                pipeline:
                  type: string
                  description: 'JSON string: { "steps": [{ "toolId": "resize", "settings": {...} }, ...] }'
      responses:
        '200':
          description: Pipeline result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  originalSize:
                    type: integer
                  processedSize:
                    type: integer
                  stepsCompleted:
                    type: integer
                  steps:
                    type: array
                    items:
                      type: object
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Processing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
  /api/v1/pipeline/save:
    post:
      operationId: savePipeline
      tags:
        - Pipelines
      summary: パイプラインの保存
      description: 名前付きパイプライン定義をそのツールステップとともに保存し、後で実行できるようにします。再利用可能なワークフローの保存に使用します。
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - steps
              properties:
                name:
                  type: string
                description:
                  type: string
                  description: Optional human-readable description of the pipeline
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      toolId:
                        type: string
                      settings:
                        type: object
      responses:
        '201':
          description: Pipeline saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the pipeline
                  steps:
                    type: array
                    items:
                      type: object
                  createdAt:
                    type: string
                    format: date-time
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
