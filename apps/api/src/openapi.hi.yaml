                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Multiple image files to check for duplicates
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `threshold` (number 0-20, default 8) - Hamming distance threshold for duplicate detection
      responses:
        '200':
          description: Duplicate groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalImages:
                    type: integer
                  duplicateGroups:
                    type: array
                    items:
                      type: object
                      properties:
                        groupId:
                          type: integer
                        files:
                          type: array
                          items:
                            type: object
                            properties:
                              filename:
                                type: string
                              similarity:
                                type: number
                              width:
                                type: integer
                              height:
                                type: integer
                              fileSize:
                                type: integer
                              format:
                                type: string
                              isBest:
                                type: boolean
                              thumbnail:
                                type:
                                  - string
