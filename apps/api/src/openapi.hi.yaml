      parameters:
        - name: jobId
          in: path
          required: true
          description: Job identifier from a tool processing response
          schema:
            type: string
        - name: filename
          in: path
          required: true
          description: Output filename from the processing response
          schema:
            type: string
      responses:
        '200':
          description: Image binary
          content:
            image/*:
              schema:
                type: string
                format: binary
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
