        '200':
          description: Optimized image binary
          headers:
            X-Original-Size:
              schema:
                type: string
              description: Original file size in bytes
            X-Processed-Size:
              schema:
                type: string
              description: Processed file size in bytes
            X-Output-Filename:
              schema:
                type: string
              description: Suggested output filename
          content:
            image/*:
              schema:
                type: string
                format: binary
        '400':
          description: Invalid input
