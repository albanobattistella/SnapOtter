      description: |
        लाइव पैरामीटर ट्यूनिंग के लिए हल्का preview endpoint।
        अनुकूलित image binary सीधे लौटाता है (JSON नहीं)। आकार जानकारी
        response headers में होती है। कोई workspace नहीं बनाता या परिणाम स्थायी नहीं करता।
      security:
        - bearerAuth: []
      requestBody:
        required: true
