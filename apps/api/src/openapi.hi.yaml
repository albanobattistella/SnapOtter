  /api/v1/fetch-urls:
    post:
      operationId: fetchImageUrls
      tags:
        - Files
      summary: URLs से images प्राप्त करें
      description: |
        बाहरी URLs से एक या अधिक images प्राप्त करें। प्रत्येक URL को SSRF
        हमलों के विरुद्ध validate किया जाता है, आकार-सीमित किया जाता है, और एक वैध image के रूप में सत्यापित किया जाता है। प्रत्येक
        सफलतापूर्वक प्राप्त की गई image के लिए download URLs लौटाता है। प्रति घंटे 200 requests तक सीमित।
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - urls
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  minItems: 1
                  maxItems: 50
                  description: URLs of images to fetch (1-50)
      responses:
        '200':
          description: Fetch results for each URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        success:
                          type: boolean
                        url:
                          type: string
                        filename:
                          type: string
                        contentType:
                          type: string
                        size:
                          type: integer
                        width:
                          type: integer
                        height:
                          type: integer
                        downloadUrl:
                          type: string
                        previewUrl:
                          type:
                            - string
                            - 'null'
                        error:
                          type: string
                          description: Present only when success is false
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/config/locale:
    get:
      operationId: getLocaleConfig
      tags:
        - System
      summary: डिफ़ॉल्ट locale प्राप्त करें
