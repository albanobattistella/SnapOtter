              properties:
                file:
                  type: string
                  format: binary
                  description: The processed image file
                parentId:
                  type: string
                  description: ID of the parent file in the version chain
                toolId:
                  type: string
                  description: Tool that produced this result
      responses:
        '201':
          description: File saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    description: Full file object with all metadata
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Parent file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/files/{id}:
    get:
      operationId: getFile
      tags:
        - Files
      summary: फ़ाइल metadata और संस्करण इतिहास प्राप्त करें
      description: एक सहेजी गई फ़ाइल के लिए metadata और पूर्ण संस्करण इतिहास पुनर्प्राप्त करें। download करने से पहले फ़ाइल विवरण का निरीक्षण करने के लिए इसका उपयोग करें।
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Saved file UUID
          schema:
            type: string
      responses:
        '200':
          description: File metadata with version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    properties:
                      id:
                        type: string
                      originalName:
                        type: string
                      mimeType:
                        type: string
                      size:
                        type: integer
                      width:
                        type: integer
                      height:
                        type: integer
                      version:
                        type: integer
                      parentId:
                        type:
                          - string
                          - 'null'
                      toolChain:
                        type: array
                        items:
                          type: string
                      createdAt:
                        type: string
                        format: date-time
                  versions:
                    type: array
                    items:
                      type: object
                    description: Full version chain of this file
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: File not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
