  /api/v1/tools/image/transparency-fixer:
    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: Corregir transparencia falsa
      description: |
        Corrige los PNG con "transparencia falsa" que tienen bordes, halos o artefactos
        semitransparentes de una eliminación de fondo previa. Usa el HR-matting de BiRefNet
        (2048x2048) para producir un canal alfa limpio con procesamiento de defringe configurable.
        Recurre a birefnet-general y luego a u2net en caso de OOM. Requiere que el
        paquete de función background-removal esté instalado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  async:
                    type: boolean
                    example: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
