      description: Recupera los metadatos y el historial completo de versiones de un archivo guardado. Úsalo para inspeccionar los detalles del archivo antes de descargarlo.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: Saved file UUID
