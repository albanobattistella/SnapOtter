  /api/v1/fetch-urls:
    post:
      operationId: fetchImageUrls
      tags:
        - Files
      summary: Obtener imágenes desde URLs
      description: |
        Obtiene una o varias imágenes desde URLs externas. Cada URL se valida contra ataques
        SSRF, se limita por tamaño y se verifica como imagen válida. Devuelve URLs de descarga para
        cada imagen obtenida con éxito. Limitado a 200 solicitudes por hora.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - urls
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  minItems: 1
                  maxItems: 50
                  description: URLs of images to fetch (1-50)
      responses:
        '200':
          description: Fetch results for each URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        success:
                          type: boolean
                        url:
                          type: string
                        filename:
                          type: string
                        contentType:
                          type: string
                        size:
                          type: integer
                        width:
                          type: integer
                        height:
                          type: integer
                        downloadUrl:
                          type: string
                        previewUrl:
                          type:
                            - string
                            - 'null'
                        error:
                          type: string
                          description: Present only when success is false
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
