    post:
      operationId: splitPdf
      tags:
        - Tools
      summary: Dividir PDF
      description: |
        Extrae páginas o divide en partes. En el modo "range" devuelve un solo PDF
        con las páginas seleccionadas. En el modo "every" divide en bloques de N páginas
        y devuelve un archivo ZIP con las partes.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to split
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "range") - One of: range, every
                    - `range` (string, optional) - Page range in qpdf syntax, e.g. "1-5,8,10-z" (required when mode is "range")
                    - `everyN` (integer 1-500, optional) - Split into chunks of N pages (required when mode is "every")
      responses:
        '200':
          description: Split PDF or ZIP archive of parts
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/tools/pdf/compress-pdf:
    post:
      operationId: compressPdf
      tags:
        - Tools
      summary: Comprimir PDF
      description: |
        Reduce el tamaño de archivo del PDF submuestreando las imágenes incrustadas. En el modo "quality"
        un deslizador de 1-100 controla el DPI de las imágenes. En el modo "targetSize" una búsqueda binaria
        encuentra el DPI más alto que cabe en el objetivo. Si la compresión aumentara
        el tamaño del archivo, se devuelven los bytes originales sin cambios.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to compress
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "quality") - One of: quality, targetSize
                    - `quality` (integer 1-100, optional) - Compression quality (higher = less compression). Used in quality mode
                    - `targetSizeKb` (number, optional) - Target file size in kilobytes. Used in targetSize mode
      responses:
        '200':
          description: Compressed PDF
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
