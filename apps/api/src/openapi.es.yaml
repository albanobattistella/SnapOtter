            type: string
      responses:
        '200':
          description: File metadata with version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  file:
                    type: object
                    properties:
                      id:
                        type: string
                      originalName:
                        type: string
                      mimeType:
                        type: string
                      size:
                        type: integer
                      width:
                        type: integer
                      height:
                        type: integer
                      version:
                        type: integer
                      parentId:
                        type:
                          - string
                          - 'null'
                      toolChain:
                        type: array
                        items:
                          type: string
                      createdAt:
                        type: string
                        format: date-time
                  versions:
                    type: array
                    items:
                      type: object
                    description: Full version chain of this file
