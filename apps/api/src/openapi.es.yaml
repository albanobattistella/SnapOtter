  /api/v1/tools/image/noise-removal:
    post:
      operationId: removeNoise
      tags:
        - Tools
      summary: Eliminación de ruido
      description: |
        Eliminación de ruido con IA mediante el sidecar de Python. Admite varios
        niveles de calidad, desde vista previa rápida hasta calidad máxima. Requiere que el
        paquete de función noise-removal esté instalado.
      security:
        - bearerAuth: []
      requestBody:
        required: true
