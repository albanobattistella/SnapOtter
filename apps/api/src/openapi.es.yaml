                              similarity:
                                type: number
                              width:
                                type: integer
                              height:
                                type: integer
                              fileSize:
                                type: integer
                              format:
                                type: string
                              isBest:
                                type: boolean
                              thumbnail:
                                type:
                                  - string
                                  - 'null'
                  uniqueImages:
                    type: integer
                  spaceSaveable:
                    type: integer
                  skippedFiles:
                    type: array
