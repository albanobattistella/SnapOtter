  /api/auth/mfa/enroll:
    post:
      operationId: enrollMfa
      tags:
        - Auth
      summary: Iniciar registro de MFA
      description: Inicia el registro de MFA por TOTP para el usuario actual. Requiere la función MFA de enterprise.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Enrollment URI and recovery codes
        '401':
          description: Authentication required
        '403':
          description: MFA feature not licensed
        '409':
          description: MFA enrollment already enabled or pending
  /api/auth/mfa/verify:
    post:
      operationId: verifyMfaEnrollment
      tags:
        - Auth
      summary: Verificar registro de MFA
      description: Confirma un registro de MFA pendiente con un código TOTP.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: MFA enabled
        '400':
          description: No pending enrollment or invalid body
        '401':
          description: Invalid TOTP code
  /api/auth/mfa/complete:
    post:
      operationId: completeMfaLogin
      tags:
        - Auth
      summary: Completar inicio de sesión con MFA
      description: Completa un desafío de inicio de sesión pendiente con un código TOTP o de recuperación.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
