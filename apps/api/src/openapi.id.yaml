    post:
      operationId: fixTransparency
      tags:
        - Tools
      summary: Perbaiki transparansi palsu
      description: |
        Perbaiki PNG "transparan palsu" yang memiliki fringing, halo, atau artefak
        semi-transparan dari penghapusan latar belakang sebelumnya. Menggunakan BiRefNet HR-matting
        (2048x2048) untuk menghasilkan alpha channel bersih dengan pemrosesan defringe
        yang dapat dikonfigurasi. Fallback ke birefnet-general, lalu u2net saat OOM. Memerlukan
        feature bundle background-removal terpasang.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PNG image with fake or damaged transparency
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `defringe` (number 0-100, default 30) - Edge defringe strength to remove color contamination
                    - `outputFormat` (string, default "png") - One of: png, webp
                    - `removeWatermark` (boolean, default false) - Apply median filter to reduce watermark artifacts before matting
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '202':
          description: Accepted for async processing. Track progress via SSE at /api/v1/jobs/{jobId}/progress.
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
