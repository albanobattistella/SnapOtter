  /api/v1/tools/image/passport-photo/analyze:
    post:
      operationId: analyzePassportPhoto
      tags:
        - Tools
      summary: Pas foto - analisis
      description: |
        Fase 1 pembuatan pas foto. Mendeteksi landmark wajah dan menghapus
        latar belakang. Mengembalikan data landmark dan pratinjau base64 untuk
        digunakan klien pada fase generate. Memerlukan feature bundle passport-photo
        terpasang.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
