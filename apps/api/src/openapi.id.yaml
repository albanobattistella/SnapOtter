                          type: string
                        description:
                          type: string
                          description: Human-readable description of the feature bundle
                        status:
                          type: string
                          enum:
                            - installed
                            - not_installed
                            - installing
                            - queued
                            - error
                        installedVersion:
                          type:
                            - string
                            - 'null'
                        estimatedSize:
                          type: string
                        downloadBytes:
                          type:
                            - integer
                            - 'null'
