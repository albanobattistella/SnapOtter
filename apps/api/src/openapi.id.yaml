      summary: Bagi PDF
      description: |
        Ekstrak halaman atau bagi menjadi beberapa bagian. Pada mode "range" mengembalikan satu PDF
        dengan halaman yang dipilih. Pada mode "every" membagi menjadi potongan N halaman
        dan mengembalikan arsip ZIP berisi bagian-bagiannya.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
