  /api/v1/config/analytics:
    get:
      operationId: getAnalyticsConfig
      tags:
        - Analytics
      summary: Dapatkan konfigurasi analytics
      description: |
        Mengembalikan konfigurasi penyedia analytics yang efektif. Analytics
        diaktifkan hanya jika bake saat kompilasi dan pengaturan instance
        analyticsEnabled sama-sama mengizinkannya. Saat dinonaktifkan, key, DSN, dan
        instanceId kosong. Endpoint publik.
      security: []
      responses:
        '200':
          description: Analytics configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: |
                      Effective analytics state. True only when both the
                      compile-time bake and the instance analyticsEnabled
                      setting are on. When false, the keys, DSN, and instanceId
                      are blank.
                  posthogApiKey:
                    type: string
                  posthogHost:
                    type: string
                  sentryDsn:
                    type: string
                  sentryDsnWeb:
                    type: string
                  posthogSampleRate:
                    type: number
                  instanceId:
                    type: string
  /api/v1/features:
    get:
      operationId: listFeatures
      tags:
        - Features
      summary: Daftar feature bundle
      description: |
        Mengembalikan semua feature bundle AI yang tersedia dan status instalasinya.
        Pada lingkungan non-Docker, semua bundle ditampilkan sebagai terpasang.
