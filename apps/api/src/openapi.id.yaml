  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags:
        - Features
      summary: Pasang feature bundle
      description: |
        Mulai instalasi async sebuah feature bundle AI. Mengunduh model dan
        mengonfigurasi sidecar Python. Mengembalikan jobId untuk pelacakan progres
        melalui endpoint SSE. Memerlukan permission features:manage.

        Instalasi diserialisasi di sisi server: permintaan yang dibuat saat instalasi
        lain sedang berjalan akan diantrikan (queued=true) alih-alih ditolak, dan
        mulai otomatis saat instalasi yang berjalan selesai. Permintaan berulang
        untuk bundle yang sama yang sedang berjalan akan dideduplikasi dan mengembalikan
        jobId yang sama.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '202':
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: True when the install was queued behind another running install instead of starting immediately.
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
