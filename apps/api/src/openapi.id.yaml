      operationId: compressPdf
      tags:
        - Tools
      summary: Kompres PDF
      description: |
        Perkecil ukuran file PDF dengan downsampling image tertanam. Pada mode "quality"
        slider 1-100 mengontrol DPI image. Pada mode "targetSize" binary search
        menemukan DPI tertinggi yang sesuai target. Jika kompresi justru memperbesar
        file, byte asli dikembalikan tanpa perubahan.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: PDF file to compress
                settings:
                  type: string
                  description: |
                    JSON string with options:
                    - `mode` (string, default "quality") - One of: quality, targetSize
                    - `quality` (integer 1-100, optional) - Compression quality (higher = less compression). Used in quality mode
                    - `targetSizeKb` (number, optional) - Target file size in kilobytes. Used in targetSize mode
      responses:
        '200':
          description: Compressed PDF
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ToolResponse'
        '400':
          description: Invalid input
          content:
