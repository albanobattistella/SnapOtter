      description: |
        Perluas kanvas image menggunakan outpainting AI. Memperluas image ke segala
        arah dengan menghasilkan konten baru yang menyatu mulus dengan
        yang asli. Menggunakan outpainting berbasis LaMa. Memerlukan feature bundle
        ai-canvas-expand terpasang.
