      summary: Avinstallera ett funktionspaket
      description: |
        Avinstallera ett AI-funktionspaket och ta bort dess modellfiler (om de inte delas
        med ett annat installerat paket). Kraver behorigheten features:manage.
      security:
        - bearerAuth: []
      parameters:
