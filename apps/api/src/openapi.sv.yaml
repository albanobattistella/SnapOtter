        - Tools
      summary: Komprimera PDF
      description: |
        Minska PDF-filstorleken genom att nedsampla inbaddade bilder. I "quality"-lage
        styr ett reglage 1-100 bildens DPI. I "targetSize"-lage hittar en binarsokning
        den hogsta DPI som passar maalet. Om komprimering skulle forstora
        filen returneras originalbytesen ofrandrade.
      security:
