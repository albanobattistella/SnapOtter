  /api/v1/tools/image/smart-crop:
    post:
      operationId: smartCrop
      tags:
        - Tools
      summary: Smart beskaring
      description: Smart beskaring med tre lagen - motivfokus, ansiktsfokus eller automatisk trimning.
      security:
