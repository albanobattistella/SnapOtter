      description: |
        Fixa "falskt transparenta" PNG:er som har fransar, halos eller halvtransparenta
        artefakter fraan en tidigare bakgrundsborttagning. Anvander BiRefNet HR-matting
        (2048x2048) for att producera en ren alfakanal med konfigurerbar defringe-
        bearbetning. Faller tillbaka pa birefnet-general, sedan u2net vid OOM. Kraver
        att funktionspaketet background-removal ar installerat.
      security:
        - bearerAuth: []
      requestBody:
        required: true
