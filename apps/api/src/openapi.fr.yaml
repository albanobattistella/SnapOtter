      operationId: lqipPlaceholder
      tags:
        - Tools
      summary: Espace réservé LQIP
      description: |
        Génère un minuscule espace réservé d'image de basse qualité. Renvoie un petit fichier
        image ainsi qu'un data URI base64, une balise img HTML prête à l'emploi et un extrait de
