              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
  /api/v1/config/analytics:
    get:
      operationId: getAnalyticsConfig
      tags:
        - Analytics
      summary: Obtenir la configuration des analytics
      description: |
        Renvoie la configuration effective du fournisseur d'analytics. Les analytics ne
        sont activées que lorsque le bake à la compilation et le paramètre d'instance
        analyticsEnabled l'autorisent tous deux. Lorsqu'elles sont désactivées, les clés, le DSN et
        l'instanceId sont vides. Endpoint public.
      security: []
      responses:
        '200':
          description: Analytics configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  enabled:
                    type: boolean
                    description: |
                      Effective analytics state. True only when both the
                      compile-time bake and the instance analyticsEnabled
                      setting are on. When false, the keys, DSN, and instanceId
                      are blank.
                  posthogApiKey:
                    type: string
                  posthogHost:
                    type: string
                  sentryDsn:
                    type: string
                  sentryDsnWeb:
                    type: string
                  posthogSampleRate:
                    type: number
                  instanceId:
                    type: string
  /api/v1/features:
    get:
      operationId: listFeatures
      tags:
        - Features
      summary: Lister les bundles de fonctionnalités
      description: |
        Renvoie tous les bundles de fonctionnalités IA disponibles et leur état d'installation.
        Dans les environnements non-Docker, tous les bundles apparaissent comme installés.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Feature bundle list
          content:
            application/json:
              schema:
                type: object
                properties:
                  bundles:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                          description: Human-readable description of the feature bundle
                        status:
                          type: string
                          enum:
                            - installed
                            - not_installed
                            - installing
                            - queued
                            - error
                        installedVersion:
                          type:
                            - string
                            - 'null'
                        estimatedSize:
                          type: string
                        downloadBytes:
                          type:
                            - integer
                            - 'null'
                          description: Compressed archive size for this host's architecture, when the manifest records it. Null in native (non-Docker) mode or when unmeasured.
                        installedBytes:
                          type:
                            - integer
                            - 'null'
                          description: Extracted on-disk size for this host's architecture, when the manifest records it.
                        enablesTools:
                          type: array
                          items:
                            type: string
                        progress:
                          type:
                            - object
                            - 'null'
                          properties:
                            percent:
                              type: number
                            stage:
                              type: string
                        error:
                          type:
                            - string
                            - 'null'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
  /api/v1/admin/features/{bundleId}/install:
    post:
      operationId: installFeature
      tags:
        - Features
      summary: Installer un bundle de fonctionnalité
      description: |
        Démarre l'installation asynchrone d'un bundle de fonctionnalité IA. Télécharge les modèles et
        configure le sidecar Python. Renvoie un jobId pour le suivi de la progression
        via l'endpoint SSE. Requiert la permission features:manage.

        Les installations sont sérialisées côté serveur : une requête émise pendant qu'une autre
        installation est en cours est mise en file d'attente (queued=true) plutôt que rejetée, et
        démarre automatiquement lorsque l'installation en cours se termine. Une requête
        répétée pour le même bundle déjà en cours est dédupliquée et renvoie le même
        jobId.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '202':
          description: Installation started or queued
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID for tracking installation progress via SSE
                  queued:
                    type: boolean
                    description: True when the install was queued behind another running install instead of starting immediately.
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle already installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
  /api/v1/admin/features/{bundleId}/uninstall:
    post:
      operationId: uninstallFeature
      tags:
        - Features
      summary: Désinstaller un bundle de fonctionnalité
      description: |
        Désinstalle un bundle de fonctionnalité IA et supprime ses fichiers de modèles (sauf s'ils sont partagés
        avec un autre bundle installé). Requiert la permission features:manage.
      security:
        - bearerAuth: []
      parameters:
        - name: bundleId
          in: path
          required: true
          description: Feature bundle identifier
          schema:
            type: string
      responses:
        '200':
          description: Bundle uninstalled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ForbiddenError'
        '404':
          description: Unknown bundle ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Bundle is not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConflictError'
