  /api/v1/tools/image/passport-photo/analyze:
    post:
      operationId: analyzePassportPhoto
      tags:
        - Tools
      summary: Photo d'identité - analyser
      description: |
        Phase 1 de la génération de photo d'identité. Détecte les points de repère du visage et supprime
        l'arrière-plan. Renvoie les données de repères et un aperçu encodé en base64 que
        le client utilise dans la phase de génération. Nécessite l'installation du bundle de
        fonctionnalité passport-photo.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Photo with a clear, front-facing face
                clientJobId:
                  type: string
                  description: Client-provided job ID for SSE progress tracking
      responses:
        '200':
          description: Face analysis and background removal result
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    description: Job ID to pass to the generate endpoint
                  filename:
                    type: string
                  preview:
                    type: string
                    description: Base64-encoded PNG preview of the background-removed image
                  previewWidth:
                    type: integer
                  previewHeight:
                    type: integer
                  landmarks:
                    type: object
                    description: Normalized face landmark coordinates (0-1)
                    properties:
                      leftEye:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      rightEye:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      eyeCenter:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      chin:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      forehead:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      crown:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      nose:
                        type: object
                        properties:
                          x:
                            type: number
                          'y':
                            type: number
                      faceCenterX:
                        type: number
                  imageWidth:
                    type: integer
                  imageHeight:
                    type: integer
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: No face detected or analysis failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: Feature not installed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureNotInstalledError'
  /api/v1/tools/image/passport-photo/generate:
    post:
      operationId: generatePassportPhoto
      tags:
        - Tools
      summary: Photo d'identité - générer
      description: |
        Phase 2 de la génération de photo d'identité. Utilise le jobId et les repères de
        la phase d'analyse pour rogner, redimensionner et disposer en planche la photo selon la spécification
        de pays/document indiquée. Réponse rapide (pas de nouvelle exécution IA).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - jobId
                - filename
                - countryCode
                - landmarks
                - imageWidth
                - imageHeight
              properties:
                jobId:
                  type: string
                  description: Job ID from the analyze phase
                filename:
                  type: string
                  description: Original filename from analyze phase
                countryCode:
                  type: string
                  description: ISO country code for passport specification
                documentType:
                  type: string
                  default: passport
                  description: Document type (passport, visa, etc.)
                bgColor:
                  type: string
                  default: '#FFFFFF'
                  description: Background color (hex)
                printLayout:
                  type: string
                  default: none
                  description: Print sheet layout (none, 4x6, A4, letter)
                maxFileSizeKb:
                  type: number
                  default: 0
                  description: Max file size in KB (0 = no limit)
                dpi:
                  type: number
                  minimum: 72
                  maximum: 1200
                  default: 300
                  description: Output DPI
                customWidthMm:
                  type: number
                  description: Custom photo width in mm (overrides country spec)
                customHeightMm:
                  type: number
                  description: Custom photo height in mm (overrides country spec)
                zoom:
                  type: number
                  minimum: 0.5
                  maximum: 3
                  default: 1
                  description: Zoom level (>1 = tighter crop)
                adjustX:
                  type: number
                  default: 0
                  description: Horizontal position adjustment
                adjustY:
                  type: number
                  default: 0
                  description: Vertical position adjustment
                landmarks:
                  type: object
                  description: Face landmarks from analyze phase
                imageWidth:
                  type: integer
                  description: Original image width from analyze phase
                imageHeight:
                  type: integer
                  description: Original image height from analyze phase
      responses:
        '200':
          description: Generated passport photo
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                  downloadUrl:
                    type: string
                  dimensions:
                    type: object
                    properties:
                      widthMm:
                        type: number
                      heightMm:
                        type: number
                      widthPx:
                        type: integer
                      heightPx:
                        type: integer
                      dpi:
                        type: integer
                  spec:
                    type: object
                    properties:
                      country:
                        type: string
                      countryCode:
                        type: string
                      documentType:
                        type: string
                      documentLabel:
                        type: string
                  printDownloadUrl:
                    type: string
                    description: URL for print sheet download (if printLayout was specified)
        '400':
          description: Invalid settings or unknown country code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Generation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
