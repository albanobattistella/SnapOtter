      operationId: readinessCheck
      tags:
        - System
      summary: Vérification de disponibilité
      description: Vérifie PostgreSQL, Redis, l'espace disque local et l'accessibilité S3 lorsque configurée. Endpoint public pour équilibreurs de charge et orchestrateurs.
      security: []
      responses:
        '200':
          description: Instance is ready to receive traffic
        '503':
          description: Instance is not ready to receive traffic
  /api/v1/jobs/{jobId}/cancel:
    post:
      operationId: cancelJob
      tags:
        - System
      summary: Annuler un job
      description: Demande l'annulation d'un job en file d'attente ou en cours d'exécution.
      security:
        - bearerAuth: []
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Cancellation request result
        '401':
          description: Authentication required
  /api/v1/preferences:
    get:
      operationId: getPreferences
      tags:
        - Settings
      summary: Obtenir les préférences utilisateur
      description: Renvoie la carte de préférences par utilisateur de l'utilisateur courant.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Preference map
        '401':
          description: Authentication required
    put:
      operationId: updatePreferences
      tags:
        - Settings
      summary: Mettre à jour les préférences utilisateur
      description: Insère ou met à jour une ou plusieurs préférences pour l'utilisateur courant.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: Preferences updated
        '400':
          description: Invalid preferences body
        '401':
          description: Authentication required
  /api/auth/mfa/enroll:
    post:
      operationId: enrollMfa
      tags:
        - Auth
      summary: Démarrer l'inscription MFA
      description: Démarre l'inscription MFA TOTP pour l'utilisateur courant. Nécessite la fonctionnalité enterprise MFA.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Enrollment URI and recovery codes
        '401':
          description: Authentication required
        '403':
          description: MFA feature not licensed
        '409':
          description: MFA enrollment already enabled or pending
  /api/auth/mfa/verify:
    post:
      operationId: verifyMfaEnrollment
      tags:
        - Auth
      summary: Vérifier l'inscription MFA
      description: Confirme une inscription MFA en attente avec un code TOTP.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: MFA enabled
        '400':
          description: No pending enrollment or invalid body
        '401':
          description: Invalid TOTP code
  /api/auth/mfa/complete:
    post:
      operationId: completeMfaLogin
      tags:
        - Auth
      summary: Finaliser la connexion MFA
      description: Finalise un challenge de connexion en attente avec un code TOTP ou de récupération.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - mfaToken
                - code
              properties:
                mfaToken:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: Session token and user profile
        '400':
          description: Invalid request body
        '401':
          description: Invalid or expired MFA challenge
  /api/auth/mfa/disable:
    post:
      operationId: disableMfa
      tags:
        - Auth
      summary: Désactiver la MFA
      description: Désactive la MFA pour l'utilisateur courant après vérification d'un code TOTP.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: MFA disabled
        '400':
          description: MFA is not enabled or body is invalid
        '401':
          description: Authentication required or invalid code
  /api/auth/users/{id}/mfa/reset:
    post:
      operationId: resetUserMfa
      tags:
        - Auth
      summary: Réinitialiser la MFA d'un utilisateur
      description: Réinitialisation administrative de l'inscription MFA d'un utilisateur. Requiert la permission users:manage.
