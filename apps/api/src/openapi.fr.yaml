  /api/v1/fetch-urls:
    post:
      operationId: fetchImageUrls
      tags:
        - Files
      summary: Récupérer des images depuis des URLs
      description: |
        Récupère une ou plusieurs images depuis des URLs externes. Chaque URL est validée contre les attaques SSRF,
        limitée en taille et vérifiée comme image valide. Renvoie des URLs de téléchargement pour
        chaque image récupérée avec succès. Débit limité à 200 requêtes par heure.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - urls
              properties:
                urls:
                  type: array
                  items:
                    type: string
                    format: uri
                  minItems: 1
                  maxItems: 50
                  description: URLs of images to fetch (1-50)
      responses:
        '200':
          description: Fetch results for each URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        success:
                          type: boolean
                        url:
                          type: string
                        filename:
                          type: string
                        contentType:
                          type: string
                        size:
                          type: integer
                        width:
                          type: integer
                        height:
                          type: integer
                        downloadUrl:
                          type: string
                        previewUrl:
                          type:
                            - string
                            - 'null'
                        error:
                          type: string
                          description: Present only when success is false
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
