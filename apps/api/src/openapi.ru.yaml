                    - `backgroundColor` (hex string, default "#FFFFFF") - Hex color for background and gap fill
                    - `format` (string, default "png") - One of: png, jpeg, webp, avif, jxl
                    - `quality` (number 1-100, default 90) - Output quality
      responses:
