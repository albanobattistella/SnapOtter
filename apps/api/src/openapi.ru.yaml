  /api/v1/fetch-urls:
    post:
      operationId: fetchImageUrls
      tags:
        - Files
      summary: Загрузка изображений по URL
      description: |
        Загрузка одного или нескольких изображений с внешних URL. Каждый URL проверяется
        на SSRF-атаки, ограничивается по размеру и верифицируется как корректное
        изображение. Возвращает URL для скачивания каждого успешно загруженного
        изображения. Ограничение частоты: 200 запросов в час.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - urls
              properties:
                urls:
                  type: array
