                description:
                  type: string
                  description: Optional human-readable description of the pipeline
                steps:
                  type: array
                  items:
                    type: object
                    properties:
                      toolId:
                        type: string
                      settings:
                        type: object
      responses:
        '201':
          description: Pipeline saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  description:
                    type: string
                    description: Human-readable description of the pipeline
                  steps:
                    type: array
                    items:
                      type: object
                  createdAt:
                    type: string
                    format: date-time
        '400':
          description: Invalid input
          content:
