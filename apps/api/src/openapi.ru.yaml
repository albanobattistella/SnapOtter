      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Image file to inspect
      responses:
        '200':
          description: Full metadata object (keys vary by image)
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '422':
          description: Failed to read image metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/tools/{section}/{toolId}/batch:
    post:
      operationId: batchProcess
      tags:
        - Batch
      summary: Пакетная обработка изображений
      description: |
        Отправка нескольких изображений через один инструмент. Возвращает ZIP-файл. Ответ содержит заголовок X-Job-Id для отслеживания прогресса.
      security:
        - bearerAuth: []
      parameters:
        - name: section
          in: path
          required: true
          schema:
            type: string
          description: Tool section slug (image, video, audio, pdf, files)
        - name: toolId
          in: path
          required: true
          schema:
            type: string
          description: Tool identifier (e.g. resize, crop)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Image files to process (one or more)
                settings:
                  type: string
