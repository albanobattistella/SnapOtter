                image:
                  type: string
                  format: binary
                  description: Source image file
                mask:
                  type: string
                  format: binary
                  description: Mask image (white areas will be erased)
                format:
                  type: string
                  enum:
                    - auto
                    - png
                    - jpg
                    - jpeg
                    - webp
                    - tiff
                    - gif
                    - avif
                    - heic
                    - heif
                    - jxl
                  default: auto
                  description: Output format
                quality:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 95
                  description: Output quality
